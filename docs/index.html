    if (!items.length && !debts.length) {
      listCard.append(emptyState(kind === "expense" ? "🧾" : "💶",
        kind === "expense" ? "Aucune dépense planifiée" : "Aucun revenu planifié",
        kind === "expense"
          ? "Loyer, courses, abonnements… ajoutez vos charges récurrentes ou ponctuelles."
          : "Salaire, bourse, aides, revenus variables… ajoutez tout ce qui rentre.",
        el("button", { class: "btn btn-p btn-sm", onclick: () => openItemEditor(b, newItem(kind), true) }, "Ajouter")));
      return;
    }
    // groupement par catégorie racine
    const groups = {};
    for (const it of items) {
      const top = catTop(b, it.categoryId);
      const key = top ? top.id : "_none";
      (groups[key] = groups[key] || { cat: top, items: [] }).items.push(it);
    }
    const sorted = Object.values(groups).map(g => {
      g.total = g.items.reduce((s, i) => s + monthlyAmount(i, ymNow, State.settings.scenarioMode, State.settings.inflation), 0);
      g.totalEq = g.items.reduce((s, i) => s + monthlyEquivalent(i), 0);
      return g;
    }).sort((a, z) => z.total - a.total);

    for (const g of sorted) {
      listCard.append(el("div", { class: "group-head" },
        el("span", {}, g.cat ? `${g.cat.emoji} ${g.cat.name}` : "📦 Sans catégorie"),
        el("span", { class: "g-total mono" }, fmtMoney(g.total, cur) + " /mois")
      ));
      g.items.sort((a, z) => monthlyEquivalent(z) - monthlyEquivalent(a) || z.amount - a.amount);
      for (const it of g.items) listCard.append(itemRow(b, it));
    }
    if (debts.length) {
      listCard.append(el("div", { class: "group-head" }, el("span", {}, "💳 Mensualités de crédits"),
        el("span", { class: "g-total mono" }, fmtMoney(debts.reduce((s, d) => s + debtMonthly(d, ymNow), 0), cur) + " /mois")));
      for (const d of debts) {
        const pay = debtMonthly(d, ymNow);
        const end = debtPayoffYm(d);
        listCard.append(el("div", { class: "item-row", onclick: () => go("debts") },
          el("div", { class: "i-emoji" }, "💳"),
          el("div", { class: "i-main" }, el("div", { class: "i-name" }, d.name),
            el("div", { class: "i-sub" }, end ? `crédit · se termine en ${fmtYm(end)}` : "crédit en cours")),
          el("div", { class: "i-amt" }, pay ? fmtMoney(-pay, cur) : "—", el("span", { class: "per" }, "/mois"))
        ));
      }
    }
  }

  function rerender() { buildList(); }
}

function itemRow(b, it) {
  const cur = b.currency;
  const ymNow = ymOf(todayStr());
  const now = todayStr();
  const badges = [];
  if (it.variable) badges.push(el("span", { class: "badge b-info" }, "variable"));
  if (it.steps && it.steps.length) badges.push(el("span", { class: "badge b-mut" }, "📈 paliers"));
  if (it.growth) badges.push(el("span", { class: "badge b-mut" }, it.growth === "inf" ? "suit l'inflation" : (it.growth > 0 ? "+" : "") + it.growth + " %/an"));
  if (it.startDate > now) badges.push(el("span", { class: "badge b-warn" }, "à venir"));
  if (it.endDate && it.endDate < now) badges.push(el("span", { class: "badge b-mut" }, "terminé"));
  if (it.savingTo) badges.push(el("span", { class: "badge b-pos" }, "→ épargne"));
  if (it.eventId) {
    const ev = b.events.find(e => e.id === it.eventId);
    if (ev) badges.push(el("span", { class: "badge b-mut" }, (ev.emoji || "📌") + " " + ev.name));
  }
  const cat = catById(b, it.categoryId);
  const eq = it.freq === "once" ? it.amount : monthlyEquivalent(it);
  return el("div", { class: "item-row", onclick: () => openItemEditor(b, it, false) },
    el("div", { class: "i-emoji" }, cat ? cat.emoji : (it.kind === "income" ? "💶" : "🧾")),
    el("div", { class: "i-main" },
      el("div", { class: "i-name" }, it.name || "(sans nom)", " ", ...badges),
      el("div", { class: "i-sub" }, freqLabel(it))),
    el("div", { class: "i-amt " + (it.kind === "income" ? "pos" : "") },
      fmtMoney(it.kind === "income" ? eq : -eq, cur, { sign: it.kind === "income" }),
      el("span", { class: "per" }, it.freq === "once" ? "une fois" : "/mois en moyenne"))
  );
}

/* ---------- éditeur de poste ---------- */
function openItemEditor(b, item, isNew, onSaved) {
  const it = JSON.parse(JSON.stringify(item));
  const cur = b.currency;
  const isIncome = it.kind === "income";

  const nameInp = el("input", { class: "input", value: it.name, placeholder: isIncome ? "ex. Salaire net, Bourse, APL…" : "ex. Loyer, Courses, Netflix…" });
  const amountInp = moneyInput({ value: it.amount || "", cur: "€" });
  const catSel = catSelect(b, it.kind, it.categoryId);
  const freqSel = selectInput(Object.entries(FREQS).map(([v, f]) => ({ value: v, label: f.label })), it.freq);
  const dayInp = selectInput(Array.from({ length: 28 }, (_, i) => ({ value: i + 1, label: "le " + (i + 1) })), clamp(it.day || 1, 1, 28));
  const startInp = el("input", { class: "input", type: "date", value: it.startDate || "" });
  const hasEnd = el("input", { type: "checkbox", checked: !!it.endDate });
  const endInp = el("input", { class: "input", type: "date", value: it.endDate || "", disabled: !it.endDate });
  hasEnd.addEventListener("change", () => { endInp.disabled = !hasEnd.checked; if (hasEnd.checked && !endInp.value) endInp.value = addMonths(ymOf(todayStr()), 12) + "-01"; });

  // variable (fourchette)
  const varChk = el("input", { type: "checkbox", checked: !!it.variable });
  const minInp = moneyInput({ value: it.min ?? "", placeholder: "min" });
  const maxInp = moneyInput({ value: it.max ?? "", placeholder: "max" });
  const varRow = el("div", { class: "form-grid full", style: it.variable ? "" : "display:none" },
    fField("Montant minimum (mois creux)", minInp), fField("Montant maximum (mois hauts)", maxInp));
  varChk.addEventListener("change", () => varRow.style.display = varChk.checked ? "" : "none");

  // croissance
  const growthSel = selectInput([
    { value: "0", label: "Montant stable" },
    { value: "inf", label: `Suit l'inflation (${State.settings.inflation} %/an)` },
    { value: "custom", label: "Évolution annuelle personnalisée (%)" },
  ], it.growth === "inf" ? "inf" : (it.growth ? "custom" : "0"));
  const growthInp = moneyInput({ value: it.growth && it.growth !== "inf" ? it.growth : "", cur: "%/an", placeholder: "ex. 2 ou -5" });
  const growthWrap = el("div", { style: (growthSel.value === "custom" ? "" : "display:none") }, fField("Variation par an", growthInp));
  growthSel.addEventListener("change", () => growthWrap.style.display = growthSel.value === "custom" ? "" : "none");

  // paliers programmés
  const stepsBox = el("div", {});
  const steps = (it.steps || []).map(s => ({ ...s }));
  function renderSteps() {
    stepsBox.innerHTML = "";
    steps.forEach((s, i) => {
      const dateI = el("input", { class: "input", type: "month", value: s.date || "", style: "max-width:150px", onchange: e => s.date = e.target.value });
      const typeI = selectInput([{ value: "set", label: "nouveau montant" }, { value: "pct", label: "variation en %" }], s.type || "set", { style: "max-width:170px", onchange: e => s.type = e.target.value });
      const valI = el("input", { class: "input", type: "text", inputmode: "decimal", value: s.value ?? "", placeholder: "valeur", style: "max-width:110px", oninput: e => s.value = parseAmount(e.target.value) });
      stepsBox.append(el("div", { class: "evo-row" }, dateI, typeI, valI,
        el("button", { class: "btn btn-ghost btn-ico", html: ico("trash", 15), onclick: () => { steps.splice(i, 1); renderSteps(); } })));
    });
    stepsBox.append(el("button", {
      class: "btn btn-sm btn-ghost mt8", html: ico("plus", 14) + "<span>Ajouter un palier (ex. augmentation prévue)</span>",
      onclick: () => { steps.push({ date: addMonths(ymOf(todayStr()), 6), type: "set", value: "" }); renderSteps(); }
    }));
  }
  renderSteps();

  // épargne liée (dépenses uniquement)
  const savingTargets = [...b.goals.map(g => ({ value: "g:" + g.id, label: `🎯 Objectif : ${g.name}` })), ...b.accounts.map(a => ({ value: "a:" + a.id, label: `🏦 Compte : ${a.name}` }))];
  const savingSel = selectInput([{ value: "", label: "Non — dépense classique" }, ...savingTargets.map(t => ({ value: t.value.slice(2), label: t.label }))], it.savingTo || "");
  const notesInp = el("textarea", { class: "input", value: it.notes || "", placeholder: "Notes libres…" });

  const monthFreq = () => !!FREQ_MONTHS[freqSel.value];
  const dayField = fField("Jour du mois", dayInp);
  const updateFreqUi = () => {
    dayField.style.display = monthFreq() ? "" : "none";
  };
  freqSel.addEventListener("change", updateFreqUi);
  updateFreqUi();

  const m = modal({
    title: isNew ? (isIncome ? "Nouveau revenu" : "Nouvelle dépense") : (it.name || "Modifier le poste"),
    lg: true,
    body: el("div", { class: "form-grid" },
      fField("Nom du poste", nameInp, { full: true }),
      fField("Montant" + (isIncome ? "" : " (par occurrence)"), amountInp),
      fField("Catégorie", catSel),
      fField("Fréquence", freqSel),
      dayField,
      fField(it.freq === "once" ? "Date" : "Commence le", startInp),
      el("div", { class: "field" },
        el("label", { class: "check", style: "margin-bottom:5px" }, hasEnd, "Se termine"),
        endInp),
      el("label", { class: "check full" }, varChk, isIncome ? "Revenu variable / irrégulier (fourchette min–max)" : "Dépense variable (fourchette min–max)"),
      varRow,
      el("div", { class: "full" }, el("details", { class: "adv", open: !!(it.growth || steps.length) },
        el("summary", {}, "Évolution dans le temps (augmentations, paliers…)"),
        el("div", { class: "form-grid mt8" },
          fField("Tendance long terme", growthSel), growthWrap),
        el("div", { class: "mt8" },
          el("div", { class: "small muted mb8" }, "Paliers : changements connus à l'avance (ex. loyer qui passe à 600 € en septembre, salaire +10 % en janvier)."),
          stepsBox)
      )),
      !isIncome && savingTargets.length ? fField("Compter comme de l'épargne vers…", savingSel, { full: true }) : null,
      fField("Notes", notesInp, { full: true })
    ),
    foot: [
      !isNew ? el("button", {
        class: "btn btn-danger", html: ico("trash", 15) + "<span>Supprimer</span>",
        onclick: () => {
          const snapshot = JSON.parse(JSON.stringify(b.items));
          b.items = b.items.filter(x => x.id !== item.id);
          persist(); m.close(); renderApp();
          offerUndo(`Poste « ${item.name} » supprimé`, () => { b.items = snapshot; persist(); renderApp(); });
        }
      }) : el("span"),
      el("span", { class: "spacer" }),
      el("button", { class: "btn", onclick: () => m.close() }, "Annuler"),
      el("button", { class: "btn btn-p", onclick: save }, isNew ? "Ajouter" : "Enregistrer"),
    ]
  });
  nameInp.focus();

  function save() {
    it.name = nameInp.value.trim() || (isIncome ? "Revenu" : "Dépense");
    it.amount = numVal(amountInp);
    it.categoryId = catSel.value || null;
    it.freq = freqSel.value;
    it.day = +dayInp.value || 1;
    it.startDate = startInp.value || todayStr();
    it.endDate = hasEnd.checked && endInp.value ? endInp.value : null;
    it.variable = varChk.checked;
    it.min = it.variable ? numVal(minInp) : null;
    it.max = it.variable ? numVal(maxInp) : null;
    it.growth = growthSel.value === "inf" ? "inf" : (growthSel.value === "custom" ? parseAmount(growthInp.input.value) : 0);
    it.steps = steps.filter(s => s.date && s.value !== "" && s.value != null);
    it.savingTo = (savingSel && savingSel.value) || null;
    it.notes = notesInp.value;
    if (isNew) b.items.push(it);
    else Object.assign(b.items.find(x => x.id === item.id), it);
    persist(); m.close(); renderApp();
    onSaved && onSaved(it);
  }
}

/* ---------- gestion des catégories ---------- */
function openCategoryManager(b) {
  let kind = "expense";
  const body = el("div", {});
  const m = modal({ title: "Catégories & sous-catégories", lg: true, body, onClose: () => renderApp() });

  function render() {
    body.innerHTML = "";
    body.append(
      el("div", { class: "flex mb12" },
        segControl([{ value: "expense", label: "Dépenses" }, { value: "income", label: "Revenus" }], kind, v => { kind = v; render(); }, true),
        el("span", { class: "spacer" }),
        el("button", { class: "btn btn-sm btn-p", html: ico("plus", 14) + "<span>Catégorie</span>", onclick: () => editCat(null, null) })
      )
    );
    const roots = b.categories.filter(c => c.kind === kind && !c.parentId);
    for (const r of roots) {
      const usedRoot = b.items.some(i => i.categoryId === r.id);
      body.append(el("div", { class: "flex", style: "padding:8px 2px 4px; border-top:1px solid var(--line)" },
        el("span", { style: "font-size:17px" }, r.emoji),
        el("b", {}, r.name),
        el("span", { class: "cat-dot", style: "background:" + r.color }),
        el("span", { class: "spacer" }),
        el("button", { class: "btn btn-ghost btn-ico", html: ico("plus", 14), title: "Ajouter une sous-catégorie", onclick: () => editCat(null, r) }),
        el("button", { class: "btn btn-ghost btn-ico", html: ico("edit", 14), onclick: () => editCat(r, null) }),
        el("button", { class: "btn btn-ghost btn-ico", html: ico("trash", 14), onclick: () => removeCat(r) })
      ));
      for (const c of b.categories.filter(c => c.parentId === r.id)) {
        body.append(el("div", { class: "flex small", style: "padding:3px 2px 3px 30px; color:var(--tx2)" },
          el("span", {}, c.name),
          el("span", { class: "spacer" }),
          el("button", { class: "btn btn-ghost btn-ico", html: ico("edit", 13), onclick: () => editCat(c, r) }),
          el("button", { class: "btn btn-ghost btn-ico", html: ico("trash", 13), onclick: () => removeCat(c) })
        ));
      }
    }
  }

  function editCat(cat, parent) {
    const isNew = !cat;
    const c = cat || { id: uid(), kind, name: "", emoji: parent ? parent.emoji : "🏷️", color: parent ? parent.color : BUDGET_COLORS[Math.floor(Math.random() * BUDGET_COLORS.length)], parentId: parent ? parent.id : null };
    const nameI = el("input", { class: "input", value: c.name, placeholder: "Nom de la catégorie" });
    const emojiI = el("input", { class: "input", value: c.emoji, style: "max-width:90px; text-align:center; font-size:18px" });
    const colorI = el("input", { class: "input", type: "color", value: c.color, style: "max-width:90px; padding:4px; height:40px" });
    const mm = modal({
      title: isNew ? (parent ? `Sous-catégorie de ${parent.name}` : "Nouvelle catégorie") : "Modifier",
      body: el("div", { class: "form-grid" },
        fField("Nom", nameI, { full: true }),
        fField("Emoji", emojiI),
        !c.parentId ? fField("Couleur", colorI) : null),
      foot: [el("span", { class: "spacer" }),
        el("button", { class: "btn", onclick: () => mm.close() }, "Annuler"),
        el("button", {
          class: "btn btn-p", onclick: () => {
            c.name = nameI.value.trim() || "Catégorie";
            c.emoji = emojiI.value.trim() || "🏷️";
            c.color = colorI.value;
            if (isNew) b.categories.push(c);
            persist(); mm.close(); render();
          }
        }, isNew ? "Ajouter" : "Enregistrer")]
    });
    nameI.focus();
  }

  function removeCat(cat) {
    const children = b.categories.filter(c => c.parentId === cat.id);
    const ids = [cat.id, ...children.map(c => c.id)];
    const used = b.items.filter(i => ids.includes(i.categoryId)).length
      + State.transactions.filter(t => t.budgetId === b.id && ids.includes(t.categoryId)).length;
    confirmDialog({
      title: `Supprimer « ${cat.name} » ?`,
      body: used
        ? `${used} poste(s) ou transaction(s) utilisent cette catégorie${children.length ? " ou ses sous-catégories" : ""} : ils passeront en « Sans catégorie ».`
        : (children.length ? `Ses ${children.length} sous-catégories seront aussi supprimées.` : "Cette catégorie est vide."),
      okLabel: "Supprimer", danger: true,
      onOk: () => {
        b.categories = b.categories.filter(c => !ids.includes(c.id));
        b.items.forEach(i => { if (ids.includes(i.categoryId)) i.categoryId = null; });
        State.transactions.forEach(t => { if (t.budgetId === b.id && ids.includes(t.categoryId)) t.categoryId = null; });
        persist(); render();
      }
    });
  }

  render();
}

    ))));

"use strict";
/* ============ vue : calendrier budgétaire ============ */

let _calYm = null;

function viewCalendar(root) {
  const b = curBudget();
  const cur = b.currency;
  const ymNow = ymOf(todayStr());
  if (!_calYm) _calYm = ymNow;
  const ym = _calYm;

  const flows = dayFlows(b, ym);
  const dim = daysInMonth(ym);
  const first = toDate(ym + "-01");
  const startDow = (first.getDay() + 6) % 7; // lundi = 0

  // solde de départ du mois affiché
  let balance = null;
  if (ym >= ymNow) {
    const offset = monthIndex(ym) - monthIndex(ymNow);
    if (offset === 0) balance = balanceAtMonthStart(b, ymNow);
    else {
      const proj = project(b, { months: offset });
      balance = proj[proj.length - 1].balance;
    }
  }

  let totIn = 0, totOut = 0;
  Object.values(flows).flat().forEach(f => f.item.kind === "income" ? totIn += f.amount : totOut += f.amount);

  const head = el("div", { class: "flex", style: "flex-wrap:wrap; gap:10px" },
    el("button", { class: "btn btn-ico", html: ico("chevL", 18), onclick: () => { _calYm = addMonths(ym, -1); renderApp(); } }),
    el("h3", { style: "min-width:170px; text-align:center" }, fmtYm(ym)),
    el("button", { class: "btn btn-ico", html: ico("chevR", 18), onclick: () => { _calYm = addMonths(ym, 1); renderApp(); } }),
    ym !== ymNow ? el("button", { class: "btn btn-sm btn-ghost", onclick: () => { _calYm = ymNow; renderApp(); } }, "Aujourd'hui") : null,
    el("span", { class: "spacer" }),
    el("div", { class: "flex", style: "gap:14px" },
      el("span", { class: "small" }, el("b", { class: "pos mono" }, fmtMoney(totIn, cur, { dec: 0 })), el("span", { class: "muted" }, " entrées")),
      el("span", { class: "small" }, el("b", { class: "mono" }, fmtMoney(totOut, cur, { dec: 0 })), el("span", { class: "muted" }, " sorties")))
  );

  const grid = el("div", { class: "cal-grid mt12" });
  ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"].forEach(d => grid.append(el("div", { class: "cal-dow" }, d)));
  for (let i = 0; i < startDow; i++) grid.append(el("div", { class: "cal-cell out", style: "visibility:hidden" }));

  let run = balance;
  for (let d = 1; d <= dim; d++) {
    const date = ym + "-" + String(d).padStart(2, "0");
    const dayList = flows[date] || [];
    let dayNet = 0;
    dayList.forEach(f => dayNet += f.item.kind === "income" ? f.amount : -f.amount);
    if (run != null) run += dayNet;
    const isToday = date === todayStr();
    const cell = el("div", {
      class: "cal-cell" + (isToday ? " today" : "") + (run != null && run < 0 ? " neg-day" : ""),
      onclick: () => openDayDetail(b, date, dayList)
    },
      el("div", { class: "c-num" }, String(d)),
      el("div", { class: "c-dots" }, dayList.slice(0, 6).map(f => el("i", { style: "background:" + (f.item.kind === "income" ? "var(--accent)" : "var(--tx3)") }))),
      ...dayList.slice(0, 2).map(f => el("div", { class: "c-evt " + (f.item.kind === "income" ? "in" : "exp") },
        `${f.item.kind === "income" ? "+" : "−"}${fmtMoney(f.amount, cur, { dec: 0 })} ${f.item.name}`)),
      dayList.length > 2 ? el("div", { class: "c-evt exp" }, `+${dayList.length - 2} autres…`) : null,
      run != null ? el("div", { class: "c-bal " + (run < 0 ? "neg" : "muted") }, fmtMoney(run, cur, { dec: 0 })) : null
    );
    grid.append(cell);
  }

  const note = balance == null
    ? el("div", { class: "alert a-info mt12" }, el("span", { class: "a-ico", html: ico("info", 16) }),
      el("span", {}, "Mois passé : les échéances planifiées sont affichées, sans solde quotidien."))
    : el("div", { class: "small muted mt12" }, "Le montant en bas de chaque case est le solde projeté en fin de journée. Les cases rouges signalent un passage sous zéro : décalez une échéance pour l'éviter.");

  root.append(el("div", { class: "content-inner" }, head, grid, note));
}

function openDayDetail(b, date, dayList) {
  const cur = b.currency;
  const txs = State.transactions.filter(t => t.budgetId === b.id && t.date === date);
  const m = modal({
    title: fmtDate(date),
    body: el("div", {},

/* ---------- import CSV bancaire ---------- */
function openCsvImport(b) {
  const drop = el("div", { class: "dropzone" }, "Cliquez ou déposez un fichier CSV de votre banque", el("div", { class: "xs muted mt8" }, "Formats acceptés : colonnes date / libellé / montant (ou débit + crédit), séparateur , ou ;"));
  const fileInp = el("input", { type: "file", accept: ".csv,text/csv", style: "display:none" });
  drop.addEventListener("click", () => fileInp.click());
  drop.addEventListener("dragover", e => { e.preventDefault(); drop.classList.add("over"); });
  drop.addEventListener("dragleave", () => drop.classList.remove("over"));
  drop.addEventListener("drop", e => { e.preventDefault(); drop.classList.remove("over"); if (e.dataTransfer.files[0]) parse(e.dataTransfer.files[0]); });
  fileInp.addEventListener("change", () => fileInp.files[0] && parse(fileInp.files[0]));

  const m = modal({ title: "Importer un relevé bancaire", lg: true, body: el("div", {}, drop, fileInp) });

  function parse(file) {
    const reader = new FileReader();
    reader.onload = () => {
      const text = String(reader.result).replace(/^﻿/, "");
      const sep = (text.split("\n")[0].match(/;/g) || []).length >= (text.split("\n")[0].match(/,/g) || []).length ? ";" : ",";
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      const rows = lines.map(l => splitCsvLine(l, sep));
      if (rows.length < 2) { toast("❌ Fichier vide ou illisible"); return; }
      showMapping(rows);
    };
    reader.readAsText(file, "utf-8");
  }

  function splitCsvLine(line, sep) {
    const out = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQ && line[i + 1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (ch === sep && !inQ) { out.push(cur); cur = ""; }
      else cur += ch;
    }
    out.push(cur);
    return out.map(s => s.trim());
  }

  function guessCol(header, patterns) {
    return header.findIndex(h => patterns.some(p => h.toLowerCase().includes(p)));
  }

  function showMapping(rows) {
    const header = rows[0];
    const colOpts = header.map((h, i) => ({ value: i, label: h || `Colonne ${i + 1}` }));
    const none = { value: -1, label: "—" };
    let iDate = guessCol(header, ["date"]);
    let iLabel = guessCol(header, ["libell", "label", "description", "designation", "détail", "detail"]);
    let iAmt = guessCol(header, ["montant", "amount", "valeur"]);
    let iDebit = guessCol(header, ["debit", "débit"]);
    let iCredit = guessCol(header, ["credit", "crédit"]);
    const dateSel = selectInput(colOpts, iDate >= 0 ? iDate : 0);
    const labelSel = selectInput([none, ...colOpts], iLabel >= 0 ? iLabel : -1);
    const amtSel = selectInput([none, ...colOpts], iAmt >= 0 ? iAmt : -1);
    const debitSel = selectInput([none, ...colOpts], iDebit >= 0 ? iDebit : -1);
    const creditSel = selectInput([none, ...colOpts], iCredit >= 0 ? iCredit : -1);

    m.body.innerHTML = "";
    m.body.append(
      el("p", { class: "small muted mb12" }, `${rows.length - 1} lignes détectées. Indiquez quelle colonne contient quoi :`),
      el("div", { class: "form-grid" },
        fField("Date", dateSel), fField("Libellé", labelSel),
        fField("Montant (signé ±)", amtSel),
        el("div", { class: "field" }, el("label", {}, "— ou bien —"), el("div", { class: "xs muted", style: "padding-top:10px" }, "colonnes séparées :")),
        fField("Débit", debitSel), fField("Crédit", creditSel)),
      el("div", { class: "flex mt16" }, el("span", { class: "spacer" }),
        el("button", { class: "btn btn-p", onclick: () => preview(rows, +dateSel.value, +labelSel.value, +amtSel.value, +debitSel.value, +creditSel.value) }, "Analyser →"))
    );
  }

  function parseDate(s) {
    s = s.trim();
    let mt = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (mt) return `${mt[1]}-${mt[2]}-${mt[3]}`;
    mt = s.match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{4})/);
    if (mt) return `${mt[3]}-${mt[2].padStart(2, "0")}-${mt[1].padStart(2, "0")}`;
    mt = s.match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{2})$/);
    if (mt) return `20${mt[3]}-${mt[2].padStart(2, "0")}-${mt[1].padStart(2, "0")}`;
    return null;
  }

  function autoCat(label, kind) {
    for (const [re, catName] of AUTO_CAT_KEYWORDS) {
      if (re.test(label)) {
        const c = b.categories.find(c => c.name === catName && (c.kind === kind));
        if (c) return c.id;
      }
    }
    return null;
  }

  function preview(rows, iDate, iLabel, iAmt, iDebit, iCredit) {
    const parsed = [];
    for (const r of rows.slice(1)) {
      const date = parseDate(r[iDate] || "");
      if (!date) continue;
      let amount = 0;
      if (iAmt >= 0) amount = parseAmount(r[iAmt]);
      else {
        const d = iDebit >= 0 ? Math.abs(parseAmount(r[iDebit])) : 0;
        const c = iCredit >= 0 ? Math.abs(parseAmount(r[iCredit])) : 0;
        amount = c - d;
      }
      if (!amount) continue;
      const label = iLabel >= 0 ? r[iLabel] : "";
      const kind = amount >= 0 ? "income" : "expense";
      parsed.push({ sel: true, date, label, amount: Math.abs(amount), kind, categoryId: autoCat(label, kind) });
    }
    if (!parsed.length) { toast("❌ Aucune ligne exploitable (vérifiez les colonnes)"); return; }
    const dup = new Set(State.transactions.filter(t => t.budgetId === b.id).map(t => `${t.date}|${t.amount}|${(t.label || "").slice(0, 18)}`));
    parsed.forEach(p => { if (dup.has(`${p.date}|${p.amount}|${(p.label || "").slice(0, 18)}`)) p.sel = false; });

    m.body.innerHTML = "";
    const list = el("div", { style: "max-height:46vh; overflow-y:auto" });
    parsed.forEach(p => {
      const chk = el("input", { type: "checkbox", checked: p.sel, onchange: e => p.sel = e.target.checked });
      const cs = catSelect(b, p.kind, p.categoryId, { style: "max-width:200px; min-height:34px; padding:5px 28px 5px 9px; font-size:12.5px" });
      cs.addEventListener("change", () => p.categoryId = cs.value || null);
      list.append(el("div", { class: "flex small", style: "padding:6px 0; border-bottom:1px solid var(--line); gap:8px" },
        chk,
        el("span", { class: "mono xs muted nowrap" }, p.date),

      el("p", { class: "small muted mb8" }, `${parsed.length} transactions détectées, catégorisées automatiquement quand c'est possible.` + (dupCount ? ` ${dupCount} doublon(s) probable(s) décoché(s).` : "")),

"use strict";
/* ============ vue : dettes & crédits ============ */

function viewDebts(root) {
  const b = curBudget();
  const cur = b.currency;
  const ymNow = ymOf(todayStr());

  const totalRemaining = b.debts.reduce((s, d) => {
    const rows = amortize(d);
    const last = [...rows].reverse().find(r => r.ym <= ymNow);
    return s + (last ? last.balance : +d.principal || 0);
  }, 0);
  const totalMonthly = b.debts.reduce((s, d) => s + debtMonthly(d, ymNow), 0);

  const cards = b.debts.map(d => {
    const rows = amortize(d);
    const last = [...rows].reverse().find(r => r.ym <= ymNow);
    const remaining = last ? last.balance : +d.principal || 0;
    const payoff = debtPayoffYm(d);
    const totalInterest = rows.reduce((s, r) => s + r.interest, 0);
    const paidPct = d.principal > 0 ? clamp(1 - remaining / d.principal, 0, 1) : 0;
    const invalid = !rows.length && +d.principal > 0;
    return el("div", { class: "card card-pad" },
      el("div", { class: "flex mb8" },
        el("span", { style: "font-size:22px" }, d.emoji || "💳"),
        el("div", { style: "flex:1; min-width:0" },
          el("h3", { style: "font-size:15.5px" }, d.name),
          el("div", { class: "xs muted" }, `${fmtMoney(d.principal, cur, { dec: 0 })} à ${d.rate || 0} %`)),
        el("button", { class: "btn btn-ghost btn-ico", html: ico("edit", 15), onclick: () => openDebtEditor(b, d) })),
      invalid
        ? el("div", { class: "alert a-danger small" }, "⚠️ Mensualité trop faible : elle ne couvre même pas les intérêts.")
        : el("div", {},
          el("div", { class: "flex small mb8" },
            el("span", { class: "muted" }, "Restant dû"),
            el("span", { class: "spacer" }),
            el("b", { class: "mono", style: "font-size:16px" }, fmtMoney(remaining, cur, { dec: 0 }))),
          el("div", { class: "pbar" }, el("i", { style: `width:${paidPct * 100}%` })),
          el("div", { class: "small muted mt12", style: "line-height:1.7" },
            el("div", {}, `💸 Mensualité : ${fmtMoney((+d.payment || 0) + (+d.extra || 0), cur)}` + (d.extra ? ` (dont ${fmtMoney(d.extra, cur)} de remboursement anticipé)` : "")),
            payoff ? el("div", {}, `🏁 Fin du crédit : ${fmtYm(payoff)}`) : null,
            el("div", {}, `📉 Coût total des intérêts : ${fmtMoney(totalInterest, cur, { dec: 0 })}`)),
          el("button", { class: "btn btn-sm mt12", onclick: () => showAmortTable(b, d) }, "Tableau d'amortissement"))
    );
  });

  root.append(el("div", { class: "content-inner" },
    el("div", { class: "grid g3 mb16" },
      el("div", { class: "card kpi" }, el("div", { class: "k-label" }, "Dette totale restante"), el("div", { class: "k-value" }, fmtMoney(totalRemaining, cur, { dec: 0 }))),
      el("div", { class: "card kpi" }, el("div", { class: "k-label" }, "Mensualités totales"), el("div", { class: "k-value" }, fmtMoney(totalMonthly, cur)), el("div", { class: "k-sub" }, "intégrées automatiquement aux projections")),
      el("div", { class: "card kpi" }, el("div", { class: "k-label" }, "Crédits en cours"), el("div", { class: "k-value" }, String(b.debts.length)))),
    el("div", { class: "flex mb12" },
      el("h3", {}, "💳 Crédits & dettes"),
      el("span", { class: "spacer" }),
      el("button", { class: "btn btn-p btn-sm", html: ico("plus", 14) + "<span>Crédit / dette</span>", onclick: () => openDebtEditor(b, null) })),
    cards.length ? el("div", { class: "grid g3" }, cards)
      : el("div", { class: "card" }, emptyState("💳", "Aucun crédit",
        "Prêt immobilier, crédit auto, prêt étudiant, dette à un proche… L'app calcule la mensualité, la date de fin et le coût des intérêts, et intègre tout aux projections.",
        el("button", { class: "btn btn-p btn-sm", onclick: () => openDebtEditor(b, null) }, "Ajouter un crédit")))
  ));
}

function openDebtEditor(b, debt) {
  const isNew = !debt;
  const d = debt ? { ...debt } : { id: uid(), name: "", emoji: "💳", principal: "", rate: "", payment: "", months: "", extra: 0, startDate: todayStr(), categoryId: null };
  let mode = d.months && !debt ? "months" : (d.payment ? "payment" : "months");

  const nameI = el("input", { class: "input", value: d.name, placeholder: "ex. Prêt immobilier, Crédit auto…" });
  const principalI = moneyInput({ value: d.principal || "", placeholder: "capital emprunté restant" });
  const rateI = moneyInput({ value: d.rate ?? "", cur: "%/an" });
  const startI = el("input", { class: "input", type: "date", value: d.startDate });
  const monthsI = el("input", { class: "input", type: "number", min: 1, max: 600, value: d.months || "", placeholder: "ex. 240" });
  const paymentI = moneyInput({ value: d.payment || "" });
  const extraI = moneyInput({ value: d.extra || "", placeholder: "0" });
  const catSel = catSelect(b, "expense", d.categoryId);
  const hint = el("div", { class: "alert a-info small full", style: "display:none" });

  const seg = segControl([
    { value: "months", label: "Je connais la durée" },
    { value: "payment", label: "Je connais la mensualité" },
  ], mode, v => { mode = v; updateUi(); }, true);
  const monthsField = fField("Durée (en mois)", monthsI);
  const paymentField = fField("Mensualité (hors anticipé)", paymentI);

  function updateUi() {
    monthsField.style.display = mode === "months" ? "" : "none";
    paymentField.style.display = mode === "payment" ? "" : "none";
    recalc();
  }
  function recalc() {
    const P = numVal(principalI), r = numVal(rateI);
    if (!P) { hint.style.display = "none"; return; }
    if (mode === "months" && +monthsI.value > 0) {
      const pay = loanPayment(P, r, +monthsI.value);
      hint.innerHTML = `Mensualité calculée : <b>${fmtMoney(pay, b.currency)}</b> — coût total des intérêts ≈ <b>${fmtMoney(pay * monthsI.value - P, b.currency, { dec: 0 })}</b>`;
      hint.style.display = "";
    } else if (mode === "payment" && numVal(paymentI) > 0) {
      const n = loanMonths(P, r, numVal(paymentI) + numVal(extraI));
      hint.innerHTML = n === Infinity
        ? `⚠️ Cette mensualité ne couvre pas les intérêts : la dette ne sera jamais remboursée.`
        : `Durée calculée : <b>${n} mois</b> (${(n / 12).toFixed(1)} ans) — fin ≈ <b>${fmtYm(addMonths(ymOf(startI.value || todayStr()), n))}</b>`;
      hint.style.display = "";
    } else hint.style.display = "none";
  }
  [principalI.input, rateI.input, monthsI, paymentI.input, extraI.input].forEach(i => i.addEventListener("input", recalc));
  startI.addEventListener("change", recalc);

  const m = modal({
    title: isNew ? "Nouveau crédit / dette" : d.name,
    lg: true,
    body: el("div", {},
      el("div", { class: "mb12" }, seg),
      el("div", { class: "form-grid" },
        fField("Nom", nameI, { full: true }),
        fField("Capital restant à rembourser", principalI),
        fField("Taux annuel (TAEG)", rateI),
        fField("Première mensualité le", startI),
        monthsField, paymentField,
        fField("Remboursement anticipé mensuel (facultatif)", extraI),
        fField("Catégorie de dépense", catSel, { full: true }),
        hint)),
    foot: [
      !isNew ? el("button", {
        class: "btn btn-danger", html: ico("trash", 15), onclick: () => {
          const snap = [...b.debts];
          b.debts = b.debts.filter(x => x.id !== d.id);
          persist(); m.close(); renderApp();
          offerUndo(`Crédit « ${d.name} » supprimé`, () => { b.debts = snap; persist(); renderApp(); });
        }
      }) : el("span"),
      el("span", { class: "spacer" }),
      el("button", { class: "btn", onclick: () => m.close() }, "Annuler"),
      el("button", {
        class: "btn btn-p", onclick: () => {
          d.name = nameI.value.trim() || "Crédit";
          d.principal = numVal(principalI);
          d.rate = numVal(rateI);
          d.startDate = startI.value || todayStr();
          d.extra = numVal(extraI);
          d.categoryId = catSel.value || null;
          if (mode === "months") {
            d.months = +monthsI.value || 12;
            d.payment = round2(loanPayment(d.principal, d.rate, d.months));
          } else {
            d.payment = numVal(paymentI);
            d.months = null;
          }
          if (!d.principal || !d.payment) { toast("⚠️ Capital et durée/mensualité requis"); return; }
          if (isNew) b.debts.push(d);
          else Object.assign(b.debts.find(x => x.id === d.id), d);
          persist(); m.close(); renderApp();
        }
      }, isNew ? "Ajouter" : "Enregistrer")]
  });
  nameI.focus();
  updateUi();
}

function showAmortTable(b, d) {
  const rows = amortize(d);
  const cur = b.currency;
  modal({
    title: "Amortissement — " + d.name,
    lg: true,
    body: el("div", { class: "tbl-wrap", style: "max-height:60vh; overflow-y:auto" },

        el("thead", {}, el("tr", {},

}

function duplicateBudget(src, asScenario) {
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = uid();
  copy.name = asScenario ? src.name + " — scénario" : src.name + " (copie)";
  copy.scenarioOf = asScenario ? src.id : null;
  copy.archived = false;
  copy.createdAt = todayStr();
  // nouveaux identifiants internes (catégories conservées par mapping)
  const idMap = {};
  copy.categories.forEach(c => { const n = uid(); idMap[c.id] = n; c.id = n; });
  copy.categories.forEach(c => { if (c.parentId) c.parentId = idMap[c.parentId]; });
  const subMap = {};
  [...copy.goals, ...copy.accounts, ...copy.events].forEach(x => { const n = uid(); subMap[x.id] = n; x.id = n; });
  copy.debts.forEach(d => { d.id = uid(); d.categoryId = idMap[d.categoryId] || null; });
  copy.items.forEach(it => {
    it.id = uid();
    it.categoryId = idMap[it.categoryId] || null;
    it.savingTo = subMap[it.savingTo] || null;
    it.eventId = subMap[it.eventId] || null;
  });
  State.budgets.push(copy);
  if (asScenario) {
    State.activeBudgetId = copy.id;
    persist(); renderApp();
    toast("🧪 Scénario créé — modifiez librement, l'original est intact");
  } else {
    persist(); renderApp();
    toast("⧉ Budget dupliqué");
  }
}

function buildCompare(budgets) {
  if (_compareIds.length !== 2 || !_compareIds.every(id => budgets.some(b => b.id === id))) {
    _compareIds = [budgets[0].id, budgets[1].id];
  }
  const horizon = Math.min(State.settings.horizonMonths || 24, 120);
  const selA = selectInput(budgets.map(b => ({ value: b.id, label: `${b.emoji} ${b.name}` })), _compareIds[0], { style: "max-width:230px", onchange: e => { _compareIds[0] = e.target.value; renderApp(); } });
  const selB = selectInput(budgets.map(b => ({ value: b.id, label: `${b.emoji} ${b.name}` })), _compareIds[1], { style: "max-width:230px", onchange: e => { _compareIds[1] = e.target.value; renderApp(); } });
  const A = budgetById(_compareIds[0]), B = budgetById(_compareIds[1]);
  const pA = project(A, { months: horizon });
  const pB = project(B, { months: horizon });
  const sameCur = A.currency === B.currency;

  const rows = [
    ["Revenus / mois (moyenne)", avg(pA, "income"), avg(pB, "income")],
    ["Dépenses / mois (moyenne)", avg(pA, "expense"), avg(pB, "expense")],
    ["Capacité d'épargne / mois", avg(pA, "net"), avg(pB, "net")],
    [`Solde dans ${Math.round(horizon / 12 * 10) / 10} an(s)`, pA[pA.length - 1].balance, pB[pB.length - 1].balance],
    ["Patrimoine net à terme", pA[pA.length - 1].netWorth, pB[pB.length - 1].netWorth],
  ];

/* ===== 30-sync.js ===== */
"use strict";
/* ============ synchronisation multi-appareils (Supabase REST, sans dépendance) ============
 *
 * Modèle : un "salon" (room) = un code secret partagé par la famille. Le document complet
 * (réglages + budgets + transactions + tombstones) est stocké dans une ligne Supabase.
 * Fusion par enregistrement : chaque record porte un _rev (timestamp ms). À la fusion, la
 * version la plus récente de chaque record gagne ; les suppressions sont propagées via un
 * cimetière (graveyard) de tombstones. Deux personnes peuvent éditer en même temps sans
 * s'écraser, sauf modification simultanée du MÊME champ du MÊME record (dernier gagne).
 *
 * Transport : REST direct (fetch). Quasi temps réel par interrogation courte (4 s visible).
 * Hors-ligne : tout est mis en pause et reprend automatiquement au retour du réseau.
 */
const Sync = (() => {
  const SUBCOLLS = ["categories", "items", "debts", "goals", "accounts", "events"];
  const GRAVE_TTL = 90 * 86400000; // 90 jours

  let _base = {};            // empreinte du dernier état synchronisé { "type:id": contentString }
  let _pushTimer = null;
  let _pollTimer = null;
  let _busy = false;
  let _pending = false;
  let status = "off";        // off | connecting | synced | syncing | offline | error
  let lastError = "";

  /* ---------- sérialisation stable (ignore _rev) ---------- */
  function stable(v) {
    if (Array.isArray(v)) return "[" + v.map(stable).join(",") + "]";
    if (v && typeof v === "object")
      return "{" + Object.keys(v).filter(k => k !== "_rev").sort()
        .map(k => JSON.stringify(k) + ":" + stable(v[k])).join(",") + "}";
    return JSON.stringify(v);
  }
  function budgetScalar(b) {
    const o = {};
    for (const k in b) if (!SUBCOLLS.includes(k) && k !== "_rev") o[k] = b[k];
    return stable(o);
  }
  function buildBase() {
    const m = {};
    m["settings:_"] = stable(State.settings);
    for (const b of State.budgets) {
      m["budget:" + b.id] = budgetScalar(b);
      for (const sc of SUBCOLLS) for (const r of (b[sc] || [])) m[sc + ":" + r.id] = stable(r);
    }
    for (const t of State.transactions) m["tx:" + t.id] = stable(t);
    return m;
  }

  /* ---------- détection des changements locaux → stamping _rev + tombstones ---------- */
  function stampChanges() {
    const now = Date.now();
    const seen = {};
    const mark = (key, contentNow, rec) => {
      seen[key] = 1;
      if (_base[key] !== contentNow) rec._rev = now;
    };
    { const c = stable(State.settings); seen["settings:_"] = 1; if (_base["settings:_"] !== c) State.settings._rev = now; }
    for (const b of State.budgets) {
      mark("budget:" + b.id, budgetScalar(b), b);
      for (const sc of SUBCOLLS) for (const r of (b[sc] || [])) mark(sc + ":" + r.id, stable(r), r);
    }
    for (const t of State.transactions) mark("tx:" + t.id, stable(t), t);
    // suppressions : présents dans la base mais plus dans l'état courant
    for (const key in _base) {
      if (key === "settings:_") continue;
      if (!seen[key]) State.sync.graveyard[key] = now;
    }
    pruneGraveyard();
    _base = buildBase();
  }
  function pruneGraveyard() {
    const cut = Date.now() - GRAVE_TTL;
    for (const k in State.sync.graveyard) if (State.sync.graveyard[k] < cut) delete State.sync.graveyard[k];
  }

  /* ---------- fusion de deux documents ---------- */
  function mergeArr(a, b, type, grave) {
    const out = {};
    for (const r of (a || [])) out[r.id] = r;
    for (const r of (b || [])) { const ex = out[r.id]; if (!ex || (r._rev || 0) > (ex._rev || 0)) out[r.id] = r; }
    return Object.values(out).filter(r => {
      const g = grave[type + ":" + r.id];
      return !(g && g >= (r._rev || 0));
    });
  }
  function mergeDoc(L, R) {
    const grave = {};
    for (const k in (L.graveyard || {})) grave[k] = L.graveyard[k];
    for (const k in (R.graveyard || {})) grave[k] = Math.max(grave[k] || 0, R.graveyard[k]);
    const settings = ((R.settings && R.settings._rev || 0) > (L.settings && L.settings._rev || 0)) ? R.settings : L.settings;
    const bmap = {};
    for (const x of (L.budgets || [])) (bmap[x.id] = bmap[x.id] || {}).L = x;
    for (const x of (R.budgets || [])) (bmap[x.id] = bmap[x.id] || {}).R = x;
    const budgets = [];
    for (const id in bmap) {
      const bl = bmap[id].L, br = bmap[id].R;
      const rev = Math.max(bl && bl._rev || 0, br && br._rev || 0);
      const g = grave["budget:" + id];
      if (g && g >= rev) continue;
      const base = (bl && br) ? ((br._rev || 0) > (bl._rev || 0) ? br : bl) : (bl || br);
      const merged = Object.assign({}, base);
      for (const sc of SUBCOLLS) merged[sc] = mergeArr(bl && bl[sc], br && br[sc], sc, grave);
      budgets.push(merged);
    }
    const transactions = mergeArr(L.transactions, R.transactions, "tx", grave);
    return { settings, budgets, transactions, graveyard: grave };
  }

  /* ---------- document ⇄ état ---------- */
  const docFromState = () => ({
    settings: State.settings, budgets: State.budgets,
    transactions: State.transactions, graveyard: State.sync.graveyard,
  });
  function applyDoc(doc) {
    if (doc.settings) {
      const localTheme = State.settings.theme; // le thème reste un choix par appareil
      State.settings = doc.settings;
      if (!State.settings.theme) State.settings.theme = localTheme;
    }
    State.budgets = doc.budgets || [];
    State.transactions = doc.transactions || [];
    State.sync.graveyard = doc.graveyard || {};
    if (!State.budgets.find(b => b.id === State.activeBudgetId))
      State.activeBudgetId = (State.budgets.find(b => !b.archived) || State.budgets[0] || {}).id || null;
  }

  /* ---------- chiffrement de bout en bout (AES-256-GCM, clé dérivée du code de salon) ---------- */
  let _keyCache = { room: null, key: null };
  async function roomKey() {
    const room = State.sync.room.trim().toUpperCase();
    if (_keyCache.room === room && _keyCache.key) return _keyCache.key;
    const mat = await crypto.subtle.importKey("raw", new TextEncoder().encode(room), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: new TextEncoder().encode("horizon-budget:" + room), iterations: 150000, hash: "SHA-256" },
      mat, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
    _keyCache = { room, key };
    return key;
  }
  async function encryptDoc(doc) {
    const key = await roomKey();
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(JSON.stringify(doc))));
    const all = new Uint8Array(iv.length + ct.length);
    all.set(iv); all.set(ct, iv.length);
    let bin = ""; for (let i = 0; i < all.length; i += 8192) bin += String.fromCharCode.apply(null, all.subarray(i, i + 8192));
    return { e: btoa(bin) }; // seul un blob chiffré part sur le serveur
  }
  async function decryptDoc(doc) {
    if (!doc) return doc;
    if (!doc.e) return doc; // document historique non chiffré : accepté en lecture
    const bin = atob(doc.e);
    const all = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) all[i] = bin.charCodeAt(i);
    try {
      const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: all.subarray(0, 12) }, await roomKey(), all.subarray(12));
      return JSON.parse(new TextDecoder().decode(pt));
    } catch (e) {
      throw new Error("Déchiffrement impossible — code de salon incorrect ?");
    }
  }

  /* ---------- réseau (Supabase REST) ---------- */
  const cleanUrl = u => (u || "").trim().replace(/\/+$/, "");
  function headers(extra) {
    return Object.assign({
      "apikey": State.sync.anonKey.trim(),
      "Authorization": "Bearer " + State.sync.anonKey.trim(),
      "Content-Type": "application/json",
    }, extra || {});
  }
  const ROOM = () => encodeURIComponent(State.sync.room.trim());
  async function getRow() {
    const u = `${cleanUrl(State.sync.url)}/rest/v1/horizon_rooms?room=eq.${ROOM()}&select=doc,rev`;
    const r = await fetch(u, { headers: headers() });
    if (!r.ok) throw new Error("HTTP " + r.status + (r.status === 404 || r.status === 400 ? " — table introuvable ?" : ""));
    const a = await r.json();
    if (a[0]) a[0].doc = await decryptDoc(a[0].doc);
    return a[0] || null;
  }
  async function insertRow(doc) {
    const u = `${cleanUrl(State.sync.url)}/rest/v1/horizon_rooms`;
    const r = await fetch(u, {
      method: "POST", headers: headers({ Prefer: "return=representation" }),
      body: JSON.stringify([{ room: State.sync.room.trim(), doc: await encryptDoc(doc), rev: 1, updated_at: new Date().toISOString() }]),
    });
    if (!r.ok) return false;
    const a = await r.json().catch(() => []);
    return a.length > 0;
  }
  async function patchRow(doc, expectedRev) {
    const u = `${cleanUrl(State.sync.url)}/rest/v1/horizon_rooms?room=eq.${ROOM()}&rev=eq.${expectedRev}`;
    const r = await fetch(u, {
      method: "PATCH", headers: headers({ Prefer: "return=representation" }),
      body: JSON.stringify({ doc: await encryptDoc(doc), rev: expectedRev + 1, updated_at: new Date().toISOString() }),
    });
    if (!r.ok) return false;
    const a = await r.json().catch(() => []);
    return a.length > 0;
  }

  /* ---------- statut ---------- */
  function setStatus(s, err) {
    status = s; lastError = err || "";
    const chip = document.getElementById("sync-chip");
    if (chip) renderChipInto(chip);
  }
  const STATUS_META = {
    off: ["", "", "", false],
    connecting: ["sync", "Connexion…", "info", true],
    syncing: ["sync", "Synchro…", "info", true],
    synced: ["check", "À jour", "ok", false],
    offline: ["cloud", "Hors-ligne", "mut", false],
    error: ["alert", "Erreur sync", "danger", false],
  };
  function renderChipInto(chip) {
    const [icon, label, tone, spin] = STATUS_META[status] || STATUS_META.off;
    if (status === "off") { chip.style.display = "none"; return; }
    chip.style.display = "";
    chip.className = "sync-chip sc-" + tone;
    chip.title = lastError || (label + (State.sync.room ? " · salon " + State.sync.room : ""));
    chip.innerHTML = `<span class="ico ${spin ? "spin" : ""}" style="width:14px;height:14px;display:inline-grid;place-items:center">${I[icon] || ""}</span><span class="sc-label">${label}</span>`;
    chip.onclick = () => openSyncSetup();
  }
  function chipEl() {
    const chip = el("div", { id: "sync-chip", class: "sync-chip", role: "button", tabindex: 0 });
    renderChipInto(chip);
    return chip;
  }

  /* ---------- cœur : pousser (fusion + écriture concurrente) ---------- */
  async function pushNow() {
    if (!State.sync.enabled) return;
    if (!navigator.onLine) { setStatus("offline"); _pending = true; return; }
    if (_busy) { _pending = true; return; }
    _busy = true; _pending = false;
    setStatus("syncing");
    try {
      stampChanges();
      let local = docFromState();
      let changedRemote = false;
      for (let attempt = 0; attempt < 5; attempt++) {
        const remote = await getRow();
        const merged = remote ? mergeDoc(local, remote.doc || {}) : local;
        const ok = remote ? await patchRow(merged, remote.rev) : await insertRow(merged);
        if (ok) {
          const before = State.budgets.length + State.transactions.length;
          if (remote) { // la fusion peut avoir ramené des changements distants
            const prev = stableDocHash(local);
            applyDoc(merged);
            changedRemote = stableDocHash(docFromState()) !== prev;
          }
          State.sync.lastRev = (remote ? remote.rev : 0) + 1;
          _base = buildBase();
          try { localStorage.setItem(STORE_KEY, JSON.stringify(State)); } catch (e) {}
          setStatus("synced");
          if (changedRemote && !_openModals.length) renderApp();
          _busy = false;
          if (_pending) schedulePush();
          return;
        }
        local = docFromState(); // conflit : on relit et on refusionne
      }
      setStatus("error", "Conflit d'écriture persistant — réessai au prochain changement.");
    } catch (e) {
      setStatus(navigator.onLine ? "error" : "offline", String(e.message || e));
    } finally {
      _busy = false;
      if (_pending && navigator.onLine) schedulePush();
    }
  }
  function stableDocHash(doc) {
    // empreinte rapide indépendante de l'ordre, pour détecter un vrai changement
    return doc.budgets.length + "|" + doc.transactions.length + "|" +
      doc.budgets.reduce((s, b) => s + (b._rev || 0), 0) + "|" +
      doc.transactions.reduce((s, t) => s + (t._rev || 0), 0) + "|" + (doc.settings._rev || 0);
  }

  /* ---------- interrogation périodique ---------- */
  async function poll() {
    if (!State.sync.enabled || _busy || !navigator.onLine) return;
    if (_openModals.length) return; // ne pas perturber une saisie en cours
    try {
      const remote = await getRow();
      if (remote && remote.rev > (State.sync.lastRev || 0)) {
        const merged = mergeDoc(docFromState(), remote.doc || {});
        applyDoc(merged);
        State.sync.lastRev = remote.rev;
        _base = buildBase();
        try { localStorage.setItem(STORE_KEY, JSON.stringify(State)); } catch (e) {}
        setStatus("synced");
        renderApp();
      } else if (status === "offline" || status === "error") setStatus("synced");
    } catch (e) {
      setStatus(navigator.onLine ? "error" : "offline", String(e.message || e));
    }
  }

  /* ---------- planification ---------- */
  function schedulePush() {
    clearTimeout(_pushTimer);
    _pushTimer = setTimeout(pushNow, 1200);
  }
  function startLoop() {
    clearInterval(_pollTimer);
    _pollTimer = setInterval(() => {
      if (document.visibilityState === "visible") poll();
    }, 4000);
  }

  /* ---------- API publique ---------- */
  function init() {
    if (!State.sync.deviceId) State.sync.deviceId = uid();
    _base = buildBase();
    window.addEventListener("online", () => { setStatus("connecting"); pushNow(); poll(); });
    window.addEventListener("offline", () => setStatus("offline"));
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") poll(); });
    if (State.sync.enabled && State.sync.url && State.sync.room) {
      setStatus("connecting");
      startLoop();
      poll().then(pushNow);
    } else setStatus("off");
  }

  async function connect(opts) {
    // opts: {url, anonKey, room, strategy} strategy: merge | pullCloud | pushLocal
    State.sync.url = cleanUrl(opts.url);
    State.sync.anonKey = opts.anonKey.trim();
    State.sync.room = opts.room.trim();
    setStatus("connecting");
    const remote = await getRow(); // lève si table absente / creds faux
    const haveLocal = State.budgets.length > 0;
    const haveRemote = remote && remote.doc && (remote.doc.budgets || []).length > 0;
    if (haveRemote && opts.strategy === "pullCloud") {

    return el("details", { class: "help-card", open },
      el("summary", {}, el("span", { class: "h-emoji" }, s.emoji), el("span", {}, s.title), el("span", { class: "spacer" }), el("span", { class: "h-chev", html: ico("chevD", 16) })),
      el("div", { class: "help-body" }, ...s.body()));
  }) : [emptyState("🔍", "Aucun résultat", "Essayez un autre mot-clé (ex. « synchro », « crédit », « csv »).")]);

  root.append(el("div", { class: "content-inner" },
    el("div", { class: "flex mb16", style: "flex-wrap:wrap; gap:10px" },
      el("div", {}, el("p", { class: "muted", style: "max-width:560px" }, "Tout ce que fait l'application, expliqué simplement. La synchronisation entre appareils a sa propre fiche détaillée.")),
      el("span", { class: "spacer" }), search),
    el("div", { class: "flex mb16", style: "flex-wrap:wrap; gap:8px" },
      el("button", { class: "btn btn-p", html: ico("sync", 15) + "<span>Configurer la synchronisation</span>", onclick: () => openSyncSetup() }),
      el("button", { class: "btn", html: ico("rocket", 15) + "<span>Relancer l'assistant de démarrage</span>", onclick: () => { State.onboarded = false; persist(); location.reload(); } })),
    acc));
}

/* helpers de contenu */
function p(html) { return el("p", { class: "mb8", style: "line-height:1.7", html }); }
function ul(items) { return el("ul", { class: "help-list" }, items.map(i => el("li", { html: i }))); }
function ol(items) { return el("ol", { class: "help-list ol" }, items.map(i => el("li", { html: i }))); }
function tip(html) { return el("div", { class: "alert a-ok mt8", style: "font-size:13px" }, el("span", { class: "a-ico", html: ico("info", 16) }), el("span", { html: "💡 " + html })); }
function warn(html) { return el("div", { class: "alert a-warn mt8", style: "font-size:13px" }, el("span", { class: "a-ico", html: ico("alert", 16) }), el("span", { html })); }
function btn(label, onclick) { return el("button", { class: "btn btn-sm mt8", style: "margin-right:8px", onclick }, label); }


/* ===== 99-app.js ===== */
"use strict";
/* ============ coquille applicative : navigation & rendu ============ */

const VIEWS = {
  dashboard:  { label: "Tableau de bord", icon: "home",    sub: () => "Vue d'ensemble de votre mois", render: viewDashboard },
  budget:     { label: "Budget",          icon: "list",    sub: () => "Revenus & dépenses planifiés", render: viewBudget },
  projection: { label: "Projections",     icon: "trend",   sub: () => "Votre avenir financier, mois par mois", render: viewProjection },
  calendar:   { label: "Calendrier",      icon: "cal",     sub: () => "Échéances & solde au jour le jour", render: viewCalendar },
  tracking:   { label: "Suivi réel",      icon: "receipt", sub: () => "Transactions & prévu vs réel", render: viewTracking },
  goals:      { label: "Objectifs",       icon: "target",  sub: () => "Épargne, projets & intérêts composés", render: viewGoals },
  debts:      { label: "Crédits & dettes",icon: "card",    sub: () => "Mensualités, amortissement, fin de crédit", render: viewDebts },
  events:     { label: "Événements de vie", icon: "zap",   sub: () => "Anticipez les changements de situation", render: viewEvents },
  budgets:    { label: "Mes budgets",     icon: "layers",  sub: () => "Multi-budgets, scénarios & comparaison", render: viewBudgets },
  settings:   { label: "Réglages",        icon: "gear",    sub: () => "Personnalisation, sauvegarde & partage", render: viewSettings },
  help:       { label: "Aide",            icon: "info",    sub: () => "Tutoriels & questions fréquentes", render: viewHelp },
};
const NAV_ORDER = ["dashboard", "budget", "projection", "calendar", "tracking", "goals", "debts", "events"];
const NAV_FOOT = ["budgets", "help", "settings"];
const MOBILE_NAV = ["dashboard", "budget", "projection", "tracking"];

let _view = "dashboard";

function go(view) {
  _view = VIEWS[view] ? view : "dashboard";
  renderApp();
  const c = $(".content");
  if (c) c.scrollTop = 0;
}

function applyTheme() {
  const t = State.settings.theme;
  const dark = t === "dark" || (t === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches);
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  const meta = $('meta[name="theme-color"]');
  if (meta) meta.setAttribute("content", dark ? "#0b1120" : "#13203f");
}
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => State.settings.theme === "auto" && applyTheme());

function renderApp() {
  const app = $("#app");
  if (!app) return;
  const b = curBudget();
  if (!b) { showOnboarding(); return; }
  const v = VIEWS[_view];
  app.innerHTML = "";

  // barre latérale (desktop)
  const sidebar = el("aside", { class: "sidebar" },
    el("div", { class: "brand", html: I.logo + "<span>Horizon<br>Budget</span>" }),
    NAV_ORDER.map(k => navBtn(k)),
    el("div", { class: "nav-sep" }),
    NAV_FOOT.map(k => navBtn(k)),
    el("div", { class: "nav-foot" },
      el("button", { class: "budget-pill", onclick: openBudgetSwitcher, title: "Changer de budget" },
        el("span", { class: "b-ico" }, b.emoji),
        el("span", { class: "b-name" }, b.name, b.scenarioOf ? " 🧪" : ""),
        el("span", { html: ico("swap", 15), style: "opacity:.6" })))
  );

  // barre du haut
  const themeBtn = el("button", {
    class: "btn btn-ghost btn-ico",
    html: ico(document.documentElement.getAttribute("data-theme") === "dark" ? "sun" : "moon", 18),
    title: "Basculer clair/sombre",
    onclick: () => {
      State.settings.theme = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      applyTheme(); persist(); renderApp();
    }
  });
  const topbar = el("div", { class: "topbar" },
    el("div", {},
      el("h1", {}, v.label),
      el("div", { class: "sub" }, `${b.emoji} ${b.name} · ${v.sub()}`)),
    el("div", { class: "topbar-actions" },
      Sync.chipEl(),
      themeBtn));

  const content = el("div", { class: "content" });
  const main = el("main", { class: "main" }, topbar, content);

  // navigation mobile
  const bottomnav = el("nav", { class: "bottomnav" },
    MOBILE_NAV.map(k => el("button", {
      class: _view === k ? "active" : "",
      onclick: () => go(k)
    }, el("span", { class: "ico", html: I[VIEWS[k].icon] }), VIEWS[k].label.split(" ")[0])),
    el("button", {
      class: !MOBILE_NAV.includes(_view) ? "active" : "",
      onclick: openMobileMenu
    }, el("span", { class: "ico", html: I.menu }), "Plus"));

  // bouton d'action rapide
  const fab = el("button", { class: "fab", html: ico("plus", 24), title: "Ajout rapide", onclick: openQuickAdd });

  app.append(sidebar, main, bottomnav, fab);
  v.render(content);

  function navBtn(k) {
    return el("button", {
      class: "nav-item" + (_view === k ? " active" : ""),
      onclick: () => go(k)
    }, el("span", { class: "ico", html: I[VIEWS[k].icon] }), VIEWS[k].label);
  }
}

function openMobileMenu() {
  const m = modal({
    title: "Navigation",
    body: el("div", { style: "display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:4px 0 8px" },
      [...NAV_ORDER, ...NAV_FOOT].map(k => el("button", {
        class: "btn", style: "justify-content:flex-start; padding:12px 14px",
        onclick: () => { m.close(); go(k); }
      }, el("span", { class: "ico", html: I[VIEWS[k].icon], style: "width:18px;height:18px" }), VIEWS[k].label)))
  });
}

function openQuickAdd() {
  const b = curBudget();
  const m = modal({
    title: "Ajout rapide",
    body: el("div", { style: "display:flex; flex-direction:column; gap:8px; padding:4px 0 8px" },
      el("button", { class: "btn", style: "justify-content:flex-start; padding:13px 14px", onclick: () => { m.close(); openTxEditor(b, null); } }, "🧾 Transaction réelle (dépense / revenu du jour)"),
      el("button", { class: "btn", style: "justify-content:flex-start; padding:13px 14px", onclick: () => { m.close(); openItemEditor(b, newItem("expense"), true); } }, "📉 Dépense planifiée (récurrente ou ponctuelle)"),
      el("button", { class: "btn", style: "justify-content:flex-start; padding:13px 14px", onclick: () => { m.close(); openItemEditor(b, newItem("income"), true); } }, "📈 Revenu planifié"),
      el("button", { class: "btn", style: "justify-content:flex-start; padding:13px 14px", onclick: () => { m.close(); openGoalEditor(b, null); } }, "🎯 Objectif d'épargne"),
      el("button", { class: "btn", style: "justify-content:flex-start; padding:13px 14px", onclick: () => { m.close(); openEventEditor(b, null); } }, "🧭 Événement de vie"))
  });
}

function openBudgetSwitcher() {
  const active = State.budgets.filter(x => !x.archived);
  const m = modal({
    title: "Changer de budget",
    body: el("div", { style: "display:flex; flex-direction:column; gap:6px; padding:4px 0 8px" },
      active.map(x => el("button", {
        class: "btn", style: "justify-content:flex-start; padding:11px 13px" + (x.id === State.activeBudgetId ? "; border-color:var(--accent)" : ""),
        onclick: () => { State.activeBudgetId = x.id; persist(); m.close(); renderApp(); }
      }, `${x.emoji} ${x.name}`, x.scenarioOf ? el("span", { class: "tag-scen", style: "margin-left:8px" }, "scénario") : null,
        x.id === State.activeBudgetId ? el("span", { class: "badge b-pos", style: "margin-left:auto" }, "actif") : null)),
      el("button", { class: "btn btn-ghost", style: "justify-content:flex-start", onclick: () => { m.close(); go("budgets"); } }, "📂 Gérer mes budgets…"))
  });
}

/* ---- raccourcis clavier ---- */
document.addEventListener("keydown", e => {
  if (e.target.matches("input, select, textarea") || _openModals.length) return;
  const map = { "1": "dashboard", "2": "budget", "3": "projection", "4": "calendar", "5": "tracking", "6": "goals", "7": "debts", "8": "events" };
  if (map[e.key]) go(map[e.key]);
  if (e.key === "n") { e.preventDefault(); openTxEditor(curBudget(), null); }
});

/* ---- démarrage ---- */
loadState();
applyTheme();
Sync.init();
if (!State.onboarded || !State.budgets.length) showOnboarding();
else renderApp();
window.addEventListener("beforeunload", () => {
  if (window._wipe) return; // effacement volontaire : ne pas re-sauvegarder
  clearTimeout(_saveTimer);
  try { localStorage.setItem(STORE_KEY, JSON.stringify(State)); } catch (e) {}
});

/* ===== enregistrement du service worker (PWA) ===== */
if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
  navigator.serviceWorker.register("./sw.js").then(reg => {
    reg.addEventListener("updatefound", () => {
      const w = reg.installing;
      if (!w) return;
      w.addEventListener("statechange", () => {
        if (w.state === "activated" && navigator.serviceWorker.controller && typeof toast === "function") {
          toast("✨ Nouvelle version installée", { action: "Recharger", onAction: () => location.reload(), ms: 9000 });
        }
      });
    });
  }).catch(() => {});
}
</script>
