/* Phrases de synthèse — factuelles, chiffrées. */
function projSummary(slice, phases, cur) {
  const first = slice[0], last = slice[slice.length - 1];
  const out = [];
  const nwD = last.netWorth - first.netWorth;
  out.push({
    ico: nwD >= 0 ? "📈" : "📉",
    html: `De <b>${fmtYm(first.ym)}</b> à <b>${fmtYm(last.ym)}</b>, le patrimoine net passe de <b>${fmtMoney(first.netWorth, cur, { dec: 0 })}</b> à <b>${fmtMoney(last.netWorth, cur, { dec: 0 })}</b> (${fmtMoney(nwD, cur, { dec: 0, sign: true })}, soit ${fmtMoney(nwD / slice.length, cur, { dec: 0, sign: true })}/mois).`,
  });
  let lowI = 0;
  for (let i = 1; i < slice.length; i++) if (slice[i].balance < slice[lowI].balance) lowI = i;
  const firstNeg = slice.find(r => r.balance < 0);
  if (firstNeg) out.push({ ico: "⚠️", tone: "neg", html: `Solde courant négatif dès <b>${fmtYm(firstNeg.ym)}</b> (${fmtMoney(firstNeg.balance, cur)}). Point bas : ${fmtMoney(slice[lowI].balance, cur)} en ${fmtYm(slice[lowI].ym)}.` });
  else out.push({ ico: "🛟", html: `Solde courant toujours positif sur la fenêtre ; point bas <b>${fmtMoney(slice[lowI].balance, cur)}</b> en ${fmtYm(slice[lowI].ym)}.` });
  if (phases.length > 1) {
    const best = [...phases].sort((a, z) => z.avgNet - a.avgNet)[0];
    const worst = [...phases].sort((a, z) => a.avgNet - z.avgNet)[0];
    out.push({
      ico: "🧭",
      html: `Période la plus favorable : <b>${esc(best.name)}</b> (${fmtMoney(best.avgNet, cur, { sign: true, dec: 0 })}/mois)`
        + (worst !== best ? ` · la plus tendue : <b>${esc(worst.name)}</b> (${fmtMoney(worst.avgNet, cur, { sign: true, dec: 0 })}/mois).` : "."),
    });
  }
  return out;
}

/* Cartes de repères temporels (cliquables → zoome jusqu'à ce repère). */
function repereCards(proj, cur, marks) {
  const base = proj[0].netWorth;
  const cards = [el("div", { class: "mile now" },
    el("div", { class: "m-when" }, "Aujourd'hui · " + proj[0].ym.slice(0, 4)),
    el("div", { class: "m-val" }, fmtMoney(base, cur, { dec: 0 })),
    el("div", { class: "m-delta muted" }, "patrimoine net actuel"))];
  for (const m of marks) {
    if (m > proj.length) continue;
    const idx = Math.min(m - 1, proj.length - 1), val = proj[idx].netWorth, d = val - base;
    const lbl = (MARK_PRESETS.find(x => x.m === m) || { l: m + " mois" }).l;
    cards.push(el("div", {
      class: "mile", style: "cursor:pointer",
      title: "Zoomer jusqu'à ce repère",
      onclick: () => { State.settings.projView = { a: 0, b: Math.min(m, PROJ_MAX - 1) }; persist(); renderApp(); }
    },
      el("div", { class: "m-when" }, `Dans ${lbl} · ${proj[idx].ym.slice(0, 4)}`),
      el("div", { class: "m-val" + (val < 0 ? " neg" : "") }, fmtMoney(val, cur, { dec: 0 })),
      el("div", { class: "m-delta " + (d >= 0 ? "pos" : "neg") }, fmtMoney(d, cur, { dec: 0, sign: true }))));
  }
  return el("div", { class: "miles", style: "padding:0" }, cards);
}

/* Carte d'un chapitre de vie. */
function phaseRow(p, cur) {
  const span = p.ev ? `${fmtYm(p.startYm)} → ${fmtYm(p.endYm)}` : `dès ${fmtYm(p.startYm)}`;
  const yrs = p.months / 12;
  const dur = p.months < 12 ? `${p.months} mois` : `${yrs % 1 === 0 ? yrs : yrs.toFixed(1)} an${yrs >= 2 ? "s" : ""}`;
  return el("div", { class: "phase", style: `--p-col:${p.color}` },
    el("div", { class: "ph-top" }, el("span", { class: "ph-name" }, p.name), el("span", { class: "spacer" }),
      el("span", { class: "badge b-mut nowrap" }, dur)),
    el("div", { class: "ph-when" }, span),
    el("div", { class: "ph-stats" },
      phStat("Flux moyen", fmtMoney(p.avgNet, cur, { sign: true, dec: 0 }) + "/mois", p.avgNet < 0 ? "neg" : "pos"),
      phStat("Patrimoine net en fin", fmtMoney(p.nwEnd, cur, { dec: 0 }), p.nwEnd < 0 ? "neg" : ""),
      phStat("Évolution sur la période", fmtMoney(p.nwDelta, cur, { sign: true, dec: 0 }), p.nwDelta >= 0 ? "pos" : "neg")));

/* ===== 14-calendar.js ===== */
"use strict";
/* ============ vue : calendrier budgétaire ============
 * Quatre vues complémentaires partageant le même moteur de solde :
 *   Mois    — grille classique avec solde projeté & flux du jour
 *   Semaine — colonnes détaillées jour par jour, idéal pour les échéances proches
 *   Agenda  — flux à venir, en liste chronologique, sur un horizon réglable
 *   Année   — 12 mini-mois en carte de chaleur + barres revenus/dépenses
 * Le solde affiché est « projeté en fin de journée » : réel dans le passé
 * (issu des transactions saisies), planifié dans le présent et le futur.
 */

let _calYm = null;          // mois affiché (vue Mois)
let _calView = "month";     // month | week | agenda | year
let _calWeekStart = null;   // lundi de la semaine affichée (vue Semaine)
let _calFilter = "all";     // all | income | expense
let _calShowReal = true;    // superposer les transactions réelles
let _calAgendaDays = 60;    // horizon de la vue Agenda (jours)
let _calYear = null;        // année affichée (vue Année)

/* ---- helpers de dates au jour (les utilitaires globaux travaillent au mois) ---- */
const calAddDays = (s, n) => { const d = toDate(s); d.setDate(d.getDate() + n); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`; };
const calDow = s => (toDate(s).getDay() + 6) % 7;        // lundi = 0 … dimanche = 6
const calIsWeekend = s => calDow(s) >= 5;
const calMondayOf = s => calAddDays(s, -calDow(s));
const _DOW = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];

/* Le flux passe-t-il le filtre de type courant ? */
const calPassesItem = it => _calFilter === "all" || it.kind === _calFilter;

/* Collecte { date: {planned:[{item,amount}], real:[tx]} } sur l'intervalle [from, to]. */
function calCollect(b, from, to) {
  const map = {};
  let ym = ymOf(from);
  const ymEnd = ymOf(to);
  while (ym <= ymEnd) {
    const flows = dayFlows(b, ym);
    for (const [date, list] of Object.entries(flows)) {
      if (date < from || date > to) continue;
      (map[date] = map[date] || { planned: [], real: [] }).planned.push(...list);
    }
    ym = addMonths(ym, 1);
  }
  for (const t of State.transactions) {
    if (t.budgetId !== b.id || t.date < from || t.date > to) continue;
    (map[t.date] = map[t.date] || { planned: [], real: [] }).real.push(t);
  }
  return map;
}

/* Net d'un jour : réel dans le passé, planifié dès le mois en cours. */
function calDayNet(date, cell) {
  const limit = ymOf(todayStr()) + "-01";
  if (date < limit) return cell.real.reduce((s, t) => s + (t.kind === "income" ? +t.amount : -t.amount), 0);
  return cell.planned.reduce((s, f) => s + (f.item.kind === "income" ? f.amount : -f.amount), 0);
}

/* Solde projeté en fin de la journée `date` (réel passé, planifié sinon). */
function calBalanceAt(b, date) {
  const ymNow = ymOf(todayStr());
  if (date < ymNow + "-01") {
    let bal = +b.initialBalance || 0;
    for (const t of State.transactions) {
      if (t.budgetId !== b.id || t.date < b.initialDate || t.date > date) continue;
      bal += t.kind === "income" ? +t.amount : -t.amount;
    }
    return bal;
  }
  let bal = balanceAtMonthStart(b, ymNow);
  let ym = ymNow;
  while (ym <= ymOf(date)) {
    const flows = dayFlows(b, ym);
    for (const [d, list] of Object.entries(flows)) {
      if (d < ymNow + "-01" || d > date) continue;
      list.forEach(f => bal += f.item.kind === "income" ? f.amount : -f.amount);
    }
    ym = addMonths(ym, 1);
  }
  return bal;
}

/* Liste d'affichage unifiée d'un jour (planifié + réel filtrés). */
function calDayEvents(b, cell) {
  const out = [];
  for (const f of cell.planned) {
    if (!calPassesItem(f.item)) continue;
    out.push({ kind: f.item.kind, amount: f.amount, real: false, debt: !!f.item._debt, item: f.item,
      name: f.item.name || (f.item._debt ? "Crédit" : "(sans nom)") });
  }
  if (_calShowReal) for (const t of cell.real) {
    if (_calFilter !== "all" && t.kind !== _calFilter) continue;
    out.push({ kind: t.kind, amount: +t.amount, real: true, tx: t,
      name: t.label || catLabel(b, t.categoryId) });
  }
  return out;
}

/* ============ point d'entrée ============ */
function viewCalendar(root) {
  const b = curBudget();
  const ymNow = ymOf(todayStr());
  if (!_calYm) _calYm = ymNow;
  if (!_calWeekStart) _calWeekStart = calMondayOf(todayStr());
  if (!_calYear) _calYear = +ymNow.slice(0, 4);

  const inner = el("div", { class: "content-inner" });
  inner.append(calToolbar(b));

  if (_calView === "month") calRenderMonth(b, inner);
  else if (_calView === "week") calRenderWeek(b, inner);
  else if (_calView === "agenda") calRenderAgenda(b, inner);
  else calRenderYear(b, inner);

  inner.append(calLegend());
  root.append(inner);
}

/* ---- barre d'outils : vues + filtres ---- */
function calToolbar(b) {
  const seg = segControl([
    { value: "month", label: "Mois" },
    { value: "week", label: "Semaine" },
    { value: "agenda", label: "Agenda" },
    { value: "year", label: "Année" },
  ], _calView, v => { _calView = v; renderApp(); });

  const filterChip = (val, label) => el("button", {
    class: "chip-leg" + (_calFilter === val ? "" : " off"),
    onclick: () => { _calFilter = val; renderApp(); },
  }, label);

  const realChip = el("button", {
    class: "chip-leg" + (_calShowReal ? "" : " off"),
    title: "Superposer les transactions déjà saisies",
    onclick: () => { _calShowReal = !_calShowReal; renderApp(); },
  }, el("span", { class: "cat-dot", style: "background:var(--violet); border-radius:50%" }), "Réel");

  return el("div", { class: "cal-toolbar" },
    seg,
    el("span", { class: "spacer" }),
    el("div", { class: "flex", style: "gap:6px; flex-wrap:wrap" },
      filterChip("all", "Tout"),
      filterChip("income", "Entrées"),
      filterChip("expense", "Sorties"),
      realChip));
}

/* ---- légende des couleurs ---- */
function calLegend() {
  const tag = (cls, txt) => el("span", { class: "cal-leg-item" }, el("i", { class: cls }), txt);
  return el("div", { class: "cal-leg" },
    tag("d-in", "Entrée"),
    tag("d-out", "Sortie"),
    tag("d-real", "Transaction réelle"),
    tag("d-neg", "Solde sous zéro"),
    tag("d-today", "Aujourd'hui"));
}

/* ---- en-tête de navigation commun (précédent / titre / suivant / aujourd'hui) ---- */
function calNav(opts) {
  return el("div", { class: "cal-nav" },
    el("button", { class: "btn btn-ico", html: ico("chevL", 18), onclick: opts.onPrev, title: "Précédent" }),
    el("h3", { class: "cal-nav-title" }, opts.title),
    el("button", { class: "btn btn-ico", html: ico("chevR", 18), onclick: opts.onNext, title: "Suivant" }),
    !opts.todayActive ? el("button", { class: "btn btn-sm btn-ghost", onclick: opts.onToday }, opts.todayLabel || "Aujourd'hui") : null,
    el("span", { class: "spacer" }),
    opts.extra || null);
}

/* ---- bandeau de statistiques compact ---- */
function calStat(label, value, sub, tone) {
  return el("div", { class: "card kpi cal-stat" },
    el("div", { class: "k-label" }, label),
    el("div", { class: "k-value " + (tone || "") }, value),
    el("div", { class: "k-sub" }, sub || ""));
}

/* ============ VUE MOIS ============ */
function calRenderMonth(b, inner) {
  const cur = b.currency;
  const ymNow = ymOf(todayStr());
  const ym = _calYm;
  const isPast = ym < ymNow;
  const dim = daysInMonth(ym);
  const from = ym + "-01", to = ym + "-" + String(dim).padStart(2, "0");
  const data = calCollect(b, from, to);

  const startBal = calBalanceAt(b, calAddDays(from, -1));
  const rows = [];
  let run = startBal, totIn = 0, totOut = 0, lowest = { run: Infinity, date: null };
  let maxFlow = 0;
  for (let d = 1; d <= dim; d++) {
    const date = ym + "-" + String(d).padStart(2, "0");
    const cell = data[date] || { planned: [], real: [] };
    const src = isPast ? cell.real.map(t => ({ kind: t.kind, amount: +t.amount })) : cell.planned.map(f => ({ kind: f.item.kind, amount: f.amount }));
    let dIn = 0, dOut = 0;
    src.forEach(x => x.kind === "income" ? dIn += x.amount : dOut += x.amount);
    totIn += dIn; totOut += dOut;
    run += dIn - dOut;
    if (run < lowest.run) lowest = { run, date };
    maxFlow = Math.max(maxFlow, dIn + dOut);
    rows.push({ date, d, cell, dIn, dOut, run });
  }
  const negDays = rows.filter(r => r.run < 0).length;
  const endBal = rows.length ? rows[rows.length - 1].run : startBal;

  // navigation + raccourci « aller à »
  const jump = el("input", { class: "input cal-jump", type: "month", value: ym, title: "Aller à un mois",
    onchange: e => { if (e.target.value) { _calYm = e.target.value; renderApp(); } } });
  inner.append(calNav({
    title: fmtYm(ym),
    onPrev: () => { _calYm = addMonths(ym, -1); renderApp(); },
    onNext: () => { _calYm = addMonths(ym, 1); renderApp(); },
    onToday: () => { _calYm = ymNow; renderApp(); },
    todayActive: ym === ymNow,
    extra: jump,
  }));

  // statistiques du mois
  const lbl = isPast ? "réel" : "prévu";
  inner.append(el("div", { class: "grid cal-stats" },
    calStat(`Entrées (${lbl})`, fmtMoney(totIn, cur, { dec: 0 }), `${MOIS[+ym.slice(5, 7) - 1]}`, "pos"),
    calStat(`Sorties (${lbl})`, fmtMoney(totOut, cur, { dec: 0 }), `${rows.reduce((s, r) => s + r.cell.planned.length, 0)} échéances planifiées`),
    calStat("Solde net du mois", fmtMoney(totIn - totOut, cur, { dec: 0, sign: true }), totIn - totOut >= 0 ? "le mois rapporte" : "le mois coûte", totIn - totOut < 0 ? "neg" : "pos"),
    calStat("Solde fin de mois", fmtMoney(endBal, cur, { dec: 0 }), isPast ? "solde réel reconstitué" : "projeté", endBal < 0 ? "neg" : "pos"),
    calStat("Jour le plus bas", lowest.date ? fmtMoney(lowest.run, cur, { dec: 0 }) : "—",
      lowest.date ? `le ${+lowest.date.slice(8)} ${MOIS[+ym.slice(5, 7) - 1].slice(0, 4)}.` + (negDays ? ` · ${negDays} j négatif${negDays > 1 ? "s" : ""}` : "") : "",
      lowest.run < 0 ? "neg" : "")));

  // grille
  const grid = el("div", { class: "cal-grid mt12" });
  _DOW.forEach((d, i) => grid.append(el("div", { class: "cal-dow" + (i >= 5 ? " we" : "") }, d)));
  const startDow = calDow(from);
  for (let i = 0; i < startDow; i++) grid.append(el("div", { class: "cal-cell out", style: "visibility:hidden" }));

  for (const r of rows) {
    const isToday = r.date === todayStr();
    const evts = calDayEvents(b, r.cell);
    const inW = maxFlow ? (r.dIn / maxFlow) * 100 : 0;
    const outW = maxFlow ? (r.dOut / maxFlow) * 100 : 0;

    const cell = el("div", {
      class: "cal-cell" + (isToday ? " today" : "") + (calIsWeekend(r.date) ? " we" : "") + (r.run < 0 ? " neg-day" : ""),
      onclick: () => openDayDetail(b, r.date),
    },
      el("div", { class: "c-top" },
        el("div", { class: "c-num" }, String(r.d)),
        evts.length > 3 ? el("span", { class: "c-count" }, "×" + evts.length) : null),
      (r.dIn || r.dOut) ? el("div", { class: "c-bar" },
        el("i", { class: "in", style: "width:" + inW + "%" }),
        el("i", { class: "out", style: "width:" + outW + "%" })) : null,
      el("div", { class: "c-dots" }, evts.slice(0, 8).map(e => el("i", { class: (e.kind === "income" ? "in" : "out") + (e.real ? " real" : "") }))),
      ...evts.slice(0, 3).map(e => el("div", { class: "c-evt " + (e.kind === "income" ? "in" : "exp") + (e.real ? " real" : "") },
        `${e.kind === "income" ? "+" : "−"}${fmtMoney(e.amount, cur, { dec: 0 })} ${e.name}`)),
      evts.length > 3 ? el("div", { class: "c-evt more" }, `+${evts.length - 3} autre${evts.length - 3 > 1 ? "s" : ""}…`) : null,
      el("div", { class: "c-bal " + (r.run < 0 ? "neg" : "muted") }, fmtMoney(r.run, cur, { dec: 0 })));
    grid.append(cell);
  }
  inner.append(grid);

  inner.append(el("div", { class: "small muted mt12" },
    isPast
      ? "Mois passé : soldes et totaux reconstitués à partir des transactions réellement saisies."
      : "Le montant en bas de chaque case est le solde projeté en fin de journée (échéances planifiées). Les cases rouges signalent un passage sous zéro — décalez une échéance pour l'éviter."));
}

/* ============ VUE SEMAINE ============ */
function calRenderWeek(b, inner) {
  const cur = b.currency;
  const start = _calWeekStart;
  const end = calAddDays(start, 6);
  const data = calCollect(b, start, end);
  const thisMonday = calMondayOf(todayStr());

  const title = ymOf(start) === ymOf(end)
    ? `${+start.slice(8)} – ${+end.slice(8)} ${MOIS[+start.slice(5, 7) - 1]} ${start.slice(0, 4)}`
    : `${fmtDateShort(start)} – ${fmtDateShort(end)} ${end.slice(0, 4)}`;
  inner.append(calNav({
    title,
    onPrev: () => { _calWeekStart = calAddDays(start, -7); renderApp(); },
    onNext: () => { _calWeekStart = calAddDays(start, 7); renderApp(); },
    onToday: () => { _calWeekStart = thisMonday; renderApp(); },
    todayActive: start === thisMonday,
    todayLabel: "Cette semaine",
  }));

  let run = calBalanceAt(b, calAddDays(start, -1));
  let wIn = 0, wOut = 0;
  const cols = el("div", { class: "cal-week mt12" });
  for (let i = 0; i < 7; i++) {
    const date = calAddDays(start, i);
    const cell = data[date] || { planned: [], real: [] };
    const evts = calDayEvents(b, cell);
    let dIn = 0, dOut = 0;
    evts.forEach(e => e.kind === "income" ? dIn += e.amount : dOut += e.amount);
    wIn += dIn; wOut += dOut;
    run += calDayNet(date, cell);
    const isToday = date === todayStr();

    const col = el("div", { class: "cal-wk-day" + (isToday ? " today" : "") + (calIsWeekend(date) ? " we" : "") + (run < 0 ? " neg" : ""), onclick: () => openDayDetail(b, date) },
      el("div", { class: "wk-head" },
        el("span", { class: "wk-dow" }, _DOW[i]),
        el("span", { class: "wk-num" }, String(+date.slice(8)))),
      el("div", { class: "wk-body" },
        evts.length
          ? evts.map(e => el("div", { class: "wk-evt" },
            el("span", { class: "wk-dot " + (e.kind === "income" ? "in" : "out") + (e.real ? " real" : "") }),
            el("span", { class: "wk-name" }, e.name),
            el("b", { class: "mono " + (e.kind === "income" ? "pos" : "") }, fmtMoney(e.kind === "income" ? e.amount : -e.amount, cur, { dec: 0, sign: true }))))
          : el("div", { class: "wk-empty" }, "—")),
      el("div", { class: "wk-bal " + (run < 0 ? "neg" : "muted") }, fmtMoney(run, cur, { dec: 0 })));
    cols.append(col);
  }
  inner.append(cols);
  inner.append(el("div", { class: "flex small muted mt12", style: "gap:16px; flex-wrap:wrap" },
    el("span", {}, "Entrées de la semaine : ", el("b", { class: "pos mono" }, fmtMoney(wIn, cur, { dec: 0 }))),
    el("span", {}, "Sorties : ", el("b", { class: "mono" }, fmtMoney(wOut, cur, { dec: 0 }))),
    el("span", {}, "Net : ", el("b", { class: "mono " + (wIn - wOut < 0 ? "neg" : "pos") }, fmtMoney(wIn - wOut, cur, { dec: 0, sign: true })))));
}

/* ============ VUE AGENDA ============ */
function calRenderAgenda(b, inner) {
  const cur = b.currency;
  const today = todayStr();
  const end = calAddDays(today, _calAgendaDays);
  const data = calCollect(b, today, end);

  const horizonSel = selectInput([
    { value: "30", label: "30 jours" },
    { value: "60", label: "60 jours" },
    { value: "90", label: "90 jours" },
    { value: "180", label: "6 mois" },
  ], String(_calAgendaDays), { class: "input cal-jump", style: "width:auto" });
  horizonSel.addEventListener("change", () => { _calAgendaDays = +horizonSel.value; renderApp(); });

  inner.append(el("div", { class: "cal-nav" },
    el("h3", { class: "cal-nav-title", style: "min-width:0" }, "À venir"),
    el("span", { class: "spacer" }),
    el("label", { class: "small muted", style: "display:flex; align-items:center; gap:8px" }, "Horizon", horizonSel)));

  let run = calBalanceAt(b, calAddDays(today, -1));
  const dates = Object.keys(data).filter(d => calDayEvents(b, data[d]).length).sort();
  // pré-calcule le solde courant en parcourant tous les jours (même sans flux)
  const balByDate = {};
  let r = run;
  for (let i = 0; i <= _calAgendaDays; i++) {
    const d = calAddDays(today, i);
    r += calDayNet(d, data[d] || { planned: [], real: [] });
    balByDate[d] = r;
  }

  if (!dates.length) {
    inner.append(emptyState("📭", "Rien à l'horizon", `Aucune échéance planifiée sur les ${_calAgendaDays} prochains jours.`));
    return;
  }

  let total = 0;
  const list = el("div", { class: "cal-agenda mt12" });
  for (const date of dates) {
    const evts = calDayEvents(b, data[date]);
    const dayNet = evts.reduce((s, e) => s + (e.kind === "income" ? e.amount : -e.amount), 0);
    total += dayNet;
    const bal = balByDate[date];
    const diff = Math.round((toDate(date) - toDate(today)) / 86400000);
    const rel = diff === 0 ? "aujourd'hui" : diff === 1 ? "demain" : `dans ${diff} j`;

    list.append(el("div", { class: "ag-day" + (bal < 0 ? " neg" : "") },
      el("div", { class: "ag-date", onclick: () => openDayDetail(b, date) },
        el("span", { class: "ag-d" }, String(+date.slice(8))),
        el("span", { class: "ag-m" }, MOIS[+date.slice(5, 7) - 1].slice(0, 4) + "."),
        el("span", { class: "ag-rel" }, rel)),
      el("div", { class: "ag-evts" },
        evts.map(e => el("div", { class: "ag-evt", onclick: () => calOpenEvent(b, e, date) },
          el("span", { class: "wk-dot " + (e.kind === "income" ? "in" : "out") + (e.real ? " real" : "") }),
          el("span", { class: "ag-name" }, e.name),
          e.debt ? el("span", { class: "badge b-mut", style: "margin-left:6px" }, "crédit") : (e.real ? el("span", { class: "badge b-info", style: "margin-left:6px" }, "réel") : null),
          el("b", { class: "mono " + (e.kind === "income" ? "pos" : ""), style: "margin-left:auto" }, fmtMoney(e.kind === "income" ? e.amount : -e.amount, cur, { dec: 0, sign: true }))))),
      el("div", { class: "ag-bal" },
        el("span", { class: "xs muted" }, "solde projeté"),
        el("b", { class: "mono " + (bal < 0 ? "neg" : "") }, fmtMoney(bal, cur, { dec: 0 })))));
  }
  inner.append(list);
  inner.append(el("div", { class: "small muted mt12" },
    `Solde net cumulé sur l'horizon : `, el("b", { class: "mono " + (total < 0 ? "neg" : "pos") }, fmtMoney(total, cur, { dec: 0, sign: true })),
    ` · solde projeté au ${fmtDate(end)} : `, el("b", { class: "mono " + (balByDate[end] < 0 ? "neg" : "") }, fmtMoney(balByDate[end], cur, { dec: 0 }))));
}

/* ============ VUE ANNÉE ============ */
function calRenderYear(b, inner) {
  const cur = b.currency;
  const ymNow = ymOf(todayStr());
  const year = _calYear;
  const thisYear = +ymNow.slice(0, 4);

  inner.append(calNav({
    title: String(year),
    onPrev: () => { _calYear = year - 1; renderApp(); },
    onNext: () => { _calYear = year + 1; renderApp(); },
    onToday: () => { _calYear = thisYear; renderApp(); },
    todayActive: year === thisYear,
    todayLabel: "Cette année",
  }));

  const months = [];
  let yIn = 0, yOut = 0;
  for (let mo = 1; mo <= 12; mo++) {
    const ym = year + "-" + String(mo).padStart(2, "0");
    const isPast = ym < ymNow;
    const flows = dayFlows(b, ym);
    const dim = daysInMonth(ym);
    const dayNet = {};
    let mIn = 0, mOut = 0;
    for (const [date, list] of Object.entries(flows)) {
      list.forEach(f => { if (f.item.kind === "income") mIn += f.amount; else mOut += f.amount; });
    }
    if (isPast) { // remplace par le réel
      mIn = 0; mOut = 0;
      const r = realMonthByCat(b, ym); mIn = r.income; mOut = r.expense;
    }
    // net par jour pour la carte de chaleur
    for (let d = 1; d <= dim; d++) {
      const date = ym + "-" + String(d).padStart(2, "0");
      const cell = { planned: flows[date] || [], real: State.transactions.filter(t => t.budgetId === b.id && t.date === date) };
      dayNet[d] = calDayNet(date, cell);
    }
    yIn += mIn; yOut += mOut;
    months.push({ ym, mo, isPast, mIn, mOut, net: mIn - mOut, dayNet, dim });
  }
  const maxAbs = Math.max(1, ...months.flatMap(m => Object.values(m.dayNet).map(Math.abs)));

  inner.append(el("div", { class: "grid cal-stats mt12" },
    calStat("Entrées de l'année", fmtMoney(yIn, cur, { dec: 0 }), `${year}`, "pos"),
    calStat("Sorties de l'année", fmtMoney(yOut, cur, { dec: 0 }), "réel + planifié"),
    calStat("Solde net annuel", fmtMoney(yIn - yOut, cur, { dec: 0, sign: true }), yIn - yOut >= 0 ? "capacité d'épargne" : "déficit", yIn - yOut < 0 ? "neg" : "pos")));

  const gridY = el("div", { class: "cal-year mt12" });
  for (const m of months) {
    const isCur = m.ym === ymNow;
    const startDow = calDow(m.ym + "-01");
    const mini = el("div", { class: "ym-grid" });
    for (let i = 0; i < startDow; i++) mini.append(el("i", { class: "ym-pad" }));
    for (let d = 1; d <= m.dim; d++) {
      const net = m.dayNet[d] || 0;
      const date = m.ym + "-" + String(d).padStart(2, "0");
      const intensity = Math.min(1, Math.abs(net) / maxAbs);
      const op = net === 0 ? 0 : 0.18 + intensity * 0.72;
      const color = net > 0 ? "var(--accent)" : "var(--danger)";
      mini.append(el("i", {
        class: "ym-cell" + (date === todayStr() ? " today" : ""),
        style: net === 0 ? "" : `background:${color}; opacity:${op.toFixed(2)}`,
        title: `${d} ${MOIS[m.mo - 1].slice(0, 4)}. · ${fmtMoney(net, cur, { dec: 0, sign: true })}`,
      }));
    }
    gridY.append(el("div", { class: "ym-card" + (isCur ? " cur" : ""), onclick: () => { _calYm = m.ym; _calView = "month"; renderApp(); } },
      el("div", { class: "ym-head" },
        el("span", { class: "ym-name" }, MOIS_C[m.mo - 1]),
        el("b", { class: "mono " + (m.net < 0 ? "neg" : m.net > 0 ? "pos" : "muted") }, fmtMoney(m.net, cur, { dec: 0, sign: true }))),
      mini,
      el("div", { class: "ym-foot xs muted" }, m.isPast ? "réel" : isCur ? "en cours" : "prévu")));
  }
  inner.append(gridY);

  // barres revenus / dépenses des 12 mois
  inner.append(el("div", { class: "card mt12" },
    el("div", { class: "card-head" }, el("h3", {}, "Revenus & dépenses mois par mois")),
    el("div", { class: "card-pad" }, chartBars({
      labels: months.map(m => m.ym),
      pos: months.map(m => m.mIn),
      neg: months.map(m => m.mOut),
      cur, height: 230,
    }))));
}

/* ---- ouvrir l'élément cliqué dans l'agenda (poste planifié ou transaction) ---- */
function calOpenEvent(b, e, date) {
  if (e.real && e.tx) { openTxEditor(b, e.tx); return; }
  if (e.debt) { go("debts"); return; }
  if (e.item && e.item.id) {
    const it = b.items.find(x => x.id === e.item.id);
    if (it) { openItemEditor(b, it, false); return; }
  }
  openDayDetail(b, date);
}

/* ============ détail d'un jour ============ */
function openDayDetail(b, date) {
  const cur = b.currency;
  const dim = daysInMonth(ymOf(date));
  const dayList = (dayFlows(b, ymOf(date))[date] || []);
  const txs = State.transactions.filter(t => t.budgetId === b.id && t.date === date);
  const startBal = calBalanceAt(b, calAddDays(date, -1));
  const endBal = calBalanceAt(b, date);
  const dowName = ["dimanche", "lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi"][toDate(date).getDay()];

  const m = modal({
    title: fmtDate(date),
    body: el("div", {},
      el("div", { class: "small muted", style: "margin:-4px 0 12px" }, dowName.charAt(0).toUpperCase() + dowName.slice(1)),

      // bandeau solde du jour
      el("div", { class: "day-bal" + (endBal < 0 ? " neg" : "") },
        el("div", {}, el("div", { class: "xs muted" }, "Solde début de journée"), el("b", { class: "mono" }, fmtMoney(startBal, cur, { dec: 0 }))),
        el("span", { class: "ico", html: ico("chevR", 16), style: "opacity:.5" }),
        el("div", { style: "text-align:right" }, el("div", { class: "xs muted" }, "Projeté fin de journée"), el("b", { class: "mono " + (endBal < 0 ? "neg" : "pos") }, fmtMoney(endBal, cur, { dec: 0 })))),
      endBal < 0 ? el("div", { class: "alert a-danger mt12", style: "padding:9px 12px" }, el("span", { class: "a-ico", html: ico("alert", 15) }),
        el("span", {}, "Solde négatif ce jour-là. Décalez une dépense ou avancez une rentrée pour repasser au-dessus de zéro.")) : null,

      // échéances planifiées
      el("div", { class: "day-sec" }, "Échéances planifiées"),
      dayList.length ? el("div", { class: "row-list day-list" }, dayList.map(f => {
        const editable = f.item.id && !f.item._debt;
        return el("div", { class: "flex day-row" + (editable || f.item._debt ? " click" : ""), onclick: editable ? () => { m.close(); openItemEditor(b, b.items.find(x => x.id === f.item.id), false); } : (f.item._debt ? () => { m.close(); go("debts"); } : null) },
          el("span", { class: "wk-dot " + (f.item.kind === "income" ? "in" : "out") }),
          el("span", {}, f.item.name || (f.item._debt ? "Crédit" : "(sans nom)"),
            f.item._debt ? el("span", { class: "badge b-mut", style: "margin-left:8px" }, "crédit") : (f.item.categoryId ? el("span", { class: "xs muted", style: "margin-left:8px" }, catLabel(b, f.item.categoryId)) : null)),
          el("span", { class: "spacer" }),
          el("b", { class: "mono " + (f.item.kind === "income" ? "pos" : "") }, fmtMoney(f.item.kind === "income" ? f.amount : -f.amount, cur, { sign: true })),
          editable ? el("span", { class: "ico day-edit", html: ico("chevR", 14) }) : null);
      })) : el("p", { class: "small muted" }, "Aucune échéance planifiée ce jour."),

      // transactions réelles
      el("div", { class: "day-sec mt16" }, "Transactions réelles"),
      txs.length ? el("div", { class: "row-list day-list" }, txs.map(t =>
        el("div", { class: "flex day-row click", onclick: () => { m.close(); openTxEditor(b, t); } },
          el("span", { class: "wk-dot real " + (t.kind === "income" ? "in" : "out") }),
          el("span", {}, t.label || catLabel(b, t.categoryId)),
          el("span", { class: "spacer" }),
          el("b", { class: "mono " + (t.kind === "income" ? "pos" : "") }, fmtMoney(t.kind === "income" ? +t.amount : -t.amount, cur, { sign: true })),
          el("span", { class: "ico day-edit", html: ico("edit", 13) })))) : el("p", { class: "small muted" }, "Aucune transaction saisie ce jour.")),
    foot: [
      el("div", { class: "flex", style: "gap:6px; flex-wrap:wrap" },
        el("button", { class: "btn btn-sm", html: ico("plus", 14) + "<span>Transaction</span>", onclick: () => { m.close(); openTxEditor(b, null, date); } }),
        el("button", { class: "btn btn-sm btn-ghost", onclick: () => { m.close(); calAddPlanned(b, "expense", date); } }, "📉 Dépense prévue"),
        el("button", { class: "btn btn-sm btn-ghost", onclick: () => { m.close(); calAddPlanned(b, "income", date); } }, "📈 Revenu prévu")),
      el("span", { class: "spacer" }),
      el("button", { class: "btn btn-p", onclick: () => m.close() }, "Fermer"),
    ],
  });
}

/* Crée un poste planifié pré-rempli sur une date donnée. */
function calAddPlanned(b, kind, date) {
  const it = newItem(kind);
  it.startDate = date;
  it.day = clamp(+date.slice(8), 1, 28);
  openItemEditor(b, it, true);
}


/* ===== 15-tracking.js ===== */
"use strict";
/* ============ vue : suivi réel (transactions, prévu vs réel, import CSV) ============ */

let _trackYm = null;
let _trackSearch = "";

function viewTracking(root) {
  const b = curBudget();
  const cur = b.currency;
  const ymNow = ymOf(todayStr());
  if (!_trackYm) _trackYm = ymNow;
  const ym = _trackYm;

  const real = realMonthByCat(b, ym);
  const planned = plannedMonth(b, ym);
  const remaining = planned.expense - real.expense;

  const head = el("div", { class: "flex", style: "flex-wrap:wrap; gap:10px" },
    el("button", { class: "btn btn-ico", title: "Mois précédent", html: ico("chevL", 18), onclick: () => { _trackYm = addMonths(ym, -1); renderApp(); } }),
    el("h3", { style: "min-width:170px; text-align:center" }, fmtYm(ym)),
    el("button", { class: "btn btn-ico", title: "Mois suivant", html: ico("chevR", 18), onclick: () => { _trackYm = addMonths(ym, 1); renderApp(); } }),
    el("span", { class: "spacer" }),
    el("button", { class: "btn btn-sm", html: ico("flag", 15) + "<span>Bilan du mois</span>", onclick: () => MonthReview.open(b, ym) }),
    el("button", { class: "btn btn-sm", html: ico("up", 15) + "<span>Importer CSV</span>", onclick: () => openCsvImport(b) }),
    el("button", { class: "btn btn-sm", html: ico("down", 15) + "<span>Exporter</span>", onclick: exportTransactionsCSV }),
    el("button", { class: "btn btn-p btn-sm", html: ico("plus", 15) + "<span>Transaction</span>", onclick: () => openTxEditor(b, null, ym === ymNow ? todayStr() : ym + "-01") })
  );

  const kpis = el("div", { class: "grid g3" },
    kpiBox("Dépensé ce mois", fmtMoney(real.expense, cur), planned.expense ? `sur ${fmtMoney(planned.expense, cur)} prévus` : "rien de prévu", real.expense > planned.expense && planned.expense > 0 ? "neg" : ""),
    kpiBox("Reste à dépenser", fmtMoney(Math.max(0, remaining), cur), remaining < 0 ? `dépassement de ${fmtMoney(-remaining, cur)}` : "avant d'atteindre le budget prévu", remaining < 0 ? "neg" : "pos"),
    kpiBox("Revenus encaissés", fmtMoney(real.income, cur), planned.income ? `sur ${fmtMoney(planned.income, cur)} prévus` : "", "pos")
  );

  // prévu vs réel par catégorie
  const catIds = new Set([...Object.keys(planned.byCat), ...Object.keys(real.byCat)]);
  const rows = [...catIds].map(id => {
    const c = catById(b, id);
    return { id, cat: c, plan: planned.byCat[id] || 0, spent: real.byCat[id] || 0 };
  }).filter(r => r.plan > 0.005 || r.spent > 0.005).sort((a, z) => z.plan + z.spent - a.plan - a.spent);

  const compareCard = el("div", { class: "card" },
    el("div", { class: "card-head" }, el("h3", {}, "Prévu vs réel par catégorie")),
    rows.length ? el("div", { class: "card-pad", style: "display:flex; flex-direction:column; gap:13px" },
      rows.map(r => {
        const pct = r.plan > 0 ? r.spent / r.plan : (r.spent > 0 ? 2 : 0);
        return el("div", {},
          el("div", { class: "flex small", style: "margin-bottom:5px" },
            el("span", {}, `${r.cat ? r.cat.emoji + " " + r.cat.name : "💳 Crédits & sans catégorie"}`),
            el("span", { class: "spacer" }),
            el("span", { class: "mono " + (pct > 1.001 ? "neg" : "muted") },
              `${fmtMoney(r.spent, cur, { dec: 0 })} / ${fmtMoney(r.plan, cur, { dec: 0 })}`)),
          el("div", { class: "pbar" + (pct > 1.001 ? " over" : "") },
            el("i", { style: `width:${clamp(pct, 0, 1) * 100}%; background:${pct > 1.001 ? "" : (r.cat ? r.cat.color : "var(--accent)")}` }))
        );
      })
    ) : emptyState("📊", "Rien à comparer", "Ajoutez des transactions ou planifiez des postes pour voir la comparaison.")
  );

  // liste des transactions — recherche : seule la liste se reconstruit (le champ garde le focus)
  const txCount = el("h3", {});
  const txList = el("div", {});
  function buildTxList() {
    const txs = State.transactions
      .filter(t => t.budgetId === b.id && ymOf(t.date) === ym)
      .filter(t => !_trackSearch || (t.label || "").toLowerCase().includes(_trackSearch) || catLabel(b, t.categoryId).toLowerCase().includes(_trackSearch))
      .sort((a, z) => z.date.localeCompare(a.date));
    txCount.textContent = `Transactions (${txs.length})`;
    txList.innerHTML = "";
    txList.append(txs.length ? el("div", { class: "row-list", style: "padding:6px 0 8px" }, txs.map(t => {
      const c = catById(b, t.categoryId);
      return el("div", { class: "item-row", onclick: () => openTxEditor(b, t) },
        el("div", { class: "i-emoji" }, c ? c.emoji : (t.kind === "income" ? "💶" : "🧾")),
        el("div", { class: "i-main" },
          el("div", { class: "i-name" }, t.label || catLabel(b, t.categoryId)),
          el("div", { class: "i-sub" }, fmtDate(t.date) + " · " + ((t.splits && t.splits.length)
            ? t.splits.map(s => `${catLabel(b, s.categoryId)} ${fmtMoney(s.amount, cur, { dec: 0 })}`).join(" + ")
            : catLabel(b, t.categoryId)))),
        el("div", { class: "i-amt " + (t.kind === "income" ? "pos" : "") },
          fmtMoney(t.kind === "income" ? +t.amount : -t.amount, cur, { sign: true }))
      );
    })) : emptyState("🧾", _trackSearch ? "Aucun résultat" : "Aucune transaction ce mois-ci",
      _trackSearch ? "Aucune transaction ne correspond à cette recherche sur ce mois." : "Saisissez vos dépenses au fil de l'eau ou importez un relevé bancaire CSV pour comparer le réel au prévu.",
      _trackSearch ? null : el("button", { class: "btn btn-p btn-sm", onclick: () => openTxEditor(b, null) }, "Première transaction")));
  }
  buildTxList();

  const search = el("div", { class: "searchbar" },
    el("span", { html: ico("search", 15) }),
    el("input", {
      class: "input", placeholder: "Rechercher…", value: _trackSearch,
      oninput: debounce(e => { _trackSearch = e.target.value.toLowerCase(); buildTxList(); }, 200)
    }));

  const listCard = el("div", { class: "card", style: "overflow:hidden" },
    el("div", { class: "card-head" }, txCount, el("span", { class: "spacer" }), search),
    txList
  );

  // suggestions issues de l'historique : récurrences, dérives de montant ou de date
  const suggestions = Intel.detectRecurring(b);
  const suggCard = suggestions.length ? el("div", { class: "card" },
    el("div", { class: "card-head" },
      el("h3", {}, "Régularités détectées"),
      el("span", { class: "spacer" }),
      el("span", { class: "xs muted" }, "d'après vos transactions")),
    el("div", { class: "card-pad", style: "display:flex; flex-direction:column; gap:12px" },
      suggestions.slice(0, 4).map(sg => el("div", { class: "flex", style: "gap:10px; flex-wrap:wrap" },
        el("div", { class: "small", style: "flex:1; min-width:220px; line-height:1.55" }, sg.text),
        el("div", { class: "flex", style: "gap:6px" },
          el("button", {
            class: "btn btn-sm btn-p", onclick: () => {
              const msg = sg.apply();
              Intel.dismiss(sg.id);
              persist(); renderApp();
              toast("✅ " + msg);
            }
          }, "Appliquer"),
          el("button", { class: "btn btn-sm btn-ghost", onclick: () => { Intel.dismiss(sg.id); persist(); renderApp(); } }, "Ignorer"))
      )))
  ) : null;

  const grid = el("div", { class: "dash-grid" });
  Custom.renderInto(grid, "page.tracking", [
    { id: "head", node: head, span: 12 }, { id: "kpis", node: kpis, span: 12 }, { id: "sugg", node: suggCard, span: 12 },
    { id: "compare", node: compareCard, span: 6 }, { id: "list", node: listCard, span: 6 },
  ], { axis: "grid" });
  root.append(el("div", { class: "content-inner" }, grid));

  function kpiBox(label, value, sub, tone) {
    return el("div", { class: "card kpi" },
      el("div", { class: "k-label" }, label),
      el("div", { class: "k-value " + (tone || "") }, value),
      el("div", { class: "k-sub" }, sub));
  }
}

/* ---------- éditeur de transaction ---------- */
function openTxEditor(b, tx, defaultDate) {
  const isNew = !tx;
  const t = tx ? { ...tx } : { id: uid(), budgetId: b.id, date: defaultDate || todayStr(), kind: "expense", amount: "", categoryId: null, label: "", notes: "" };
  let kind = t.kind;

  const amountInp = moneyInput({ value: t.amount || "", autofocus: true });
  const labelInp = el("input", { class: "input", value: t.label, placeholder: "ex. Courses Carrefour" });
  const dateInp = el("input", { class: "input", type: "date", value: t.date });
  let catTouched = !!t.categoryId;
  const hint = el("div", { class: "xs predict-hint" });
  let catSel = catSelect(b, kind, t.categoryId, {}, { label: t.label });
  const catWrap = el("div", {}, catSel);
  const bindCat = () => catSel.addEventListener("change", () => catTouched = true);
  bindCat();
  let splits = (t.splits || []).map(s => ({ ...s }));
  const catZone = el("div", { class: "field full" });

  // prédiction live : en tapant le libellé, la catégorie et le montant habituel se proposent
  function predict() {
    const label = labelInp.value.trim();
    const s = label ? Intel.suggest(b, label, kind) : null;
    if (!s || !s.categoryId) { hint.textContent = ""; return; }
    if (!catTouched && !splits.length) catSel.value = s.categoryId;
    const usual = s.usual > 0 ? ` · ~${fmtMoney(s.usual, b.currency, { dec: 0 })} d'habitude` : "";
    hint.textContent = `✨ ${s.source === "appris" ? "Appris" : "Suggéré"} : ${catLabel(b, s.categoryId)}${usual}`;
    if (s.usual > 0 && !numVal(amountInp)) amountInp.input.placeholder = String(round2(s.usual)).replace(".", ",");
  }
  labelInp.addEventListener("input", debounce(predict, 250));
  predict();

  function renderCatZone() {
    catZone.innerHTML = "";
    if (!splits.length) {
      catZone.append(el("label", {}, "Catégorie"), catWrap,
        el("button", {
          class: "btn btn-sm btn-ghost", style: "margin-top:8px",
          onclick: () => {
            const total = Math.abs(numVal(amountInp)) || 0;
            splits = Intel.splitFor(b, labelInp.value, total) || [{ categoryId: catSel.value || null, amount: total }];
            renderCatZone();
          }
        }, "÷ Ventiler en plusieurs catégories"));
      return;
    }
    catZone.append(el("label", {}, "Ventilation par catégorie"));
    const rest = el("span", { class: "xs muted" });
    const refreshRest = () => {
      const total = Math.abs(numVal(amountInp)) || 0;
      const d = round2(total - splits.reduce((s, x) => s + (+x.amount || 0), 0));
      rest.textContent = d ? `Reste à répartir : ${fmtMoney(d, b.currency)}` : "Ventilation complète ✓";
      rest.className = "xs " + (d ? "neg" : "pos");
    };
    const list = el("div", { style: "display:flex; flex-direction:column; gap:8px" });
    splits.forEach((sp, i) => {
      const amtI = moneyInput({ value: sp.amount || "", oninput: e => { sp.amount = parseAmount(e.target.value); refreshRest(); } });
      const cs = catSelect(b, kind, sp.categoryId, { style: "flex:1; min-width:0" });
      cs.addEventListener("change", () => sp.categoryId = cs.value || null);
      list.append(el("div", { class: "flex", style: "gap:8px" },
        el("div", { style: "width:130px; flex:none" }, amtI), cs,
        el("button", { class: "btn btn-ico btn-ghost", title: "Supprimer", html: ico("x", 15), onclick: () => { splits.splice(i, 1); renderCatZone(); } })));
    });
    catZone.append(list,
      el("div", { class: "flex", style: "gap:8px; margin-top:8px; flex-wrap:wrap" },
        el("button", { class: "btn btn-sm", onclick: () => { splits.push({ categoryId: null, amount: 0 }); renderCatZone(); } }, "+ Ligne"),
        el("button", { class: "btn btn-sm btn-ghost", onclick: () => { splits = []; renderCatZone(); } }, "Annuler la ventilation"),
        el("span", { class: "spacer" }), rest));
    refreshRest();
  }
  renderCatZone();

  const seg = segControl([{ value: "expense", label: "Dépense" }, { value: "income", label: "Revenu" }], kind, v => {
    kind = v;
    const ns = catSelect(b, kind, null, {}, { label: labelInp.value });
    catWrap.innerHTML = ""; catWrap.append(ns); catSel = ns;
    catTouched = false; bindCat();
    splits = [];                        // les catégories de l'autre type ne s'appliquent plus
    renderCatZone();
    predict();
  });

  const m = modal({
    title: isNew ? "Nouvelle transaction" : "Modifier la transaction",
    body: el("div", {},
      el("div", { class: "flex mb12" }, seg),
      el("div", { class: "form-grid" },
        fField("Montant", amountInp),
        fField("Date", dateInp),
        fField("Libellé", el("div", {}, labelInp, hint), { full: true }),
        catZone)),
    foot: [
      !isNew ? el("button", {
        class: "btn btn-danger", html: ico("trash", 15),
        onclick: () => {
          const snap = [...State.transactions];
          State.transactions = State.transactions.filter(x => x.id !== t.id);
          persist(); m.close(); renderApp();
          offerUndo("Transaction supprimée", () => { State.transactions = snap; persist(); renderApp(); });
        }
      }) : el("span"),
      el("span", { class: "spacer" }),
      el("button", { class: "btn", onclick: () => m.close() }, "Annuler"),
      el("button", {
        class: "btn btn-p", onclick: () => {
          t.kind = kind;
          t.amount = Math.abs(numVal(amountInp));
          if (!t.amount) { toast("⚠️ Montant manquant"); return; }
          t.date = dateInp.value || todayStr();
          t.label = labelInp.value.trim();
          if (splits.length) {
            const clean = splits.filter(s => +s.amount > 0).map(s => ({ categoryId: s.categoryId || null, amount: round2(+s.amount) }));
            const sum = round2(clean.reduce((s, x) => s + x.amount, 0));
            if (Math.abs(sum - t.amount) > 0.011) { toast(`⚠️ Ventilation : ${fmtMoney(sum, b.currency)} répartis sur ${fmtMoney(t.amount, b.currency)}`); return; }
            t.splits = clean;
            t.categoryId = null;
          } else {
            t.splits = undefined;
            t.categoryId = catSel.value || null;
          }
          if (isNew) State.transactions.push(t);
          else Object.assign(State.transactions.find(x => x.id === t.id), t);
          Intel.learn(b, t);            // mémorise marchand → catégorie (et les ventilations)
          persist();
          if (isNew) { Juice.buzz(10); toast("Transaction ajoutée", { ms: 1600 }); }
          m.close(); renderApp();
        }
      }, isNew ? "Ajouter" : "Enregistrer"),
    ]
  });
}

/* ---------- import CSV bancaire ---------- */
function openCsvImport(b) {
  const drop = el("div", { class: "dropzone" }, "Cliquez ou déposez un fichier CSV de votre banque", el("div", { class: "xs muted mt8" }, "Formats acceptés : colonnes date / libellé / montant (ou débit + crédit), séparateur , ou ;"));
  const fileInp = el("input", { type: "file", accept: ".csv,text/csv", style: "display:none" });
  drop.addEventListener("click", () => fileInp.click());
  drop.addEventListener("dragover", e => { e.preventDefault(); drop.classList.add("over"); });
  drop.addEventListener("dragleave", () => drop.classList.remove("over"));
  drop.addEventListener("drop", e => { e.preventDefault(); drop.classList.remove("over"); if (e.dataTransfer.files[0]) parse(e.dataTransfer.files[0]); });
  fileInp.addEventListener("change", () => fileInp.files[0] && parse(fileInp.files[0]));

  const m = modal({ title: "Importer un relevé bancaire", lg: true, body: el("div", {}, drop, fileInp) });

  function parse(file) {
    const reader = new FileReader();
    reader.onload = () => {
      const text = String(reader.result).replace(/^﻿/, "");
      const sep = (text.split("\n")[0].match(/;/g) || []).length >= (text.split("\n")[0].match(/,/g) || []).length ? ";" : ",";
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      const rows = lines.map(l => splitCsvLine(l, sep));
      if (rows.length < 2) { toast("❌ Fichier vide ou illisible"); return; }
      const known = Intel.knownCsvMap(rows[0]);
      if (known) preview(rows, known, true);   // format déjà rencontré : colonnes appliquées directement
      else showMapping(rows);
    };
    reader.readAsText(file, "utf-8");
  }

  function splitCsvLine(line, sep) {
    const out = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQ && line[i + 1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (ch === sep && !inQ) { out.push(cur); cur = ""; }
      else cur += ch;
    }
    out.push(cur);
    return out.map(s => s.trim());
  }

  function guessCol(header, patterns) {
    return header.findIndex(h => patterns.some(p => h.toLowerCase().includes(p)));
  }

  function showMapping(rows) {
    const header = rows[0];
    const colOpts = header.map((h, i) => ({ value: i, label: h || `Colonne ${i + 1}` }));
    const none = { value: -1, label: "—" };
    let iDate = guessCol(header, ["date"]);
    let iLabel = guessCol(header, ["libell", "label", "description", "designation", "détail", "detail"]);
    let iAmt = guessCol(header, ["montant", "amount", "valeur"]);
    let iDebit = guessCol(header, ["debit", "débit"]);
    let iCredit = guessCol(header, ["credit", "crédit"]);
    const dateSel = selectInput(colOpts, iDate >= 0 ? iDate : 0);
    const labelSel = selectInput([none, ...colOpts], iLabel >= 0 ? iLabel : -1);
    const amtSel = selectInput([none, ...colOpts], iAmt >= 0 ? iAmt : -1);
    const debitSel = selectInput([none, ...colOpts], iDebit >= 0 ? iDebit : -1);
    const creditSel = selectInput([none, ...colOpts], iCredit >= 0 ? iCredit : -1);

    m.body.innerHTML = "";
    m.body.append(
      el("p", { class: "small muted mb12" }, `${rows.length - 1} lignes détectées. Indiquez quelle colonne contient quoi :`),
      el("div", { class: "form-grid" },
        fField("Date", dateSel), fField("Libellé", labelSel),
        fField("Montant (signé ±)", amtSel),
        el("div", { class: "field" }, el("label", {}, "— ou bien —"), el("div", { class: "xs muted", style: "padding-top:10px" }, "colonnes séparées :")),
        fField("Débit", debitSel), fField("Crédit", creditSel)),
      el("div", { class: "flex mt16" }, el("span", { class: "spacer" }),
        el("button", {
          class: "btn btn-p", onclick: () => {
            const map = { iDate: +dateSel.value, iLabel: +labelSel.value, iAmt: +amtSel.value, iDebit: +debitSel.value, iCredit: +creditSel.value };
            Intel.rememberCsvMap(rows[0], map);   // la prochaine fois, cette étape sera sautée
            persist();
            preview(rows, map, false);
          }
        }, "Analyser →"))
    );
  }

  function parseDate(s) {
    s = s.trim();
    let mt = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (mt) return `${mt[1]}-${mt[2]}-${mt[3]}`;
    mt = s.match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{4})/);
    if (mt) return `${mt[3]}-${mt[2].padStart(2, "0")}-${mt[1].padStart(2, "0")}`;
    mt = s.match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{2})$/);
    if (mt) return `20${mt[3]}-${mt[2].padStart(2, "0")}-${mt[1].padStart(2, "0")}`;
    return null;
  }

  function preview(rows, map, autoMapped) {
    const { iDate, iLabel, iAmt, iDebit, iCredit } = map;
    const cur = b.currency;
    const parsed = [];
    for (const r of rows.slice(1)) {
      const date = parseDate(r[iDate] || "");
      if (!date) continue;
      let amount = 0;
      if (iAmt >= 0) amount = parseAmount(r[iAmt]);
      else {
        const d = iDebit >= 0 ? Math.abs(parseAmount(r[iDebit])) : 0;
        const c = iCredit >= 0 ? Math.abs(parseAmount(r[iCredit])) : 0;
        amount = c - d;
      }
      if (!amount) continue;
      const label = iLabel >= 0 ? (r[iLabel] || "") : "";
      const kind = amount >= 0 ? "income" : "expense";
      parsed.push({ sel: true, date, label, amount: Math.abs(amount), kind, categoryId: null, tier: "new", note: "", splits: null });
    }
    if (!parsed.length) { toast("❌ Aucune ligne exploitable (vérifiez les colonnes)"); return; }

    /* classement par confiance : auto (marchand confirmé) > suggéré > à vérifier ; retraits & doublons à part */
    const dup = new Set(State.transactions.filter(t => t.budgetId === b.id).map(t => `${t.date}|${t.amount}|${(t.label || "").slice(0, 18)}`));
    for (const p of parsed) {
      if (dup.has(`${p.date}|${p.amount}|${(p.label || "").slice(0, 18)}`)) { p.tier = "dup"; p.sel = false; p.note = "déjà présente dans le suivi"; continue; }
      if (p.kind === "expense" && Intel.isCashWithdrawal(p.label)) {
        p.tier = "split";
        p.splits = Intel.splitFor(b, p.label, p.amount);
        p.note = p.splits ? "ventilation proposée d'après vos retraits passés" : "retrait d'espèces — vous pouvez le ventiler par enveloppe";
        continue;
      }
      const s = Intel.suggest(b, p.label, p.kind);
      if (s) {
        p.categoryId = s.categoryId;
        if (s.usual && Math.abs(p.amount - s.usual) > Math.max(15, s.usual * 0.4)) {
          p.tier = "review"; p.note = `montant inhabituel — d'habitude ≈ ${fmtMoney(s.usual, cur, { dec: 0 })}`;
        } else if (s.auto) { p.tier = "auto"; p.note = ""; }
        else { p.tier = "sugg"; p.note = s.source === "appris" ? "appris de vos choix passés" : "reconnu par mots-clés"; }
      } else { p.note = "libellé inconnu"; }
    }

    function row(p) {
      const chk = el("input", { type: "checkbox", checked: p.sel, onchange: e => p.sel = e.target.checked });
      const line = el("div", { style: "border-bottom:1px solid var(--line); padding:7px 0" });
      const main = el("div", { class: "flex small", style: "gap:8px" },
        chk,
        el("span", { class: "mono xs muted nowrap" }, p.date),
        el("span", { style: "flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap" }, p.label || "—"),
        el("b", { class: "mono nowrap " + (p.kind === "income" ? "pos" : "") }, fmtMoney(p.kind === "income" ? p.amount : -p.amount, cur, { sign: true })));
      line.append(main);
      if (p.tier === "split") {
        const zone = el("div", { style: "margin:6px 0 2px 26px" });
        const renderZone = () => {
          zone.innerHTML = "";
          if (p.splits && p.splits.length) {
            zone.append(
              el("span", { class: "xs muted" }, p.splits.map(s => `${catLabel(b, s.categoryId)} ${fmtMoney(s.amount, cur, { dec: 0 })}`).join(" + ") + "  "),
              el("button", { class: "btn btn-sm btn-ghost", onclick: editSplits }, "Modifier"));
          } else {
            zone.append(el("button", { class: "btn btn-sm", onclick: () => { p.splits = [{ categoryId: null, amount: p.amount }]; editSplits(); } }, "÷ Ventiler"));
          }
        };
        const editSplits = () => {
          zone.innerHTML = "";
          if (!p.splits || !p.splits.length) p.splits = [{ categoryId: null, amount: p.amount }];
          const rest = el("span", { class: "xs muted" });
          const refresh = () => {
            const d = round2(p.amount - p.splits.reduce((s, x) => s + (+x.amount || 0), 0));
            rest.textContent = d ? `reste ${fmtMoney(d, cur)}` : "✓ complet";
            rest.className = "xs " + (d ? "neg" : "pos");
          };
          const lst = el("div", { style: "display:flex; flex-direction:column; gap:6px" });
          p.splits.forEach((sp, i) => {
            const amtI = moneyInput({ value: sp.amount || "", oninput: e => { sp.amount = parseAmount(e.target.value); refresh(); } });
            const cs2 = catSelect(b, "expense", sp.categoryId, { style: "flex:1; min-width:0; min-height:32px; padding:4px 28px 4px 9px; font-size:12.5px" });
            cs2.addEventListener("change", () => sp.categoryId = cs2.value || null);
            lst.append(el("div", { class: "flex", style: "gap:6px" },
              el("div", { style: "width:110px; flex:none" }, amtI), cs2,
              el("button", { class: "btn btn-ico btn-ghost", title: "Supprimer", html: ico("x", 14), onclick: () => { p.splits.splice(i, 1); editSplits(); } })));
          });
          zone.append(lst, el("div", { class: "flex", style: "gap:6px; margin-top:6px" },
            el("button", { class: "btn btn-sm", onclick: () => { p.splits.push({ categoryId: null, amount: 0 }); editSplits(); } }, "+ Ligne"),
            el("button", { class: "btn btn-sm btn-ghost", onclick: () => { p.splits = null; renderZone(); } }, "Sans ventilation"),
            el("span", { class: "spacer" }), rest));
          refresh();
        };
        renderZone();
        line.append(zone);
      } else {
        const cs = catSelect(b, p.kind, p.categoryId, { style: "max-width:210px; min-height:32px; padding:4px 28px 4px 9px; font-size:12.5px" });
        cs.addEventListener("change", () => { p.categoryId = cs.value || null; });
        p._sel = cs;
        main.append(cs);
      }
      if (p.note) line.append(el("div", { class: "xs", style: "margin-left:26px; margin-top:3px; color:" + (p.tier === "review" ? "#f59e0b" : "var(--mut, #93a1ba)") }, p.note));
      return line;
    }

    function section(title, items, collapsed) {
      if (!items.length) return null;
      const body = el("div", {}, items.map(row));
      if (collapsed) return el("details", { style: "margin-bottom:6px" },
        el("summary", { class: "small muted", style: "cursor:pointer; padding:6px 0" }, `${title} (${items.length})`), body);
      return el("div", { style: "margin-bottom:6px" },
        el("div", { class: "small", style: "font-weight:600; padding:8px 0 2px" }, `${title} (${items.length})`), body);
    }

    const byTier = t => parsed.filter(p => p.tier === t);
    const toCheck = parsed.filter(p => p.tier === "review" || p.tier === "new");
    const months = [...new Set(parsed.map(p => ymOf(p.date)))].sort();
    const span = months.length > 1 ? `de ${fmtYm(months[0])} à ${fmtYm(months[months.length - 1])}` : fmtYm(months[0]);

    const aiLine = el("div", { class: "xs muted", style: "margin:2px 0 8px" });
    async function runAI() {
      if (!Intel.aiReady()) return;
      const unknowns = parsed.filter(p => p.tier === "new" && p.label);
      const uniq = [...new Map(unknowns.map(p => [p.label + "|" + p.kind, { label: p.label, kind: p.kind }])).values()];
      if (!uniq.length) return;
      aiLine.textContent = `🤖 IA : analyse de ${uniq.length} libellé(s) inconnu(s)…`;
      try {
        const res = await Intel.aiCategorize(b, uniq);
        let n = 0;
        for (const p of unknowns) {
          const cid = res.get(p.label);
          if (cid && !p.categoryId) { p.categoryId = cid; if (p._sel) p._sel.value = cid; n++; }
        }
        aiLine.textContent = n ? `🤖 IA : ${n} ligne(s) catégorisée(s) — un coup d'œil suffit avant d'importer.` : "🤖 IA consultée : aucune catégorie sûre, à compléter à la main.";
      } catch (e) {
        aiLine.textContent = `🤖 IA indisponible (${e.message}) — catégorisation locale uniquement.`;
      }
    }

    m.body.innerHTML = "";
    const list = el("div", { style: "max-height:48vh; overflow-y:auto" },
      section("⚠ À vérifier", toCheck, false),
      section("💶 Retraits d'espèces", byTier("split"), false),
      section("Catégories proposées", byTier("sugg"), false),
      section("Reconnues automatiquement", byTier("auto"), true),
      section("Doublons probables — décochés", byTier("dup"), true));
    m.body.append(
      el("p", { class: "small muted mb8" },
        `${parsed.length} lignes, ${span}. ` +
        `${byTier("auto").length} reconnues automatiquement, ${byTier("sugg").length} proposées, ${toCheck.length} à vérifier` +
        (byTier("dup").length ? `, ${byTier("dup").length} doublon(s) écarté(s)` : "") + "."),
      autoMapped ? el("div", { class: "xs muted mb8" }, "Format de fichier reconnu — colonnes appliquées automatiquement. ",
        el("button", { class: "btn btn-sm btn-ghost", onclick: () => showMapping(rows) }, "Modifier les colonnes")) : null,
      aiLine, list,
      el("div", { class: "flex mt16" }, el("span", { class: "spacer" }),
        el("button", { class: "btn", onclick: () => m.close() }, "Annuler"),
        el("button", {
          class: "btn btn-p", onclick: () => {
            const toAdd = parsed.filter(p => p.sel);
            if (!toAdd.length) { toast("Aucune ligne sélectionnée"); return; }
            toAdd.forEach(p => {
              const raw = (p.splits || []).filter(s => +s.amount > 0).map(s => ({ categoryId: s.categoryId || null, amount: round2(+s.amount) }));
              const sum = round2(raw.reduce((s, x) => s + x.amount, 0));
              const splits = (raw.length > 1 && Math.abs(sum - p.amount) <= 0.011) ? raw : undefined;
              const tx = { id: uid(), budgetId: b.id, date: p.date, kind: p.kind, amount: p.amount, categoryId: splits ? null : p.categoryId, label: p.label, notes: "", splits };
              State.transactions.push(tx);
              Intel.learn(b, tx);   // chaque import affine les règles pour la prochaine fois
            });
            persist(); m.close(); renderApp();
            Juice.buzz(12);
            const auto = toAdd.filter(p => p.tier === "auto").length;
            toast(`✅ ${toAdd.length} transactions importées` + (auto ? ` dont ${auto} reconnues automatiquement` : ""));
            if (Intel.detectRecurring(b).length) setTimeout(() => toast("💡 Régularités détectées — suggestions affichées dans le Suivi réel", { ms: 5000 }), 700);
          }
        }, "Importer la sélection"))
    );
    runAI();
  }
}

"use strict";
/* ============ vue : objectifs d'épargne & comptes rémunérés ============ */

function viewGoals(root) {
  const b = curBudget();
  const cur = b.currency;

  const goalCards = b.goals.map(g => {
    const current = +g.current || 0;
    const pct = g.target ? clamp(current / g.target, 0, 1) : 0;
    const remaining = Math.max(0, (g.target || 0) - current);
    const done = g.target > 0 && current >= g.target;
    const req = goalRequiredMonthly(g);
    const eta = done ? null : goalEta(b, g);
    const linked = b.items.filter(i => i.savingTo === g.id);
    const monthly = linked.reduce((s, i) => s + monthlyEquivalent(i), 0);

    // écart entre la trajectoire actuelle et la date visée (en mois)
    const drift = (eta && g.targetDate) ? monthIndex(eta) - monthIndex(ymOf(g.targetDate)) : null;

    let badge;
    if (done) badge = el("span", { class: "badge b-pos" }, "Atteint");
    else if (drift != null) badge = drift <= 0 ? el("span", { class: "badge b-pos" }, "En bonne voie") : el("span", { class: "badge b-warn" }, "À ajuster");
    else if (monthly > 0) badge = el("span", { class: "badge b-info" }, "En cours");
    else badge = el("span", { class: "badge b-mut" }, "À planifier");

    // accompagnement factuel : où on en est, où ça mène, quoi changer si besoin
    const facts = [];
    if (done) {
      facts.push(`Objectif atteint${g.target ? " — " + fmtMoney(g.target, cur, { dec: 0 }) + " réunis" : ""}.`);
    } else {
      if (monthly > 0) facts.push(`Versements liés : ${fmtMoney(monthly, cur)} /mois.`);
      if (eta) {
        let s = `À ce rythme : atteint vers ${fmtYm(eta).toLowerCase()}`;
        if (drift != null) s += drift <= 0
          ? (drift === 0 ? ", dans les temps." : `, ${-drift} mois avant la date visée.`)
          : `, ${drift} mois après la date visée.`;
        else s += ".";
        facts.push(s);
      }
      if (req != null && (monthly < req - 0.5)) {
        facts.push(monthly > 0
          ? `Pour tenir ${fmtDate(g.targetDate)} : ${fmtMoney(req, cur, { dec: 0 })} /mois (soit ${fmtMoney(req - monthly, cur, { dec: 0 })} de plus).`
          : `Pour atteindre l'objectif au ${fmtDate(g.targetDate)} : ${fmtMoney(req, cur, { dec: 0 })} /mois.`);
      }
      if (!monthly && req == null) facts.push("Aucun versement automatique : planifiez un montant mensuel pour avancer sans y penser.");
    }

    return el("div", { class: "card card-pad goal-card" },
      el("div", { class: "flex mb8", style: "align-items:flex-start" },
        el("span", { style: "font-size:24px; line-height:1.2" }, g.emoji || "🎯"),
        el("div", { style: "flex:1; min-width:0" },
          el("h3", { style: "font-size:15.5px" }, g.name),
          el("div", { class: "xs muted" }, g.targetDate ? "pour le " + fmtDate(g.targetDate) : "sans date limite")),
        badge,
        el("button", { class: "btn btn-ghost btn-ico", html: ico("edit", 15), title: "Modifier", onclick: () => openGoalEditor(b, g) })),
      el("div", { class: "flex small mb8", style: "align-items:baseline" },
        el("b", { class: "mono", style: "font-size:18px" }, fmtMoney(current, cur, { dec: 0 })),
        el("span", { class: "muted" }, "sur " + fmtMoney(g.target, cur, { dec: 0 })),
        el("span", { class: "spacer" }),
        el("b", {}, Math.round(pct * 100) + " %")),
      el("div", { class: "pbar", style: "height:11px" }, el("i", { style: `width:${pct * 100}%; background:${done ? "var(--accent)" : (g.color || "var(--accent)")}` })),
      !done ? el("div", { class: "flex small mt8" },
        el("span", { class: "muted" }, "Reste"),
        el("b", { class: "mono" }, fmtMoney(remaining, cur, { dec: 0 }))) : null,
      facts.length ? el("div", { class: "small muted mt12", style: "line-height:1.75" },
        facts.map(f => el("div", {}, f))) : null,
      el("div", { class: "flex mt12", style: "flex-wrap:wrap" },
        !done ? el("button", { class: "btn btn-sm", onclick: () => addContribution(b, g) }, "+ Versement ponctuel") : null,
        !done && !monthly ? el("button", {
          class: "btn btn-sm btn-ghost", onclick: () => {
            const it = newItem("expense");
            it.name = "Épargne — " + g.name;
            it.savingTo = g.id;
            it.amount = req ? Math.ceil(req / 5) * 5 : 50;
            const cat = findCatByName(b, "Épargne projet", "expense");
            it.categoryId = cat ? cat.id : null;
            openItemEditor(b, it, true);
          }
        }, "Planifier un versement mensuel") : null)
    );
  });

  const accCards = b.accounts.map(a => {
    const proj1 = projAccount(a, 12), proj5 = projAccount(a, 60);
    const linked = b.items.filter(i => i.savingTo === a.id).reduce((s, i) => s + monthlyEquivalent(i), 0);
    return el("div", { class: "card card-pad" },
      el("div", { class: "flex mb8" },
        el("span", { style: "font-size:22px" }, "🏦"),
        el("div", { style: "flex:1" }, el("h3", { style: "font-size:15.5px" }, a.name),
          el("div", { class: "xs muted" }, `${a.rate || 0} % /an` + (a.ceiling ? ` · plafond ${fmtMoney(a.ceiling, cur, { dec: 0 })}` : ""))),
        el("button", { class: "btn btn-ghost btn-ico", html: ico("edit", 15), onclick: () => openAccountEditor(b, a) })),
      el("div", { class: "mono", style: "font-size:21px; font-weight:750" }, fmtMoney(+a.balance || 0, cur)),
      el("div", { class: "small muted mt8", style: "line-height:1.7" },
        linked ? el("div", {}, `💸 Versements liés : ${fmtMoney(linked, cur)} /mois`) : null,
        el("div", {}, `📈 Dans 1 an : ≈ ${fmtMoney(proj1, cur, { dec: 0 })} · dans 5 ans : ≈ ${fmtMoney(proj5, cur, { dec: 0 })}`))
    );
    function projAccount(a, months) {
      let bal = +a.balance || 0;
      const r = ((+a.rate || 0) / 100) / 12;
      const monthly = b.items.filter(i => i.savingTo === a.id && !i.endDate).reduce((s, i) => s + monthlyEquivalent(i), 0);
      for (let i = 0; i < months; i++) { bal += monthly; bal *= 1 + r; if (a.ceiling && bal > +a.ceiling) bal = +a.ceiling; }
      return bal;
    }
  });

  const goalsSec = el("div", {},
    el("div", { class: "flex mb12" },
      el("h3", {}, "🎯 Objectifs d'épargne"),
      el("span", { class: "spacer" }),
      el("button", { class: "btn btn-p btn-sm", html: ico("plus", 14) + "<span>Objectif</span>", onclick: () => openGoalEditor(b, null) })),
    goalCards.length ? el("div", { class: "grid g3" }, goalCards)
      : el("div", { class: "card" }, emptyState("🎯", "Aucun objectif", "Fonds d'urgence, vacances, permis, apport immobilier… définissez un montant cible et, si vous voulez, une date limite. L'app calcule combien mettre de côté chaque mois.",
        el("button", { class: "btn btn-p btn-sm", onclick: () => openGoalEditor(b, null) }, "Créer un objectif"))));
  const accSec = el("div", {},
    el("div", { class: "flex mb12" },
      el("h3", {}, "🏦 Comptes épargne rémunérés"),
      el("span", { class: "spacer" }),
      el("button", { class: "btn btn-sm", html: ico("plus", 14) + "<span>Compte</span>", onclick: () => openAccountEditor(b, null) })),
    accCards.length ? el("div", { class: "grid g3" }, accCards)
      : el("div", { class: "card" }, emptyState("🏦", "Aucun compte épargne", "Livret A, LEP, LDDS, assurance-vie… ajoutez vos comptes avec leur taux : les intérêts composés sont intégrés aux projections de patrimoine.",
        el("button", { class: "btn btn-sm", onclick: () => openAccountEditor(b, null) }, "Ajouter un compte")))
  );
  const inner = el("div", { class: "content-inner grid", style: "gap:16px" });
  Custom.renderInto(inner, "page.goals", [{ id: "goals", node: goalsSec }, { id: "accounts", node: accSec }], { axis: "y" });
  root.append(inner);
}

"use strict";
/* ============ vue : dettes & crédits ============ */

function viewDebts(root) {
  const b = curBudget();
  const cur = b.currency;
  const ymNow = ymOf(todayStr());

  const totalRemaining = b.debts.reduce((s, d) => {
    const rows = amortize(d);
    const last = [...rows].reverse().find(r => r.ym <= ymNow);
    return s + (last ? last.balance : +d.principal || 0);
  }, 0);
  const totalMonthly = b.debts.reduce((s, d) => s + debtMonthly(d, ymNow), 0);

  const cards = b.debts.map(d => {
    const rows = amortize(d);
    const last = [...rows].reverse().find(r => r.ym <= ymNow);
    const remaining = last ? last.balance : +d.principal || 0;
    const payoff = debtPayoffYm(d);
    const totalInterest = rows.reduce((s, r) => s + r.interest, 0);
    const paidPct = d.principal > 0 ? clamp(1 - remaining / d.principal, 0, 1) : 0;
    const invalid = !rows.length && +d.principal > 0;
    return el("div", { class: "card card-pad" },
      el("div", { class: "flex mb8" },
        el("span", { style: "font-size:22px" }, d.emoji || "💳"),
        el("div", { style: "flex:1; min-width:0" },
          el("h3", { style: "font-size:15.5px" }, d.name),
          el("div", { class: "xs muted" }, `${fmtMoney(d.principal, cur, { dec: 0 })} à ${d.rate || 0} %`)),
        el("button", { class: "btn btn-ghost btn-ico", html: ico("edit", 15), onclick: () => openDebtEditor(b, d) })),
      invalid
        ? el("div", { class: "alert a-danger small" }, "⚠️ Mensualité trop faible : elle ne couvre même pas les intérêts.")
        : el("div", {},
          el("div", { class: "flex small mb8" },
            el("span", { class: "muted" }, "Restant dû"),
            el("span", { class: "spacer" }),
            el("b", { class: "mono", style: "font-size:16px" }, fmtMoney(remaining, cur, { dec: 0 }))),
          el("div", { class: "pbar" }, el("i", { style: `width:${paidPct * 100}%` })),
          el("div", { class: "small muted mt12", style: "line-height:1.7" },
            el("div", {}, `💸 Mensualité : ${fmtMoney((+d.payment || 0) + (+d.extra || 0), cur)}` + (d.extra ? ` (dont ${fmtMoney(d.extra, cur)} de remboursement anticipé)` : "")),
            payoff ? el("div", {}, `🏁 Fin du crédit : ${fmtYm(payoff)}`) : null,
            el("div", {}, `📉 Coût total des intérêts : ${fmtMoney(totalInterest, cur, { dec: 0 })}`)),
          el("button", { class: "btn btn-sm mt12", onclick: () => showAmortTable(b, d) }, "Tableau d'amortissement"))
    );
  });

  const summarySec = el("div", { class: "grid g3" },
    el("div", { class: "card kpi" }, el("div", { class: "k-label" }, "Dette totale restante"), el("div", { class: "k-value" }, fmtMoney(totalRemaining, cur, { dec: 0 }))),
    el("div", { class: "card kpi" }, el("div", { class: "k-label" }, "Mensualités totales"), el("div", { class: "k-value" }, fmtMoney(totalMonthly, cur)), el("div", { class: "k-sub" }, "intégrées automatiquement aux projections")),
    el("div", { class: "card kpi" }, el("div", { class: "k-label" }, "Crédits en cours"), el("div", { class: "k-value" }, String(b.debts.length))));
  const listSec = el("div", {},
    el("div", { class: "flex mb12" },
      el("h3", {}, "💳 Crédits & dettes"),
      el("span", { class: "spacer" }),
      el("button", { class: "btn btn-p btn-sm", html: ico("plus", 14) + "<span>Crédit / dette</span>", onclick: () => openDebtEditor(b, null) })),
    cards.length ? el("div", { class: "grid g3" }, cards)
      : el("div", { class: "card" }, emptyState("💳", "Aucun crédit",
        "Prêt immobilier, crédit auto, prêt étudiant, dette à un proche… L'app calcule la mensualité, la date de fin et le coût des intérêts, et intègre tout aux projections.",
        el("button", { class: "btn btn-p btn-sm", onclick: () => openDebtEditor(b, null) }, "Ajouter un crédit"))));
  const inner = el("div", { class: "content-inner grid", style: "gap:16px" });
  Custom.renderInto(inner, "page.debts", [{ id: "summary", node: summarySec }, { id: "list", node: listSec }], { axis: "y" });
  root.append(inner);
}

function openDebtEditor(b, debt) {
  const isNew = !debt;
  const d = debt ? { ...debt } : { id: uid(), name: "", emoji: "💳", principal: "", rate: "", payment: "", months: "", extra: 0, startDate: todayStr(), categoryId: null };
  let mode = d.months && !debt ? "months" : (d.payment ? "payment" : "months");

  const nameI = el("input", { class: "input", value: d.name, placeholder: "ex. Prêt immobilier, Crédit auto…" });
  const principalI = moneyInput({ value: d.principal || "", placeholder: "capital emprunté restant" });
  const rateI = moneyInput({ value: d.rate ?? "", cur: "%/an" });
  const startI = el("input", { class: "input", type: "date", value: d.startDate });
  const monthsI = el("input", { class: "input", type: "number", min: 1, max: 600, value: d.months || "", placeholder: "ex. 240" });
  const paymentI = moneyInput({ value: d.payment || "" });
  const extraI = moneyInput({ value: d.extra || "", placeholder: "0" });
  const catSel = catSelect(b, "expense", d.categoryId);
  const hint = el("div", { class: "alert a-info small full", style: "display:none" });

  const seg = segControl([
    { value: "months", label: "Je connais la durée" },
    { value: "payment", label: "Je connais la mensualité" },
  ], mode, v => { mode = v; updateUi(); }, true);
  const monthsField = fField("Durée (en mois)", monthsI);
  const paymentField = fField("Mensualité (hors anticipé)", paymentI);

  function updateUi() {
    monthsField.style.display = mode === "months" ? "" : "none";
    paymentField.style.display = mode === "payment" ? "" : "none";
    recalc();
  }
  function recalc() {
    const P = numVal(principalI), r = numVal(rateI);
    if (!P) { hint.style.display = "none"; return; }
    if (mode === "months" && +monthsI.value > 0) {
      const pay = loanPayment(P, r, +monthsI.value);
      hint.innerHTML = `Mensualité calculée : <b>${fmtMoney(pay, b.currency)}</b> — coût total des intérêts ≈ <b>${fmtMoney(pay * monthsI.value - P, b.currency, { dec: 0 })}</b>`;
      hint.style.display = "";
    } else if (mode === "payment" && numVal(paymentI) > 0) {

function duplicateBudget(src, asScenario) {
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = uid();
  copy.name = asScenario ? src.name + " — scénario" : src.name + " (copie)";
  copy.scenarioOf = asScenario ? src.id : null;
  copy.archived = false;
  copy.createdAt = todayStr();
  // nouveaux identifiants internes (catégories conservées par mapping)
  const idMap = {};
  copy.categories.forEach(c => { const n = uid(); idMap[c.id] = n; c.id = n; });
  copy.categories.forEach(c => { if (c.parentId) c.parentId = idMap[c.parentId]; });
  const subMap = {};
  [...copy.goals, ...copy.accounts, ...copy.events].forEach(x => { const n = uid(); subMap[x.id] = n; x.id = n; });
  copy.debts.forEach(d => { d.id = uid(); d.categoryId = idMap[d.categoryId] || null; });
  copy.items.forEach(it => {
    it.id = uid();
    it.categoryId = idMap[it.categoryId] || null;
    it.savingTo = subMap[it.savingTo] || null;
    it.eventId = subMap[it.eventId] || null;
  });
  State.budgets.push(copy);
  if (asScenario) {
    State.activeBudgetId = copy.id;
    persist(); renderApp();
    toast("🧪 Scénario créé — modifiez librement, l'original est intact");
  } else {
    persist(); renderApp();
    toast("⧉ Budget dupliqué");
  }
}

function buildCompare(budgets) {
  if (_compareIds.length !== 2 || !_compareIds.every(id => budgets.some(b => b.id === id))) {
    _compareIds = [budgets[0].id, budgets[1].id];
  }
  const horizon = Math.min(State.settings.horizonMonths || 24, 120);
  const selA = selectInput(budgets.map(b => ({ value: b.id, label: `${b.emoji} ${b.name}` })), _compareIds[0], { style: "max-width:230px", onchange: e => { _compareIds[0] = e.target.value; renderApp(); } });
  const selB = selectInput(budgets.map(b => ({ value: b.id, label: `${b.emoji} ${b.name}` })), _compareIds[1], { style: "max-width:230px", onchange: e => { _compareIds[1] = e.target.value; renderApp(); } });
  const A = budgetById(_compareIds[0]), B = budgetById(_compareIds[1]);
  const pA = project(A, { months: horizon });
  const pB = project(B, { months: horizon });
  const sameCur = A.currency === B.currency;

  const rows = [
    ["Revenus / mois (moyenne)", avg(pA, "income"), avg(pB, "income")],
    ["Dépenses / mois (moyenne)", avg(pA, "expense"), avg(pB, "expense")],

    sameCur ? el("div", { class: "card-pad" },
      chartLine({
        labels: pA.map(r => r.ym),

          { name: A.emoji + " " + A.name, color: "#10b981", values: pA.map(r => r.balance), fill: true },
          { name: B.emoji + " " + B.name, color: "#8b5cf6", values: pB.map(r => r.balance) },
