/* ===== 21-review.js ===== */
"use strict";
/* ============ bilan mensuel factuel (« Month in Review ») ============
 * Récapitulatif chiffré d'un mois écoulé : dépensé vs prévu, top catégories,
 * plus grosse variation, épargne dégagée, évolution du solde, une phrase de cap.
 * 100 % factuel — aucun encouragement, aucune célébration (cf. règle anti-gamification).
 * Réutilise les moteurs existants (realMonthByCat, plannedMonth, project) : pas de nouveau calcul financier.
 */

const MonthReview = (() => {

  /* ---------- calcul du bilan d'un mois ---------- */
  function compute(b, ym) {
    const cur = b.currency;
    const real = realMonthByCat(b, ym);
    const planned = plannedMonth(b, ym);

    // évolution du solde sur le mois (réel uniquement)
    const balStart = balanceAtMonthStart(b, ym);
    const balEnd = balanceAtMonthStart(b, addMonths(ym, 1));

    // top 3 catégories de dépense réelle
    const topCats = Object.entries(real.byCat)
      .map(([id, amount]) => ({ id, amount, cat: (id !== "_" && id !== "_debt") ? catById(b, id) : null }))
      .filter(x => x.amount > 0.5)
      .sort((a, z) => z.amount - a.amount)
      .slice(0, 3);

    // plus grosse variation vs la moyenne des 3 mois pleins précédents (mois écoulé → pas de proration)
    const past = [1, 2, 3].map(n => realMonthByCat(b, addMonths(ym, -n)).byCat);
    let mover = null;
    for (const [id, amount] of Object.entries(real.byCat)) {
      if (id === "_" || id === "_debt" || amount < 40) continue;
      const hist = past.map(p => p[id] || 0);
      if (!hist.some(v => v > 0)) continue;
      const avg = hist.reduce((s, v) => s + v, 0) / 3;
      if (avg < 15) continue;
      const delta = amount - avg;
      if (Math.abs(delta) < 30) continue;
      if (!mover || Math.abs(delta) > Math.abs(mover.delta)) {
        mover = { cat: catById(b, id), amount, avg, delta, pct: delta / avg };
      }
    }

    return {
      ym, cur,
      expense: { real: real.expense, planned: planned.expense },
      income: { real: real.income, planned: planned.income },
      net: real.income - real.expense,
      saving: planned.saving || 0,
      balStart, balEnd,
      topCats, mover,
      cap: capSentence(b),
    };
  }

  /* ---------- une phrase de cap : objectif le plus proche, sinon projection 12 mois ---------- */
  function capSentence(b) {
    const cur = b.currency;
    const goals = (b.goals || []).filter(g => +g.target > 0);
    // objectif daté le plus proche en priorité, sinon n'importe quel objectif financé
    const dated = goals.filter(g => g.targetDate).sort((a, z) => a.targetDate.localeCompare(z.targetDate))[0];
    const g = dated || goals[0];
    if (g) {
      const eta = goalEta(b, g);
      if (eta) {
        let s = `Objectif « ${g.name} » : au rythme actuel, atteint vers ${fmtYm(eta)}.`;
        if (g.targetDate) {
          const diff = monthIndex(eta) - monthIndex(ymOf(g.targetDate));
          if (diff > 1) s += ` Soit ${diff} mois après la date visée (${fmtYm(ymOf(g.targetDate))}).`;
          else if (diff < -1) s += ` Soit ${-diff} mois avant la date visée.`;
          else s += ` Conforme à la date visée.`;
        }
        return { icon: "target", text: s };
      }
      const req = goalRequiredMonthly(g);
      if (req != null) return { icon: "target", text: `Objectif « ${g.name} » : il faudrait mettre ${fmtMoney(req, cur, { dec: 0 })} de côté chaque mois pour tenir la date visée.` };
    }
    // pas d'objectif : projection du solde à 12 mois
    try {
      const proj = project(b, { months: 13 });
      const r = proj[12];
      if (r) return { icon: "trend", text: `Au rythme actuel, solde projeté dans 12 mois : ${fmtMoney(r.balance, cur, { sign: true })}.` };
    } catch (e) {}
    return null;
  }

  function stat(label, value, sub, tone) {
    return el("div", { class: "card kpi", style: "padding:12px" },
      el("div", { class: "k-label" }, label),
      el("div", { class: "k-value " + (tone || ""), style: "font-size:18px" }, value),
      el("div", { class: "k-sub" }, sub));
  }

  /* ---------- rendu : modale de bilan ---------- */
  function open(b, ym) {
    const d = compute(b, ym);
    const cur = d.cur;
    const expDiff = d.expense.real - d.expense.planned;
    const expPct = d.expense.planned > 0 ? d.expense.real / d.expense.planned : 0;

    const statRow = el("div", { class: "grid g3", style: "gap:10px" },
      stat("Revenus encaissés", fmtMoney(d.income.real, cur), d.income.planned > 0 ? `sur ${fmtMoney(d.income.planned, cur)} prévus` : "", "pos"),
      stat("Solde du mois", fmtMoney(d.net, cur, { sign: true }), d.net >= 0 ? "rentrées − dépenses" : "dépenses > rentrées", d.net >= 0 ? "pos" : "neg"),
      stat("Solde du compte", fmtMoney(d.balEnd, cur, { sign: true }), `${fmtMoney(d.balStart, cur, { dec: 0 })} → ${fmtMoney(d.balEnd, cur, { dec: 0 })}`, d.balEnd < 0 ? "neg" : ""));

    const expCard = el("div", { class: "card card-pad" },
      el("div", { class: "flex small", style: "margin-bottom:6px" },
        el("span", {}, "Dépensé"),
        el("span", { class: "spacer" }),
        el("b", { class: "mono" }, fmtMoney(d.expense.real, cur)),
        d.expense.planned > 0 ? el("span", { class: "muted", style: "margin-left:6px" }, `/ ${fmtMoney(d.expense.planned, cur)} prévus`) : null),
      d.expense.planned > 0 ? el("div", { class: "pbar" + (expDiff > 0 ? " over" : "") }, el("i", { style: `width:${Math.min(100, expPct * 100)}%` })) : null,
      d.expense.planned > 0 ? el("div", { class: "xs", style: "margin-top:6px" },
        expDiff > 0
          ? el("span", { class: "neg" }, `${fmtMoney(expDiff, cur, { dec: 0 })} de plus que prévu (${Math.round(expPct * 100)} % du budget).`)
          : el("span", { class: "pos" }, `${fmtMoney(-expDiff, cur, { dec: 0 })} sous le budget prévu.`)) : null);

    const topCard = d.topCats.length ? el("div", { class: "card card-pad" },
      el("h4", { class: "mb12" }, "Principaux postes de dépense"),
      el("div", { style: "display:flex; flex-direction:column; gap:10px" },
        d.topCats.map(t => {
          const share = d.expense.real > 0 ? t.amount / d.expense.real : 0;
          const top = t.cat ? catTop(b, t.cat.id) : null;
          return el("div", {},
            el("div", { class: "flex small", style: "margin-bottom:4px" },
              el("span", {}, top ? `${top.emoji} ${top.name}` : (t.id === "_debt" ? "💳 Crédits" : "🧾 Sans catégorie")),
              el("span", { class: "spacer" }),
              el("b", { class: "mono" }, fmtMoney(t.amount, cur, { dec: 0 })),
              el("span", { class: "xs muted", style: "margin-left:6px" }, `${Math.round(share * 100)} %`)),
            el("div", { class: "pbar" }, el("i", { style: `width:${share * 100}%; background:${top ? top.color : "var(--accent)"}` })));
        }))) : null;

    const moverCard = d.mover ? el("div", { class: "card card-pad" },
      el("div", { class: "alert a-info" },
        el("span", { class: "a-ico", html: ico("trend", 17) }),
        el("span", {}, `${d.mover.cat ? catTop(b, d.mover.cat.id).emoji + " " + catTop(b, d.mover.cat.id).name : "Une catégorie"} : ${fmtMoney(d.mover.amount, cur, { dec: 0 })} ce mois-ci, soit ${d.mover.delta > 0 ? "+" : "−"}${Math.abs(Math.round(d.mover.pct * 100))} % par rapport à votre moyenne des 3 mois (${fmtMoney(d.mover.avg, cur, { dec: 0 })}).`))) : null;

    const saveCard = (d.net > 0 || d.saving > 0) ? el("div", { class: "card card-pad" },
      el("div", { class: "alert a-ok" },
        el("span", { class: "a-ico", html: ico("pig", 17) }),
        el("span", {}, d.saving > 0
          ? `Épargne programmée ce mois : ${fmtMoney(d.saving, cur, { dec: 0 })}.` + (d.net > d.saving ? ` Solde du mois positif de ${fmtMoney(d.net, cur, { dec: 0 })} : ${fmtMoney(d.net - d.saving, cur, { dec: 0 })} non affectés.` : "")
          : `Solde du mois positif : ${fmtMoney(d.net, cur, { dec: 0 })} dégagés, qu'un virement automatique permettrait de mettre de côté.`))) : null;

    const capCard = d.cap ? el("div", { class: "card card-pad" },
      el("div", { class: "alert a-info" },
        el("span", { class: "a-ico", html: ico(d.cap.icon, 17) }),
        el("span", {}, d.cap.text))) : null;

    const empty = (d.income.real === 0 && d.expense.real === 0)
      ? emptyState("📭", "Aucune opération", "Aucune transaction enregistrée sur ce mois — rien à récapituler.")
      : null;

    const m = modal({
      title: "Bilan de " + fmtYm(ym),
      lg: true,
      body: empty || el("div", { style: "display:flex; flex-direction:column; gap:14px; padding:2px 0 6px" },
        statRow, expCard, topCard, moverCard, saveCard, capCard),
      foot: [
        el("span", { class: "spacer" }),
        el("button", { class: "btn", onclick: () => { m.close(); go("tracking"); } }, "Voir les opérations"),
        el("button", { class: "btn btn-p", onclick: () => m.close() }, "Fermer"),
      ],
    });
    return m;
  }

  /* ---------- déclenchement automatique au début d'un nouveau mois ---------- */
  function maybeShow(b) {
    if (!b) return;
    const prev = addMonths(ymOf(todayStr()), -1);
    if (b.lastReviewYm === prev) return;                 // déjà présenté pour ce mois
    const real = realMonthByCat(b, prev);
    if (real.income === 0 && real.expense === 0) return; // rien à récapituler : ne pas marquer (peut arriver plus tard)
    b.lastReviewYm = prev;
    persist();
    setTimeout(() => open(b, prev), 650);
  }

  return { compute, open, maybeShow };
})();

"use strict";
/* ============ Custom : rendu en disposition fixe + actions d'ajout rapide ============
   La personnalisation de mise en page (glisser-déposer, masquage, densité, couleur,
   slots de nav…) a été retirée lors de la refonte « grande simplification » : la
   disposition est désormais soignée et identique pour tous. Ce module ne garde que
   - renderInto : rend une liste de blocs dans l'ordre fourni (pass-through) ;
   - quick      : les actions du bouton « + » (ajout rapide).
   La personnalisation du CONTENU (catégories de revenus/dépenses) vit dans le Budget
   et les Réglages, pas ici. ============ */
const Custom = (() => {
  const QUICK = [
    { id: "tx", emoji: "🧾", label: "Transaction réelle (dépense / revenu du jour)", run: (b, close) => { close(); openTxEditor(b, null); } },
    { id: "expense", emoji: "📉", label: "Dépense planifiée (récurrente ou ponctuelle)", run: (b, close) => { close(); openItemEditor(b, newItem("expense"), true); } },
    { id: "income", emoji: "📈", label: "Revenu planifié", run: (b, close) => { close(); openItemEditor(b, newItem("income"), true); } },
    { id: "goal", emoji: "🎯", label: "Objectif d'épargne", run: (b, close) => { close(); openGoalEditor(b, null); } },
    { id: "event", emoji: "🧭", label: "Événement de vie", run: (b, close) => { close(); openEventEditor(b, null); } },
  ];

  // Garantit l'existence de l'objet (compat : d'anciennes sauvegardes peuvent contenir
  // des champs de personnalisation désormais ignorés — on n'y touche pas).
  function ensure() { return State.settings.custom || (State.settings.custom = {}); }
  function apply() {} // plus de densité/couleur d'accent : disposition fixe

  /* Rend une liste de blocs { id, node, span? } dans l'ordre donné. */
  function renderInto(container, scope, items) {
    (items || []).forEach(it => {
      if (!it || !it.node) return;
      if (it.span) it.node.classList.add("dz-" + it.span);
      container.append(it.node);
    });
  }

  return { ensure, apply, renderInto, quick: () => QUICK, get: ensure };
})();


/* ===== 30-sync.js ===== */
"use strict";
/* ============ synchronisation multi-appareils (Supabase REST, sans dépendance) ============
 *
 * Modèle : un "salon" (room) = un code secret partagé par la famille. Le document complet
 * (réglages + budgets + transactions + tombstones) est stocké dans une ligne Supabase.
 * Fusion par enregistrement : chaque record porte un _rev (timestamp ms). À la fusion, la
 * version la plus récente de chaque record gagne ; les suppressions sont propagées via un
 * cimetière (graveyard) de tombstones. Deux personnes peuvent éditer en même temps sans
 * s'écraser, sauf modification simultanée du MÊME champ du MÊME record (dernier gagne).
 *
 * Transport : REST direct (fetch). Quasi temps réel par interrogation courte (4 s visible).
 * Hors-ligne : tout est mis en pause et reprend automatiquement au retour du réseau.
 */
const Sync = (() => {
  const SUBCOLLS = ["categories", "items", "debts", "goals", "accounts", "events"];
  const GRAVE_TTL = 90 * 86400000; // 90 jours

  let _base = {};            // empreinte du dernier état synchronisé { "type:id": contentString }
  let _prevSettingsSnap = {}; // snapshot des valeurs de settings au dernier buildBase() — pour détection par champ
  let _pushTimer = null;
  let _pollTimer = null;
  let _busy = false;
  let _pending = false;
  let status = "off";        // off | connecting | synced | syncing | offline | error
  let lastError = "";

  /* Champs ignorés par stable() — métadonnées de sync, pas du contenu. */
  const STABLE_SKIP = new Set(["_rev", "_ts", "_revs"]);
  /* Champs de settings locaux à l'appareil : jamais fusionnés depuis le distant. */
  const DEVICE_LOCAL_SETTINGS = new Set(["theme"]);

  /* ---------- sérialisation stable (ignore métadonnées sync) ---------- */
  function stable(v) {
    if (Array.isArray(v)) return "[" + v.map(stable).join(",") + "]";
    if (v && typeof v === "object")
      return "{" + Object.keys(v).filter(k => !STABLE_SKIP.has(k)).sort()
        .map(k => JSON.stringify(k) + ":" + stable(v[k])).join(",") + "}";
    return JSON.stringify(v);
  }
  function budgetScalar(b) {
    const o = {};
    for (const k in b) if (!SUBCOLLS.includes(k) && !STABLE_SKIP.has(k)) o[k] = b[k];
    return stable(o);
  }
  function buildBase() {
    _prevSettingsSnap = {};
    for (const k in State.settings) {
      if (STABLE_SKIP.has(k)) continue;
      _prevSettingsSnap[k] = JSON.stringify(State.settings[k]);
    }
    const m = {};
    m["settings:_"] = stable(State.settings);
    for (const b of State.budgets) {
      m["budget:" + b.id] = budgetScalar(b);
      for (const sc of SUBCOLLS) for (const r of (b[sc] || [])) m[sc + ":" + r.id] = stable(r);
    }
    for (const t of State.transactions) m["tx:" + t.id] = stable(t);
    return m;
  }

  /* ---------- détection des changements locaux → stamping _rev/_ts + tombstones ---------- */
  function stampChanges() {
    // Lamport : initialiser depuis Date.now() si premier usage (rétrocompat timestamps existants)
    if (!State.sync.lamport) State.sync.lamport = Date.now();
    State.sync.lamport++;
    const L = State.sync.lamport;
    const ts = Date.now();

    const seen = {};
    const mark = (key, contentNow, rec) => {
      seen[key] = 1;
      if (_base[key] !== contentNow) { rec._rev = L; rec._ts = ts; }
    };

    // Settings : détection par champ pour _revs
    const settingsStable = stable(State.settings);
    seen["settings:_"] = 1;
    if (_base["settings:_"] !== settingsStable) {
      State.settings._rev = L;
      State.settings._ts = ts;
      if (!State.settings._revs) State.settings._revs = {};
      for (const k in State.settings) {
        if (STABLE_SKIP.has(k)) continue;
        if (_prevSettingsSnap[k] !== JSON.stringify(State.settings[k])) {
          State.settings._revs[k] = L;
        }
      }
    }

    for (const b of State.budgets) {
      mark("budget:" + b.id, budgetScalar(b), b);
      for (const sc of SUBCOLLS) for (const r of (b[sc] || [])) mark(sc + ":" + r.id, stable(r), r);
    }
    for (const t of State.transactions) mark("tx:" + t.id, stable(t), t);
    // suppressions : présents dans la base mais plus dans l'état courant
    for (const key in _base) {
      if (key === "settings:_") continue;
      if (!seen[key]) State.sync.graveyard[key] = ts; // wall-clock pour compatibilité TTL
    }
    pruneGraveyard();
    _base = buildBase();
  }
  function pruneGraveyard() {
    const cut = Date.now() - GRAVE_TTL;
    for (const k in State.sync.graveyard) if (State.sync.graveyard[k] < cut) delete State.sync.graveyard[k];
  }

  /* Max _rev vu dans un document — pour mettre à jour le compteur de Lamport local. */
  function _maxRevInDoc(doc) {
    let m = 0;
    if (doc && doc.settings) m = Math.max(m, doc.settings._rev || 0);
    for (const b of (doc && doc.budgets || [])) {
      m = Math.max(m, b._rev || 0);
      for (const sc of SUBCOLLS) for (const r of (b[sc] || [])) m = Math.max(m, r._rev || 0);
    }
    for (const t of (doc && doc.transactions || [])) m = Math.max(m, t._rev || 0);
    return m;
  }

  /* ---------- fusion de deux documents ---------- */
  function mergeArr(a, b, type, grave) {
    const out = {};
    for (const r of (a || [])) out[r.id] = r;
    for (const r of (b || [])) { const ex = out[r.id]; if (!ex || (r._rev || 0) > (ex._rev || 0)) out[r.id] = r; }
    return Object.values(out).filter(r => {
      const g = grave[type + ":" + r.id];
      if (!g) return true;
      // Comparer le graveyard (wall-clock) avec _ts du record si disponible (nouveaux records),
      // sinon avec _rev (anciens records dont _rev était un timestamp wall-clock).
      const rTs = r._ts || r._rev || 0;
      return !(g >= rTs);
    });
  }

  /* Fusion champ par champ des settings — chaque champ garde la version au _revs le plus élevé. */
  function mergeSettings(L_set, R_set) {
    const l_revs = (L_set && L_set._revs) || {};
    const r_revs = (R_set && R_set._revs) || {};
    const out = {}, out_revs = {};
    const allKeys = new Set([
      ...Object.keys(L_set || {}),
      ...Object.keys(R_set || {}),
    ].filter(k => !STABLE_SKIP.has(k)));
    for (const k of allKeys) {
      if (DEVICE_LOCAL_SETTINGS.has(k)) {
        // Champ local à l'appareil : toujours garder la valeur de L (l'appareil local)
        out[k] = k in (L_set || {}) ? L_set[k] : (R_set || {})[k];
      } else {
        const l_r = l_revs[k] || 0;
        const r_r = r_revs[k] || 0;
        if (r_r > l_r) { out[k] = (R_set || {})[k]; out_revs[k] = r_r; }
        else            { out[k] = (L_set || {})[k]; out_revs[k] = l_r; }
      }
    }
    out._rev  = Math.max((L_set && L_set._rev) || 0, (R_set && R_set._rev) || 0);
    out._revs = out_revs;
    return out;
  }

  function mergeDoc(L, R) {
    const grave = {};
    for (const k in (L.graveyard || {})) grave[k] = L.graveyard[k];
    for (const k in (R.graveyard || {})) grave[k] = Math.max(grave[k] || 0, R.graveyard[k]);
    const settings = mergeSettings(L.settings, R.settings);
    const bmap = {};
    for (const x of (L.budgets || [])) (bmap[x.id] = bmap[x.id] || {}).L = x;
    for (const x of (R.budgets || [])) (bmap[x.id] = bmap[x.id] || {}).R = x;
    const budgets = [];
    for (const id in bmap) {
      const bl = bmap[id].L, br = bmap[id].R;
      const rev = Math.max(bl && bl._rev || 0, br && br._rev || 0);
      const g = grave["budget:" + id];
      if (g && g >= rev) continue;
      const base = (bl && br) ? ((br._rev || 0) > (bl._rev || 0) ? br : bl) : (bl || br);
      const merged = Object.assign({}, base);
      for (const sc of SUBCOLLS) merged[sc] = mergeArr(bl && bl[sc], br && br[sc], sc, grave);
      budgets.push(merged);
    }
    const transactions = mergeArr(L.transactions, R.transactions, "tx", grave);
    return { settings, budgets, transactions, graveyard: grave };
  }

  /* ---------- document ⇄ état ---------- */
  const docFromState = () => ({
    settings: State.settings, budgets: State.budgets,
    transactions: State.transactions, graveyard: State.sync.graveyard,
  });
  function applyDoc(doc) {
    // mergeSettings() conserve déjà les champs DEVICE_LOCAL_SETTINGS depuis L (local),
    // donc State.settings.theme est déjà correct dans doc.settings.
    if (doc.settings) State.settings = doc.settings;
    State.budgets = doc.budgets || [];
    State.transactions = doc.transactions || [];
    State.sync.graveyard = doc.graveyard || {};
    // Mettre à jour le Lamport local pour qu'il reste ≥ à toute valeur vue
    State.sync.lamport = Math.max(State.sync.lamport || 0, _maxRevInDoc(doc));
    if (!State.budgets.find(b => b.id === State.activeBudgetId))
      State.activeBudgetId = (State.budgets.find(b => !b.archived) || State.budgets[0] || {}).id || null;
  }

  /* ---------- chiffrement de bout en bout (AES-256-GCM, clé dérivée du code de salon) ---------- */
  let _keyCache = { room: null, key: null };
  async function roomKey() {
    const room = State.sync.room.trim().toUpperCase();
    if (_keyCache.room === room && _keyCache.key) return _keyCache.key;
    const mat = await crypto.subtle.importKey("raw", new TextEncoder().encode(room), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: new TextEncoder().encode("horizon-budget:" + room), iterations: 150000, hash: "SHA-256" },
      mat, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
    _keyCache = { room, key };
    return key;
  }
  async function encryptDoc(doc) {
    const key = await roomKey();
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(JSON.stringify(doc))));
    const all = new Uint8Array(iv.length + ct.length);
    all.set(iv); all.set(ct, iv.length);
    let bin = ""; for (let i = 0; i < all.length; i += 8192) bin += String.fromCharCode.apply(null, all.subarray(i, i + 8192));
    return { e: btoa(bin) }; // seul un blob chiffré part sur le serveur
  }
  async function decryptDoc(doc) {
    if (!doc) return doc;
    if (!doc.e) return doc; // document historique non chiffré : accepté en lecture
    const bin = atob(doc.e);
    const all = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) all[i] = bin.charCodeAt(i);
    try {
      const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: all.subarray(0, 12) }, await roomKey(), all.subarray(12));
      return JSON.parse(new TextDecoder().decode(pt));
    } catch (e) {
      throw new Error("Déchiffrement impossible — code de salon incorrect ?");
    }
  }

  /* ---------- réseau (Supabase REST) ---------- */
  const cleanUrl = u => (u || "").trim().replace(/\/+$/, "");
  function headers(extra) {
    return Object.assign({
      "apikey": State.sync.anonKey.trim(),
      "Authorization": "Bearer " + State.sync.anonKey.trim(),
      "Content-Type": "application/json",
    }, extra || {});
  }
  const ROOM = () => encodeURIComponent(State.sync.room.trim());
  async function getRow() {
    const u = `${cleanUrl(State.sync.url)}/rest/v1/horizon_rooms?room=eq.${ROOM()}&select=doc,rev`;
    const r = await fetch(u, { headers: headers() });
    if (!r.ok) throw new Error("HTTP " + r.status + (r.status === 404 || r.status === 400 ? " — table introuvable ?" : ""));
    const a = await r.json();
    if (a[0]) a[0].doc = await decryptDoc(a[0].doc);
    return a[0] || null;
  }
  async function insertRow(doc) {
    const u = `${cleanUrl(State.sync.url)}/rest/v1/horizon_rooms`;
    const r = await fetch(u, {
      method: "POST", headers: headers({ Prefer: "return=representation" }),
      body: JSON.stringify([{ room: State.sync.room.trim(), doc: await encryptDoc(doc), rev: 1, updated_at: new Date().toISOString() }]),
    });
    if (!r.ok) return false;
    const a = await r.json().catch(() => []);
    return a.length > 0;
  }
  async function patchRow(doc, expectedRev) {
    const u = `${cleanUrl(State.sync.url)}/rest/v1/horizon_rooms?room=eq.${ROOM()}&rev=eq.${expectedRev}`;
    const r = await fetch(u, {
      method: "PATCH", headers: headers({ Prefer: "return=representation" }),
      body: JSON.stringify({ doc: await encryptDoc(doc), rev: expectedRev + 1, updated_at: new Date().toISOString() }),
    });
    if (!r.ok) return false;
    const a = await r.json().catch(() => []);
    return a.length > 0;
  }

  /* ---------- statut ---------- */
  function setStatus(s, err) {
    status = s; lastError = err || "";
    const chip = document.getElementById("sync-chip");
    if (chip) renderChipInto(chip);
  }
  const STATUS_META = {
    off: ["", "", "", false],
    connecting: ["sync", "Connexion…", "info", true],
    syncing: ["sync", "Synchro…", "info", true],
    synced: ["check", "À jour", "ok", false],
    offline: ["cloud", "Hors-ligne", "mut", false],
    error: ["alert", "Erreur sync", "danger", false],
  };
  function renderChipInto(chip) {
    const [icon, label, tone, spin] = STATUS_META[status] || STATUS_META.off;
    if (status === "off") { chip.style.display = "none"; return; }
    chip.style.display = "";
    chip.className = "sync-chip sc-" + tone;
    chip.title = lastError || (label + (State.sync.room ? " · salon " + State.sync.room : ""));
    chip.innerHTML = `<span class="ico ${spin ? "spin" : ""}" style="width:14px;height:14px;display:inline-grid;place-items:center">${I[icon] || ""}</span><span class="sc-label">${label}</span>`;
    chip.onclick = () => openSyncSetup();
  }
  function chipEl() {
    const chip = el("div", { id: "sync-chip", class: "sync-chip", role: "button", tabindex: 0 });
    renderChipInto(chip);
    return chip;
  }

  /* ---------- cœur : pousser (fusion + écriture concurrente) ---------- */
  async function pushNow() {
    if (!State.sync.enabled) return;
    if (!navigator.onLine) { setStatus("offline"); _pending = true; return; }
    if (_busy) { _pending = true; return; }
    _busy = true; _pending = false;
    setStatus("syncing");
    try {
      stampChanges();
      let local = docFromState();
      let changedRemote = false;
      for (let attempt = 0; attempt < 5; attempt++) {
        const remote = await getRow();
        // Mettre à jour Lamport depuis les données distantes avant de fusionner
        if (remote && remote.doc) State.sync.lamport = Math.max(State.sync.lamport || 0, _maxRevInDoc(remote.doc));
        const merged = remote ? mergeDoc(local, remote.doc || {}) : local;
        const ok = remote ? await patchRow(merged, remote.rev) : await insertRow(merged);
        if (ok) {
          const before = State.budgets.length + State.transactions.length;
          if (remote) { // la fusion peut avoir ramené des changements distants
            const prev = stableDocHash(local);
            applyDoc(merged);
            changedRemote = stableDocHash(docFromState()) !== prev;
          }
          State.sync.lastRev = (remote ? remote.rev : 0) + 1;
          _base = buildBase();
          try { localStorage.setItem(STORE_KEY, JSON.stringify(State)); } catch (e) {}
          setStatus("synced");
          if (remote && !_openModals.length) renderApp();
          _busy = false;
          if (_pending) schedulePush();
          return;
        }
        local = docFromState(); // conflit : on relit et on refusionne
      }
      setStatus("error", "Conflit d'écriture persistant — réessai au prochain changement.");
    } catch (e) {
      setStatus(navigator.onLine ? "error" : "offline", String(e.message || e));
    } finally {
      _busy = false;
      if (_pending && navigator.onLine) schedulePush();
    }
  }
  function stableDocHash(doc) {
    let h = doc.transactions.length + "|" + doc.budgets.length + "|" + (doc.settings && doc.settings._rev || 0);
    for (const t of (doc.transactions || [])) h += "|" + (t._rev || 0);
    for (const b of (doc.budgets || [])) {
      h += "|b" + (b._rev || 0);
      for (const sc of SUBCOLLS) for (const r of (b[sc] || [])) h += "," + (r._rev || 0);
    }
    return h;
  }

  /* ---------- interrogation périodique ---------- */
  async function poll() {
    if (!State.sync.enabled || _busy || !navigator.onLine) return;
    if (_openModals.length) return; // ne pas perturber une saisie en cours
    try {
      const remote = await getRow();
      if (remote && remote.rev > (State.sync.lastRev || 0)) {
        if (remote.doc) State.sync.lamport = Math.max(State.sync.lamport || 0, _maxRevInDoc(remote.doc));
        const merged = mergeDoc(docFromState(), remote.doc || {});
        applyDoc(merged);
        State.sync.lastRev = remote.rev;
        _base = buildBase();
        try { localStorage.setItem(STORE_KEY, JSON.stringify(State)); } catch (e) {}
        setStatus("synced");
        renderApp();
      } else if (status === "offline" || status === "error") setStatus("synced");
    } catch (e) {
      setStatus(navigator.onLine ? "error" : "offline", String(e.message || e));
    }
  }

  /* ---------- planification ---------- */
  function schedulePush() {
    clearTimeout(_pushTimer);
    _pushTimer = setTimeout(() => { _pushTimer = null; pushNow(); }, 600);
  }
  function startLoop() {
    clearInterval(_pollTimer);
    _pollTimer = setInterval(() => {
      if (document.visibilityState === "visible") poll();
    }, 4000);
  }

  /* ---------- API publique ---------- */
  function init() {
    if (!State.sync.deviceId) State.sync.deviceId = uid();
    _base = buildBase();
    window.addEventListener("online", () => { setStatus("connecting"); pushNow(); poll(); });
    window.addEventListener("offline", () => setStatus("offline"));
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") poll();
      else if (State.sync.enabled && _pushTimer !== null) { clearTimeout(_pushTimer); _pushTimer = null; pushNow(); }
    });
    if (State.sync.enabled && State.sync.url && State.sync.room) {
      setStatus("connecting");
      startLoop();
      poll().then(pushNow);
    } else setStatus("off");
  }

  async function connect(opts) {
    // opts: {url, anonKey, room, strategy} strategy: merge | pullCloud | pushLocal
    State.sync.url = cleanUrl(opts.url);
    State.sync.anonKey = opts.anonKey.trim();
    State.sync.room = opts.room.trim();
    setStatus("connecting");
    const remote = await getRow(); // lève si table absente / creds faux
    const haveLocal = State.budgets.length > 0;
    const haveRemote = remote && remote.doc && (remote.doc.budgets || []).length > 0;
    if (haveRemote && opts.strategy === "pullCloud") {
      applyDoc(mergeDoc({ graveyard: {} }, remote.doc));
      State.sync.lastRev = remote.rev;
    } else if (haveRemote && opts.strategy === "merge") {
      applyDoc(mergeDoc(docFromState(), remote.doc));
      State.sync.lastRev = remote.rev;
    }
    // pushLocal (ou pas de données distantes) : on garde le local tel quel, pushNow l'enverra
    State.sync.enabled = true;
    _base = buildBase();
    // force l'envoi initial : on neutralise la base pour tout estampiller
    if (!haveRemote || opts.strategy === "pushLocal") _base = {};
    persist();
    startLoop();
    await pushNow();
    return { haveLocal, haveRemote };
  }
  async function probe(opts) {
    const u = cleanUrl(opts.url);
    const r = await fetch(`${u}/rest/v1/horizon_rooms?select=room&limit=1`, {
      headers: { apikey: opts.anonKey.trim(), Authorization: "Bearer " + opts.anonKey.trim() },
    });
    if (r.status === 404 || r.status === 400) throw new Error("Table « horizon_rooms » introuvable. Exécutez le script SQL d'abord.");
    if (r.status === 401 || r.status === 403) throw new Error("Clé ou URL incorrecte (accès refusé).");
    if (!r.ok) throw new Error("Connexion impossible (HTTP " + r.status + ").");
    return true;
  }
  function disconnect() {
    State.sync.enabled = false;
    clearInterval(_pollTimer);
    setStatus("off");
    persist();
  }

  return {
    init, connect, probe, disconnect, pushNow, poll, schedulePush,
    chipEl, mergeDoc, _internals: { buildBase, stampChanges, get base() { return _base; } },
    get status() { return status; }, get error() { return lastError; },
    get enabled() { return State.sync.enabled; },
  };
})();

function syncStatusText() {

function gstep(n, title, body) {
  return el("div", { class: "guide-step" },

function copyText(t) {
  if (navigator.clipboard) navigator.clipboard.writeText(t).catch(() => fallbackCopy(t));

function fallbackCopy(t) {
  const ta = el("textarea", { style: "position:fixed;opacity:0" }); ta.value = t;

    emoji: "🔒", title: "Confidentialité", tags: "confidentialite vie privee donnees securite serveur",
    body: () => [
      p("Par défaut, <b>aucune donnée ne quitte votre appareil</b> : tout est stocké localement dans le navigateur, sans compte ni serveur."),
      p("Si vous activez la synchronisation, les données sont <b>chiffrées de bout en bout</b> (AES-256) avant d'être envoyées vers <b>votre propre</b> base Supabase : sans le code de salon, elles sont illisibles — y compris pour Supabase. Horizon Budget n'a aucun serveur central et ne collecte rien."),
    ],
  },
  {
    emoji: "⌨️", title: "Raccourcis clavier", tags: "raccourci clavier touche",
    body: () => [
      ul([
        "<kbd>1</kbd>–<kbd>8</kbd> : naviguer entre les onglets principaux.",
        "<kbd>n</kbd> : nouvelle transaction réelle.",
        "<kbd>Échap</kbd> : fermer une fenêtre.",
      ]),
    ],
  },
];

function viewHelp(root) {
  const search = el("div", { class: "searchbar", style: "max-width:380px" },
    el("span", { html: ico("search", 15) }),
    el("input", {
      class: "input", placeholder: "Rechercher dans l'aide…", value: _helpSearch,
      oninput: debounce(e => { _helpSearch = e.target.value.toLowerCase().trim(); renderApp(); }, 250)
    }));

  const q = _helpSearch;
  const sections = HELP_SECTIONS.filter(s => !q || (s.title + " " + s.tags).toLowerCase().includes(q));

  const acc = el("div", { class: "grid", style: "gap:10px" }, sections.length ? sections.map((s, i) => {
    const open = !!q || i === 0;
    return el("details", { class: "help-card", open },
      el("summary", {}, el("span", { class: "h-emoji" }, s.emoji), el("span", {}, s.title), el("span", { class: "spacer" }), el("span", { class: "h-chev", html: ico("chevD", 16) })),
      el("div", { class: "help-body" }, ...s.body()));
  }) : [emptyState("🔍", "Aucun résultat", "Essayez un autre mot-clé (ex. « synchro », « crédit », « csv »).")]);

  root.append(el("div", { class: "content-inner" },
    el("div", { class: "flex mb16", style: "flex-wrap:wrap; gap:10px" },
      el("div", {}, el("p", { class: "muted", style: "max-width:560px" }, "Tout ce que fait l'application, expliqué simplement. La synchronisation entre appareils a sa propre fiche détaillée.")),
      el("span", { class: "spacer" }), search),
    el("div", { class: "flex mb16", style: "flex-wrap:wrap; gap:8px" },
      el("button", { class: "btn btn-p", html: ico("sync", 15) + "<span>Configurer la synchronisation</span>", onclick: () => openSyncSetup() }),
      el("button", { class: "btn", html: ico("rocket", 15) + "<span>Relancer l'assistant de démarrage</span>", onclick: () => { State.onboarded = false; persist(); location.reload(); } })),
    acc));
}

/* helpers de contenu */
function p(html) { return el("p", { class: "mb8", style: "line-height:1.7", html }); }
function ul(items) { return el("ul", { class: "help-list" }, items.map(i => el("li", { html: i }))); }
function ol(items) { return el("ol", { class: "help-list ol" }, items.map(i => el("li", { html: i }))); }
function tip(html) { return el("div", { class: "alert a-ok mt8", style: "font-size:13px" }, el("span", { class: "a-ico", html: ico("info", 16) }), el("span", { html: "💡 " + html })); }
function warn(html) { return el("div", { class: "alert a-warn mt8", style: "font-size:13px" }, el("span", { class: "a-ico", html: ico("alert", 16) }), el("span", { html })); }
function btn(label, onclick) { return el("button", { class: "btn btn-sm mt8", style: "margin-right:8px", onclick }, label); }


/* ===== 99-app.js ===== */
"use strict";
/* ============ coquille applicative : navigation & rendu ============ */

/* Vues de contenu (toutes conservées : les hubs réutilisent leurs render). */
const VIEWS = {
  dashboard:  { label: "Accueil",    icon: "home",    sub: () => {
    const h = new Date().getHours();
    const salut = h < 5 ? "Bonsoir" : h < 18 ? "Bonjour" : "Bonsoir";
    return State.settings.firstName ? `${salut} ${State.settings.firstName}` : "Votre mois en un coup d'œil";
  }, render: viewDashboard },
  budget:     { label: "Budget",     icon: "list",    sub: () => "Revenus & dépenses planifiés", render: viewBudget },
  suivi:      { label: "Suivi",      icon: "receipt", sub: () => "Vos opérations, jour après jour", render: viewSuivi },
  avenir:     { label: "Avenir",     icon: "trend",   sub: () => "Projections, objectifs & projets", render: viewAvenir },
  settings:   { label: "Réglages",   icon: "gear",    sub: () => "Profil, données & partage", render: viewSettings },
  // sous-vues (atteintes via les hubs Suivi / Avenir ou les réglages)
  projection: { label: "Projections", icon: "trend",  sub: () => "Votre avenir, mois par mois", render: viewProjection },
  calendar:   { label: "Calendrier",  icon: "cal",    sub: () => "Échéances & solde au jour le jour", render: viewCalendar },
  tracking:   { label: "Opérations",  icon: "receipt",sub: () => "Transactions & prévu vs réel", render: viewTracking },
  goals:      { label: "Objectifs",   icon: "target", sub: () => "Épargne & projets", render: viewGoals },
  debts:      { label: "Crédits",     icon: "card",   sub: () => "Mensualités & amortissement", render: viewDebts },
  events:     { label: "Événements",  icon: "zap",    sub: () => "Changements de situation", render: viewEvents },
  budgets:    { label: "Mes budgets", icon: "layers", sub: () => "Multi-budgets & scénarios", render: viewBudgets },
  help:       { label: "Aide",        icon: "info",   sub: () => "Tutoriels & questions fréquentes", render: viewHelp },
};

/* Onglets principaux (barre du bas mobile + sidebar desktop). */
const TABS = [
  { k: "dashboard", label: "Accueil", icon: "home" },
  { k: "budget",    label: "Budget",  icon: "list" },
  { k: "suivi",     label: "Suivi",   icon: "receipt" },
  { k: "avenir",    label: "Avenir",  icon: "trend" },
];

/* Hubs à sous-onglets internes. */
const HUBS = {
  suivi:  { def: "tracking",   subs: [{ k: "tracking", label: "Opérations" }, { k: "calendar", label: "Calendrier" }] },
  avenir: { def: "projection", subs: [{ k: "projection", label: "Projection" }, { k: "goals", label: "Objectifs" }, { k: "debts", label: "Crédits" }, { k: "events", label: "Événements" }] },
};

/* Routage : n'importe quelle clé (héritée ou non) → onglet principal + sous-vue. */
const ROUTE = {
  home: ["dashboard"], dashboard: ["dashboard"],
  budget: ["budget"],
  suivi: ["suivi", null], tracking: ["suivi", "tracking"], calendar: ["suivi", "calendar"],
  avenir: ["avenir", null], projection: ["avenir", "projection"], goals: ["avenir", "goals"], debts: ["avenir", "debts"], events: ["avenir", "events"],
  budgets: ["budgets"], settings: ["settings"], help: ["help"],
};

let _view = "dashboard";
const _sub = { suivi: "tracking", avenir: "projection" };

function go(key) {
  const r = ROUTE[key] || ROUTE.dashboard;
  _view = r[0];
  if (r[1]) _sub[_view] = r[1];
  if (HUBS[_view] && !_sub[_view]) _sub[_view] = HUBS[_view].def;
  renderApp();
  const c = $(".content");
  if (c) c.scrollTop = 0;
}

function applyTheme() {
  const t = State.settings.theme;
  const dark = t === "dark" || (t === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches);
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  const meta = $('meta[name="theme-color"]');
  if (meta) meta.setAttribute("content", dark ? "#0b1120" : "#13203f");
}
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => State.settings.theme === "auto" && applyTheme());

function isDark() { return document.documentElement.getAttribute("data-theme") === "dark"; }

function renderApp() {
  const app = $("#app");
  if (!app) return;
  const b = curBudget();
  if (!b) { showOnboarding(); return; }
  const v = VIEWS[_view] || VIEWS.dashboard;
  app.innerHTML = "";

  // ---- barre latérale (desktop) ----
  const navBox = el("div", { class: "nav-main" }, TABS.map(t => navBtn(t.k, t.label, t.icon)));
  const footBox = el("div", { class: "nav-foot-list" },
    navBtn("settings", "Réglages", "gear"),
    navBtn("help", "Aide", "info"));
  const sidebar = el("aside", { class: "sidebar" },
    el("div", { class: "brand", html: I.logo + "<span>Horizon<br>Budget</span>" }),
    el("button", { class: "nav-add", onclick: openQuickAdd }, el("span", { class: "ico", html: I.plus }), "Ajouter"),
    navBox,
    el("div", { class: "nav-sep" }),
    footBox,
    el("div", { class: "nav-foot" },
      el("button", { class: "budget-pill", onclick: openBudgetSwitcher, title: "Changer de budget" },
        el("span", { class: "b-ico" }, b.emoji),
        el("span", { class: "b-name" }, b.name, b.scenarioOf ? " 🧪" : ""),
        el("span", { html: ico("swap", 15), style: "opacity:.6" }))));

  // ---- barre du haut ----
  const themeBtn = el("button", {
    class: "btn btn-ghost btn-ico", html: ico(isDark() ? "sun" : "moon", 18), title: "Basculer clair/sombre",
    onclick: () => { State.settings.theme = isDark() ? "light" : "dark"; applyTheme(); persist(); renderApp(); }
  });
  const gearBtn = el("button", { class: "btn btn-ghost btn-ico only-mobile", html: ico("gear", 18), title: "Réglages", onclick: () => go("settings") });
  const topbar = el("div", { class: "topbar" },
    el("button", { class: "topbar-title", onclick: openBudgetSwitcher, title: "Changer de budget" },
      el("h1", {}, v.label),
      el("div", { class: "sub" }, `${b.emoji} ${b.name}`,
        State.budgets.filter(x => !x.archived).length > 1 ? el("span", { class: "ico", html: I.chevD, style: "width:12px;height:12px;display:inline-grid;place-items:center;vertical-align:-1px;margin-left:3px;opacity:.6" }) : null,
        ` · ${v.sub()}`)),
    el("div", { class: "topbar-actions" }, Sync.chipEl(), gearBtn, themeBtn));

  const content = el("div", { class: "content" });
  const main = el("main", { class: "main" }, topbar, content);

  // ---- barre du bas (mobile) : 2 onglets · FAB central · 2 onglets ----
  const tabBtn = k => el("button", {
    class: "bn-tab" + (_view === k ? " active" : ""), onclick: () => go(k)
  }, el("span", { class: "ico", html: I[VIEWS[k].icon] }), VIEWS[k].label);
  const bottomnav = el("nav", { class: "bottomnav" },
    tabBtn("dashboard"), tabBtn("budget"),
    el("button", { class: "bn-fab", html: ico("plus", 26), title: "Ajout rapide", onclick: openQuickAdd }),
    tabBtn("suivi"), tabBtn("avenir"));

  app.append(sidebar, main, bottomnav);
  v.render(content);
  Juice.view(content);

  function navBtn(k, label, icon) {
    return el("button", { class: "nav-item" + (_view === k ? " active" : ""), title: label, onclick: () => go(k) },
      el("span", { class: "ico", html: I[icon] }), el("span", { class: "nav-label" }, label));
  }
}

/* Barre de sous-onglets d'un hub (Suivi / Avenir). */
function subTabBar(hub) {
  const cur = _sub[hub] || HUBS[hub].def;
  return el("div", { class: "subtabs" }, HUBS[hub].subs.map(s =>
    el("button", { class: "subtab" + (s.k === cur ? " on" : ""), onclick: () => { _sub[hub] = s.k; renderApp(); $(".content") && ($(".content").scrollTop = 0); } }, s.label)));
}

function viewSuivi(root) {
  root.append(el("div", { class: "content-inner" }, subTabBar("suivi")));
  (VIEWS[_sub.suivi] || VIEWS.tracking).render(root);
}
function viewAvenir(root) {
  root.append(el("div", { class: "content-inner" }, subTabBar("avenir")));
  (VIEWS[_sub.avenir] || VIEWS.projection).render(root);
}

function openQuickAdd() {
  const b = curBudget();
  const m = modal({
    title: "Ajout rapide",
    body: el("div", { style: "display:flex; flex-direction:column; gap:8px; padding:4px 0 8px" },
      Custom.quick().map(q => el("button", { class: "btn", style: "justify-content:flex-start; padding:13px 14px", onclick: () => q.run(b, m.close) }, `${q.emoji} ${q.label}`)))
  });
}

function openBudgetSwitcher() {
  const active = State.budgets.filter(x => !x.archived);
  const m = modal({
    title: "Changer de budget",
    body: el("div", { style: "display:flex; flex-direction:column; gap:6px; padding:4px 0 8px" },
      active.map(x => el("button", {
        class: "btn", style: "justify-content:flex-start; padding:11px 13px" + (x.id === State.activeBudgetId ? "; border-color:var(--accent)" : ""),
        onclick: () => { State.activeBudgetId = x.id; persist(); m.close(); renderApp(); }
      }, `${x.emoji} ${x.name}`, x.scenarioOf ? el("span", { class: "tag-scen", style: "margin-left:8px" }, "scénario") : null,
        x.id === State.activeBudgetId ? el("span", { class: "badge b-pos", style: "margin-left:auto" }, "actif") : null)),
      el("button", { class: "btn btn-ghost", style: "justify-content:flex-start", onclick: () => { m.close(); go("budgets"); } }, "📂 Gérer mes budgets…"))
  });
}

/* ---- raccourcis clavier ---- */
document.addEventListener("keydown", e => {
  if (e.target.matches("input, select, textarea") || _openModals.length) return;
  const map = { "1": "dashboard", "2": "budget", "3": "suivi", "4": "avenir", "5": "settings" };
  if (map[e.key]) go(map[e.key]);
  if (e.key === "n") { e.preventDefault(); openTxEditor(curBudget(), null); }
});

/* ---- démarrage ---- */
loadStateAsync().then(() => {
  Custom.ensure();
  applyTheme();
  Custom.apply();
  Sync.init();
  if (!State.onboarded || !State.budgets.length) showOnboarding();
  else { renderApp(); }
});
window.addEventListener("beforeunload", () => {
  if (window._wipe) return; // effacement volontaire : ne pas re-sauvegarder
  persistSync();
});


/* ===== enregistrement du service worker (PWA) ===== */
if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
  let _swActivating = false;
  function _activateNow(w) {
    if (!w || _swActivating) return;
    function tryActivate() {
      if (w.state === "installed") {
        _swActivating = true;
        w.postMessage("skipWaiting");
      }
    }
    if (w.state === "installed") { tryActivate(); return; }
    w.addEventListener("statechange", tryActivate);
  }
  navigator.serviceWorker.register("./sw.js").then(reg => {
    if (reg.waiting) _activateNow(reg.waiting);
    reg.addEventListener("updatefound", () => _activateNow(reg.installing));
  }).catch(() => {});
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (_swActivating) { _swActivating = false; location.reload(); }
  });
}
</script>
