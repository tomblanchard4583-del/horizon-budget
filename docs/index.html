let _openModals = [];
let _focusedBefore = null;
function modal(opts) {
  const veil = el("div", { class: "modal-veil" });
  const head = el("div", { class: "modal-head" },
    el("h3", {}, opts.title || ""),
    el("button", { class: "btn btn-ghost btn-ico", title: "Fermer", html: ico("x", 19), onclick: close })
  );
  const body = el("div", { class: "modal-body" });
  if (opts.body) body.append(...[].concat(opts.body));
  const m = el("div", { class: "modal" + (opts.lg ? " modal-lg" : "") }, head, body);
  if (opts.foot) m.append(el("div", { class: "modal-foot" }, ...[].concat(opts.foot)));
  m.setAttribute("role", "dialog");
  m.setAttribute("aria-modal", "true");
  if (opts.title) m.setAttribute("aria-label", opts.title);
  veil.append(m);
  veil.addEventListener("mousedown", e => { if (e.target === veil) close(); });
  document.body.append(veil);
  // piège de focus : sauvegarde l'élément focus avant, redirige dans la modale, restaure après fermeture
  _focusedBefore = document.activeElement;
  const focusables = "button, [href], input, select, textarea, [tabindex]:not([tabindex='-1'])";
  const inModal = m.querySelectorAll(focusables);
  const first = inModal[0], last = inModal[inModal.length - 1];
  const trapTab = e => {
    if (e.key !== "Tab") return;
    if (e.shiftKey) {
      if (document.activeElement === first) { e.preventDefault(); last.focus(); }
    } else {
      if (document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  };
  m.addEventListener("keydown", trapTab);
  if (first) first.focus();
  _openModals.push({ close, trapTab, m });
  function close() {
    m.removeEventListener("keydown", trapTab);
    veil.remove();
    _openModals = _openModals.filter(x => x.close !== close);
    if (_focusedBefore) _focusedBefore.focus();
    opts.onClose && opts.onClose();
  }
  return { close, body, root: m };
}
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && _openModals.length) _openModals[_openModals.length - 1].close();
});

function confirmDialog(opts) {

}

function selectInput(options, value, attrs) {

/* Sélecteur de catégorie groupé (avec sous-catégories indentées).
   Tri intelligent : la catégorie prédite pour le libellé saisi remonte tout en haut,
   suivie des catégories fréquentes (usage récent pondéré). ctx = { label } optionnel. */
function catSelect(budget, kind, value, attrs, ctx) {
  const roots = budget.categories.filter(c => c.kind === kind && !c.parentId);
  const s = el("select", { class: "input", ...attrs });
  s.append(el("option", { value: "" }, "— Sans catégorie —"));
  // prédiction selon le libellé en cours de saisie (règle apprise ou mots-clés)
  let predId = null;
  if (ctx && ctx.label && typeof Intel !== "undefined") {
    const pred = Intel.suggest(budget, ctx.label, kind);
    if (pred && pred.categoryId && catById(budget, pred.categoryId)) predId = pred.categoryId;
  }
  if (predId) {
    const c = catById(budget, predId), p = c.parentId ? catById(budget, c.parentId) : null;
    const g = el("optgroup", { label: "✨ Suggéré" });
    g.append(el("option", { value: c.id, selected: !value }, `${(p || c).emoji} ${p ? p.name + " · " : ""}${c.name}`));
    s.append(g);
  }
  const freq = (typeof Intel !== "undefined") ? Intel.topCats(budget, kind, 5) : [];
  if (freq.length) {
    const g = el("optgroup", { label: "★ Fréquentes" });
    freq.forEach(c => {
      if (c.id === predId) return;
      const p = c.parentId ? catById(budget, c.parentId) : null;
      g.append(el("option", { value: c.id }, `${(p || c).emoji} ${c.name}`));
    });
    s.append(g);
  }
  for (const r of roots) {
    const g = el("optgroup", { label: `${r.emoji} ${r.name}` });
    g.append(el("option", { value: r.id, selected: r.id === value }, `${r.name} (général)`));
    budget.categories.filter(c => c.parentId === r.id)
      .forEach(c => g.append(el("option", { value: c.id, selected: c.id === value }, c.name)));
    s.append(g);
  }
  return s;
}

"use strict";
/* ============ animations d'interface : entrées de vue, chiffres, jauges ============ */

const Juice = (() => {
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)");
  const on = () => State.settings.juice !== false && !reduced.matches;

  /* ---- retour haptique discret (mobile, confirmation d'action) ---- */
  function buzz(pattern) {
    if (!on() || !navigator.vibrate) return;
    try { navigator.vibrate(pattern); } catch (e) {}
  }

  /* ---- chiffres animés : fait défiler la partie numérique d'un texte déjà rendu ---- */
  function countUpText(node, dur) {
    const final = node.textContent;
    const m = final.match(/-?\d(?:[\d\s  ]*\d)?(?:,\d+)?/);
    if (!m) return;
    const raw = m[0];
    const val = parseFloat(raw.replace(/[\s  ]/g, "").replace(",", "."));
    if (!isFinite(val) || Math.abs(val) < 1) return;
    const dec = (raw.split(",")[1] || "").length;
    const nf = new Intl.NumberFormat("fr-FR", { minimumFractionDigits: dec, maximumFractionDigits: dec });
    const t0 = performance.now();
    function tick(now) {
      const p = Math.min(1, (now - t0) / dur);
      const e = 1 - Math.pow(1 - p, 3);
      node.textContent = p >= 1 ? final : final.replace(raw, nf.format(val * e));
      if (p < 1 && node.isConnected) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  /* ---- animation d'entrée d'une vue : sections en cascade, chiffres et jauges ---- */
  function view(content) {
    if (!on()) return;
    const inner = $(".content-inner", content) || content;
    [...inner.children].slice(0, 14).forEach((c, i) => {
      c.classList.add("j-stagger");
      c.style.setProperty("--jd", i * 34 + "ms");
    });
    $$(".kpi", content).forEach((k, i) => {
      k.classList.add("j-stagger");
      k.style.setProperty("--jd", i * 40 + "ms");
    });
    $$(".k-value", content).forEach(n => countUpText(n, 620));
    growBars(content);
  }

  /* jauges : pousse de 0 vers leur largeur cible (transition CSS) */
  function growBars(root) {
    if (!on()) return;
    $$(".pbar>i", root).forEach(bar => {
      const w = bar.style.width;
      if (!w || w === "0%") return;
      bar.style.width = "0%";
      requestAnimationFrame(() => requestAnimationFrame(() => { bar.style.width = w; }));
    });
  }

  return { on, view, growBars, buzz };
})();


/* ===== 08-intel.js ===== */
"use strict";
/* ============ moteur d'apprentissage : catégorisation, récurrences, ventilation, IA ============ */

const Intel = (() => {

  /* ---------- clé marchand : normalise un libellé bancaire ---------- */
  const NOISE_WORDS = /\b(CB|CARTE|PAIEMENT|ACHAT|PRLV|PRELEVEMENT|VIR|VIREMENT|SEPA|INST|INSTANTANE|ECH|ECHEANCE|EMIS|RECU|FACTURE|MENSUALITE|ABONNEMENT|WEB|INTERNET|FR|EUR?)\b/g;

  function isCashWithdrawal(label) {
    return /retrait|\bdab\b|distributeur|\batm\b|withdrawal/i.test(label || "");
  }

  function merchantKey(label) {
    if (!label) return "";
    if (isCashWithdrawal(label)) return "RETRAIT";
    let s = String(label).toUpperCase()
      .normalize("NFD").replace(/[̀-ͯ]/g, "").replace(/[̀-ͯ]/g, "")
      .replace(/\d{1,2}[\/.\-]\d{1,2}([\/.\-]\d{2,4})?/g, " ")
      .replace(NOISE_WORDS, " ")
      .replace(/\bX{2,}\d*\b/g, " ")
      .replace(/\d{4,}/g, " ")
      .replace(/[^A-Z0-9]+/g, " ")
      .replace(/\s+/g, " ").trim();
    return s.split(" ").slice(0, 3).join(" ");
  }

  const ruleKey = (b, label) => {
    const k = merchantKey(label);
    return k ? b.id + "|" + k : null;
  };
  const median = arr => {
    if (!arr.length) return 0;
    const s = [...arr].sort((a, z) => a - z);
    return s.length % 2 ? s[(s.length - 1) / 2] : (s[s.length / 2 - 1] + s[s.length / 2]) / 2;
  };

  /* ---------- suggestion de catégorie : règles apprises puis mots-clés ---------- */
  function suggest(b, label, kind) {
    const rk = ruleKey(b, label);
    if (rk) {
      const r = State.intel.rules[rk];
      if (r && r.kind === kind && r.categoryId && catById(b, r.categoryId)) {
        return { categoryId: r.categoryId, source: "appris", auto: r.confirms >= 2, usual: median(r.amounts || []) };
      }
    }
    for (const [re, catName] of AUTO_CAT_KEYWORDS) {
      if (re.test(label || "")) {
        const c = b.categories.find(c => c.name === catName && c.kind === kind);
        if (c) return { categoryId: c.id, source: "mots-clés", auto: false, usual: 0 };
      }
    }
    return null;
  }

  /* ---------- apprentissage : chaque transaction confirmée nourrit les règles ---------- */
  function learn(b, tx) {
    if (tx.splits && tx.splits.length) {
      recordSplit(b, tx.label, tx.splits, +tx.amount);
      tx.splits.forEach(s => bumpCat(b, s.categoryId));
      return;
    }
    if (!tx.categoryId || !catById(b, tx.categoryId)) return;
    const rk = ruleKey(b, tx.label);
    if (!rk) return;
    const r = State.intel.rules[rk] || (State.intel.rules[rk] = { kind: tx.kind, categoryId: null, confirms: 0, amounts: [], days: [], itemId: null });
    r.kind = tx.kind;
    if (r.categoryId === tx.categoryId) r.confirms++;
    else { r.categoryId = tx.categoryId; r.confirms = 1; }
    r.amounts = (r.amounts || []).concat(+tx.amount).slice(-8);
    r.days = (r.days || []).concat(+tx.date.slice(8)).slice(-8);
    r.lastDate = tx.date;
    bumpCat(b, tx.categoryId);
  }

  /* ---------- usage des catégories (tri des menus déroulants) ---------- */
  function bumpCat(b, catId) {
    if (!catId) return;
    const k = b.id + "|" + catId;
    State.intel.catUsage[k] = (State.intel.catUsage[k] || 0) + 1;
    (State.intel.catLast || (State.intel.catLast = {}))[k] = Date.now();
  }
  /* Catégories les plus pertinentes : usage fréquent + récence (les habitudes récentes
     remontent plus vite que de vieilles utilisations massives). */
  function topCats(b, kind, n) {
    const now = Date.now();
    const last = State.intel.catLast || {};
    return Object.entries(State.intel.catUsage)
      .filter(([k]) => k.startsWith(b.id + "|"))
      .map(([k, count]) => {
        const days = last[k] ? (now - last[k]) / 86400000 : 999;
        const rec = days < 30 ? (1 - days / 30) : 0;       // boost de récence sur 30 jours
        return { cat: catById(b, k.slice(b.id.length + 1)), count, score: count + rec * 3 };
      })
      .filter(x => x.cat && x.cat.kind === kind && x.count >= 2)
      .sort((a, z) => z.score - a.score)
      .slice(0, n || 5).map(x => x.cat);
  }

  /* ---------- mémoire de ventilation (méthode des enveloppes) ---------- */
  function recordSplit(b, label, splits, total) {
    const rk = ruleKey(b, label);
    if (!rk || !total) return;
    State.intel.splitMemory[rk] = splits
      .filter(s => s.categoryId && +s.amount > 0)
      .map(s => ({ categoryId: s.categoryId, share: +s.amount / total }));
  }
  function splitFor(b, label, amount) {
    const rk = ruleKey(b, label);
    const mem = rk && State.intel.splitMemory[rk];
    if (!mem || !mem.length || !amount) return null;
    const valid = mem.filter(m => catById(b, m.categoryId));
    if (!valid.length) return null;
    const out = valid.map(m => ({ categoryId: m.categoryId, amount: round2(amount * m.share) }));
    const diff = round2(amount - out.reduce((s, o) => s + o.amount, 0));
    out[out.length - 1].amount = round2(out[out.length - 1].amount + diff);
    return out;
  }

  /* ---------- détection de récurrences sur l'historique réel ---------- */
  const FREQ_WINDOWS = [
    ["weekly", 5.5, 8.5], ["biweekly", 12, 16], ["monthly", 26, 35], ["bimonthly", 55, 70],
    ["quarterly", 80, 100], ["semiannual", 165, 200], ["annual", 330, 400],
  ];
  const dayDiff = (d1, d2) => Math.round((toDate(d2) - toDate(d1)) / 86400000);

  function titleCase(s) {
    return s.toLowerCase().replace(/(^|\s)\S/g, c => c.toUpperCase());
  }

  function detectRecurring(b) {
    const groups = {};
    for (const t of State.transactions) {
      if (t.budgetId !== b.id) continue;
      const k = merchantKey(t.label);
      if (!k || k === "RETRAIT") continue;
      (groups[k] = groups[k] || []).push(t);
    }
    const out = [];
    for (const [k, txs] of Object.entries(groups)) {
      if (txs.length < 3) continue;
      txs.sort((a, z) => a.date.localeCompare(z.date));
      const intervals = txs.slice(1).map((t, i) => dayDiff(txs[i].date, t.date)).filter(d => d > 0);
      if (intervals.length < 2) continue;
      const medInt = median(intervals);
      const fw = FREQ_WINDOWS.find(([, lo, hi]) => medInt >= lo && medInt <= hi);
      if (!fw) continue;
      const freq = fw[0];
      if (!intervals.every(d => d >= fw[1] * 0.6 && d <= fw[2] * 1.4)) continue;

      const amounts = txs.map(t => +t.amount);
      const medAmt = median(amounts);
      if (medAmt < 1) continue;
      const spread = (Math.max(...amounts) - Math.min(...amounts)) / medAmt;
      const medDay = Math.round(median(txs.map(t => +t.date.slice(8))));
      const kind = txs.filter(t => t.kind === "income").length > txs.length / 2 ? "income" : "expense";
      const catCounts = {};
      txs.forEach(t => { if (t.categoryId) catCounts[t.categoryId] = (catCounts[t.categoryId] || 0) + 1; });
      const catId = Object.keys(catCounts).sort((a, z) => catCounts[z] - catCounts[a])[0] || null;
      const rule = State.intel.rules[b.id + "|" + k];

      const item = b.items.find(it => it.kind === kind && !it.endDate && (
        (rule && rule.itemId === it.id) ||
        (catId && it.categoryId === catId && it.freq === freq && Math.abs(monthAvg(it) - monthAvg({ amount: medAmt, freq })) / Math.max(1, monthAvg(it)) < 0.5)
      ));

      const name = titleCase(k);
      if (!item) {
        out.push({
          id: `new|${b.id}|${k}`, type: "new", key: k, kind, freq, catId,
          amount: round2(medAmt), day: medDay, variable: spread > 0.25,
          min: round2(Math.min(...amounts)), max: round2(Math.max(...amounts)),
          firstDate: txs[0].date, count: txs.length,
          text: `« ${name} » revient ${txs.length} fois, ${FREQS[freq].label.toLowerCase()}, ≈ ${fmtMoney(medAmt, b.currency, { dec: 0 })} autour du ${medDay} → en faire un poste du budget ?`,
          apply() {
            const it = newItem(kind);
            it.name = name;
            it.categoryId = catId;
            it.amount = round2(medAmt);
            it.freq = freq; it.day = medDay;
            it.variable = spread > 0.25;
            if (it.variable) { it.min = round2(Math.min(...amounts)); it.max = round2(Math.max(...amounts)); }
            it.startDate = ymOf(txs[0].date) + "-01";
            b.items.push(it);
            if (rule) rule.itemId = it.id;
            const rk2 = b.id + "|" + k;
            (State.intel.rules[rk2] = State.intel.rules[rk2] || { kind, categoryId: catId, confirms: 0, amounts: [], days: [] }).itemId = it.id;
            return `Poste « ${name} » créé`;
          }
        });
      } else {
        const recent = amounts.slice(-2);
        const newAmt = round2(median(recent));
        if (recent.length === 2 && recent.every(a => Math.abs(a - item.amount) > Math.max(2, item.amount * 0.05))
          && Math.sign(recent[0] - item.amount) === Math.sign(recent[1] - item.amount) && !item.variable) {
          out.push({
            id: `amt|${b.id}|${k}|${Math.round(newAmt)}`, type: "amount", key: k,
            text: `« ${item.name} » : les derniers prélèvements sont à ${fmtMoney(newAmt, b.currency, { dec: 0 })} alors que le poste prévoit ${fmtMoney(item.amount, b.currency, { dec: 0 })} → mettre à jour ?`,
            apply() { item.amount = newAmt; return `Montant de « ${item.name} » mis à jour`; }
          });
        }
        if (FREQ_MONTHS[freq] && Math.abs(medDay - item.day) >= 4) {
          out.push({
            id: `day|${b.id}|${k}|${medDay}`, type: "day", key: k,
            text: `« ${item.name} » : les opérations tombent autour du ${medDay} alors que le poste est calé sur le ${item.day} → ajuster la date ?`,
            apply() { item.day = medDay; return `Jour de « ${item.name} » ajusté au ${medDay}`; }
          });
        }
      }
    }
    return out.filter(s => !State.intel.dismissed[s.id]);
  }
  const monthAvg = it => (+it.amount || 0) * (FREQS[it.freq] ? FREQS[it.freq].perYear : 12) / 12;

  function dismiss(id) { State.intel.dismissed[id] = Date.now(); }

  /* ---------- mémoire des formats CSV (mapping de colonnes par banque) ---------- */
  const csvFingerprint = header => header.map(h => String(h).toLowerCase().trim()).join("|").slice(0, 300);
  function rememberCsvMap(header, map) { State.intel.csvMaps[csvFingerprint(header)] = map; }
  function knownCsvMap(header) {
    const m = State.intel.csvMaps[csvFingerprint(header)];
    if (!m) return null;
    const max = header.length;
    const ok = i => i === -1 || (i >= 0 && i < max);
    return (ok(m.iDate) && ok(m.iLabel) && ok(m.iAmt) && ok(m.iDebit) && ok(m.iCredit) && m.iDate >= 0) ? m : null;
  }

  /* ---------- connecteur IA (clé stockée localement, jamais synchronisée) ---------- */
  const aiReady = () => !!(State.ai && State.ai.provider && State.ai.key);

  async function callClaude(prompt) {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "content-type": "application/json",
        "x-api-key": State.ai.key,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5",
        max_tokens: 2048,
        messages: [{ role: "user", content: prompt }],
      }),
    });
    if (!res.ok) throw new Error("Claude " + res.status);
    const data = await res.json();
    return (data.content.find(c => c.type === "text") || {}).text || "";
  }

  async function callGemini(prompt) {
    const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent", {
      method: "POST",
      headers: { "content-type": "application/json", "x-goog-api-key": State.ai.key },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0 } }),
    });
    if (!res.ok) throw new Error("Gemini " + res.status);
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  }

  const callAI = prompt => State.ai.provider === "gemini" ? callGemini(prompt) : callClaude(prompt);

  async function aiTest() {
    const txt = await callAI("Réponds uniquement le mot : OK");
    if (!/ok/i.test(txt)) throw new Error("réponse inattendue");
    return true;
  }

  /* Catégorise en lot des libellés inconnus. entries = [{label, kind}] → Map label→categoryId */
  async function aiCategorize(b, entries) {
    const catNames = kind => b.categories.filter(c => c.kind === kind && c.parentId).map(c => c.name);
    const list = entries.map((e, i) => `${i + 1}. [${e.kind === "income" ? "revenu" : "dépense"}] ${e.label}`).join("\n");
    const prompt = `Tu catégorises des libellés d'opérations bancaires françaises.
Catégories de dépenses autorisées : ${catNames("expense").join(" ; ")}.
Catégories de revenus autorisées : ${catNames("income").join(" ; ")}.
Libellés :
${list}
Réponds UNIQUEMENT un tableau JSON, sans autre texte : [{"i":1,"cat":"<nom exact de la liste, ou null si incertain>"}, ...]`;
    const txt = await callAI(prompt);
    const m = txt.match(/\[[\s\S]*\]/);
    if (!m) throw new Error("réponse illisible");
    const arr = JSON.parse(m[0]);
    const out = new Map();
    for (const r of arr) {
      const e = entries[(+r.i) - 1];
      if (!e || !r.cat) continue;
      const c = findCatByName(b, r.cat, e.kind);
      if (c) out.set(e.label, c.id);
    }
    return out;
  }

  return {
    merchantKey, isCashWithdrawal, suggest, learn, bumpCat, topCats,
    recordSplit, splitFor, detectRecurring, dismiss,
    rememberCsvMap, knownCsvMap,
    aiReady, aiTest, aiCategorize,
  };
})();


/* ===== 09-insights.js ===== */
"use strict";
/* ============ moteur d'analyse : insights factuels, prédictifs & contextuels ============
 * Produit des constats chiffrés, jamais d'encouragement. Chaque insight est rangé par
 * priorité et peut porter une action concrète. Alimente le tableau de bord et le suivi.
 */

const Insights = (() => {

  const DAY = 86400000;
  const shiftDay = (s, n) => new Date(toDate(s).getTime() + n * DAY).toISOString().slice(0, 10);
  const med = arr => {
    if (!arr || !arr.length) return 0;
    const s = [...arr].map(Number).sort((a, z) => a - z);
    return s.length % 2 ? s[(s.length - 1) / 2] : (s[s.length / 2 - 1] + s[s.length / 2]) / 2;
  };
  const txOf = b => State.transactions.filter(t => t.budgetId === b.id);

  /* priorité de tri : plus c'est haut, plus c'est urgent/actionnable */
  const RANK = { danger: 0, warn: 1, opp: 2, info: 3, good: 4 };

  /* ---------- 1. rythme de dépenses & prévision de fin de mois ---------- */
  function pace(b, ctx, out) {
    const { ymNow, dayN, dim, real, planned, reste } = ctx;
    if (planned.expense <= 0 || real.expense <= 0 || dayN < 4) return;
    // deux estimations : (réel + prévu non débité) et la simple extrapolation linéaire
    const reserveEst = real.expense + reste.total;
    const linearEst = dayN >= 7 ? real.expense / dayN * dim : 0;
    const forecast = Math.max(reserveEst, linearEst);
    const diff = forecast - planned.expense;
    const mois = MOIS[+ymNow.slice(5, 7) - 1];
    if (diff > Math.max(20, planned.expense * 0.06)) {
      out.push({
        id: "pace-over-" + ymNow, tone: "warn", icon: "trend",
        text: `À ce rythme, environ ${fmtMoney(forecast, b.currency, { dec: 0 })} de dépenses d'ici la fin ${mois} — soit ${fmtMoney(diff, b.currency, { dec: 0 })} de plus que les ${fmtMoney(planned.expense, b.currency, { dec: 0 })} prévus.`,
      });
    } else if (forecast < planned.expense * 0.9 && dayN >= 12) {
      out.push({
        id: "pace-under-" + ymNow, tone: "good", icon: "check",
        text: `Dépenses sous contrôle : ~${fmtMoney(forecast, b.currency, { dec: 0 })} attendus d'ici fin ${mois}, soit ${fmtMoney(planned.expense - forecast, b.currency, { dec: 0 })} sous le budget prévu.`,
      });
    }
  }

  /* ---------- 2. point bas de trésorerie (jour près) sur ~45 jours ---------- */
  function cashflowLow(b, ctx, out) {
    const { ymNow, balNow, planned } = ctx;
    const today = todayStr();
    const flowByDate = {};
    for (const ym of [ymNow, addMonths(ymNow, 1), addMonths(ymNow, 2)]) {
      const f = dayFlows(b, ym);
      for (const [d, list] of Object.entries(f)) {
        let net = 0;
        list.forEach(x => { net += x.item.kind === "income" ? x.amount : -x.amount; });
        flowByDate[d] = (flowByDate[d] || 0) + net;
      }
    }
    let run = balNow, minV = balNow, minD = today;
    for (let i = 1; i <= 45; i++) {
      const d = shiftDay(today, i);
      run += flowByDate[d] || 0;
      if (run < minV) { minV = run; minD = d; }
    }
    if (minV >= balNow - 0.5) return;                  // jamais sous le solde actuel : rien à signaler
    const oneWeek = planned.expense / 30 * 7;
    if (minV < 0) {
      out.push({
        id: "cash-neg-" + ymNow, tone: "danger", icon: "alert",
        text: `Trésorerie : point bas le ${fmtDate(minD)} à environ ${fmtMoney(minV, b.currency, { dec: 0 })}. Une rentrée ou un report d'échéance sera nécessaire avant cette date.`,
      });
    } else if (minV < oneWeek && oneWeek > 0) {
      out.push({
        id: "cash-tight-" + ymNow, tone: "warn", icon: "wallet",
        text: `Trésorerie tendue autour du ${fmtDate(minD)} : il ne resterait qu'environ ${fmtMoney(minV, b.currency, { dec: 0 })} sur le compte à ce moment-là.`,
      });
    }
  }

  /* ---------- 3. anomalie de montant sur un marchand connu (40 derniers jours) ---------- */
  function anomalies(b, ctx, out) {
    const since = shiftDay(todayStr(), -40);
    const seen = {};
    const hits = [];
    for (const t of txOf(b)) {
      if (t.kind !== "expense" || t.date < since || !t.label || t.splits) continue;
      const k = Intel.merchantKey(t.label);
      if (!k || k === "RETRAIT" || seen[k]) continue;
      const rule = State.intel.rules[b.id + "|" + k];
      if (!rule || !rule.amounts || rule.amounts.length < 4) continue;
      const m = med(rule.amounts);
      if (m < 8) continue;
      const amt = +t.amount;
      if (amt > m * 2.2 && amt - m > 25) {
        seen[k] = 1;
        hits.push({ t, m, amt, gap: amt - m, name: titleCase(k) });
      }
    }
    hits.sort((a, z) => z.gap - a.gap);
    hits.slice(0, 2).forEach(h => {
      out.push({
        id: "anom-" + h.t.id, tone: "warn", icon: "alert",
        text: `« ${h.name} » : ${fmtMoney(h.amt, b.currency, { dec: 0 })} le ${fmtDate(h.t.date)}, inhabituel (≈ ${fmtMoney(h.m, b.currency, { dec: 0 })} d'ordinaire).`,
        action: { label: "Voir", run: () => { go("tracking"); setTimeout(() => openTxEditor(b, h.t), 60); } },
      });
    });
  }

  /* ---------- 4. catégorie en forte variation vs moyenne des 3 mois pleins ---------- */
  function categoryMovers(b, ctx, out) {
    const { ymNow, dayN, dim, real } = ctx;
    if (dayN < 10) return;                             // avant le 10, la proration ×dim est trop bruitée
    const past = [1, 2, 3].map(n => realMonthByCat(b, addMonths(ymNow, -n)).byCat);
    const movers = [];
    for (const [catId, spent] of Object.entries(real.byCat)) {
      if (catId === "_" || catId === "_debt" || spent < 40) continue;
      const hist = past.map(p => p[catId] || 0);
      if (!hist.some(v => v > 0)) continue;
      const avg = hist.reduce((s, v) => s + v, 0) / 3;
      if (avg < 15) continue;
      const proj = spent / dayN * dim;                 // extrapolation du mois en cours
      if (proj > avg * 1.3 && proj - avg > 30) {
        const c = catById(b, catId);
        movers.push({ catId, c, avg, proj, pct: (proj - avg) / avg });
      }
    }
    movers.sort((a, z) => (z.proj - z.avg) - (a.proj - a.avg));
    const top = movers[0];
    if (top) {
      out.push({
        id: "mover-" + top.catId + "-" + ymNow, tone: "info", icon: "trend",
        text: `${top.c ? top.c.emoji + " " + top.c.name : "Catégorie"} : ~${fmtMoney(top.proj, b.currency, { dec: 0 })} ce mois-ci, soit +${Math.round(top.pct * 100)} % par rapport à votre moyenne des 3 mois (${fmtMoney(top.avg, b.currency, { dec: 0 })}).`,
      });
    }
  }

  /* ---------- 5. capacité d'épargne dégagée non affectée ---------- */
  function savingsCapacity(b, ctx, out) {
    const { ymNow, planned } = ctx;
    const net = planned.income - planned.expense;
    if (net < 60) return;
    const unalloc = net - (planned.saving || 0);
    if (unalloc < 50 || unalloc < planned.income * 0.05) return;
    out.push({
      id: "save-cap-" + ymNow, tone: "opp", icon: "pig",
      text: `Vous dégagez environ ${fmtMoney(net, b.currency, { dec: 0 })} par mois, dont ${fmtMoney(unalloc, b.currency, { dec: 0 })} non affectés à de l'épargne. Un virement automatique permettrait de les mettre de côté sans y penser.`,
      action: { label: "Programmer", run: () => go("goals") },
    });
  }

  /* ---------- 6. poste planifié jamais constaté dans le réel (2 mois) ---------- */
  function dormantItems(b, ctx, out) {
    const { ymNow } = ctx;
    const recent = txOf(b).filter(t => t.date >= shiftDay(todayStr(), -62));
    if (recent.length < 8) return;                     // pas assez de suivi réel pour conclure
    const usedCats = new Set();
    recent.forEach(t => {
      const parts = (t.splits && t.splits.length) ? t.splits : [{ categoryId: t.categoryId }];
      parts.forEach(p => { const top = catTop(b, p.categoryId); if (top) usedCats.add(top.id); });
    });
    for (const it of b.items) {
      // uniquement les postes censés revenir au moins tous les 2 mois (sinon faux positif
      // sur l'annuel/trimestriel qui n'apparaît légitimement pas dans une fenêtre de 62 jours)
      if (it.kind !== "expense" || it.endDate || !(FREQ_MONTHS[it.freq] <= 2) || !(+it.amount > 0)) continue;
      if (monthIndex(ymOf(it.startDate)) > monthIndex(ymOf(todayStr())) - 2) continue;
      const top = catTop(b, it.categoryId);
      if (top && !usedCats.has(top.id)) {
        out.push({
          id: "dormant-" + it.id + "-" + ymNow, tone: "info", icon: "info",
          text: `Poste « ${it.name} » (${fmtMoney(+it.amount, b.currency, { dec: 0 })}/mois) : aucune dépense constatée dans « ${top.name} » depuis 2 mois. Toujours d'actualité ?`,
          action: { label: "Vérifier", run: () => go("budget") },
        });
        break;                                          // un seul à la fois, pour ne pas noyer
      }
    }
  }

  /* ---------- 7. meilleure suggestion de récurrence (remontée depuis le suivi) ---------- */
  function recurringTop(b, ctx, out) {
    let list = [];
    try { list = Intel.detectRecurring(b); } catch (e) { return; }
    const sg = list.find(s => s.type === "new") || list[0];
    if (!sg) return;
    out.push({
      id: "rec-" + sg.id, tone: "opp", icon: "spark", text: sg.text,
      action: {
        label: sg.type === "new" ? "Créer le poste" : "Appliquer",
        run: () => { const msg = sg.apply(); Intel.dismiss(sg.id); persist(); renderApp(); toast("✅ " + msg); },
      },
    });
  }

  function titleCase(s) { return String(s).toLowerCase().replace(/(^|\s)\S/g, c => c.toUpperCase()); }

  /* ---------- assemblage ---------- */
  function compute(b) {
    if (!b) return [];
    const ymNow = ymOf(todayStr());
    const today = todayStr();
    const real = realMonthByCat(b, ymNow);
    const planned = plannedMonth(b, ymNow);
    const reste = remainingPlanned(b, ymNow);
    const balNow = balanceAtMonthStart(b, ymNow) + real.income - real.expense;
    const ctx = {
      ymNow, today, dayN: +today.slice(8), dim: daysInMonth(ymNow),
      real, planned, reste, balNow,
    };
    const out = [];
    cashflowLow(b, ctx, out);
    pace(b, ctx, out);
    anomalies(b, ctx, out);
    categoryMovers(b, ctx, out);
    recurringTop(b, ctx, out);
    savingsCapacity(b, ctx, out);
    dormantItems(b, ctx, out);

    const skip = State.intel.dismissed || {};
    return out
      .filter(i => !skip[i.id])
      .sort((a, z) => (RANK[a.tone] - RANK[z.tone]))
      .slice(0, 4);
  }

  /* reste-à-vivre par jour : disponible réparti sur les jours restants du mois */
  function safeToSpend(b) {
    const ymNow = ymOf(todayStr());
    const real = realMonthByCat(b, ymNow);
    const balNow = balanceAtMonthStart(b, ymNow) + real.income - real.expense;
    const reste = remainingPlanned(b, ymNow);
    const dispo = balNow - reste.total;
    const daysLeft = Math.max(1, daysInMonth(ymNow) - +todayStr().slice(8) + 1);
    return { dispo, perDay: dispo / daysLeft, daysLeft };
  }

  return { compute, safeToSpend, shiftDay };
})();

"use strict";
/* ============ onboarding : premier lancement ============ */

function showOnboarding() {
  const data = { firstName: "", situation: "salarie", currency: "EUR", balance: "", cycleDay: 1 };
  let step = 0;
  const root = el("div", { class: "onb" });
  document.body.append(root);

  const steps = [stepWelcome, stepSituation, stepParams, stepDone];

  function render() {
    root.innerHTML = "";
    const card = el("div", { class: "onb-card" });
    card.append(
      el("div", { class: "onb-logo", html: I.logo + "<span>Horizon Budget</span>" }),
      el("div", { class: "onb-steps" }, steps.map((_, i) => el("i", { class: i <= step ? "on" : "" })))
    );
    steps[step](card);
    root.append(card);
  }

  function navBtns(card, canNext, nextLabel) {
    card.append(el("div", { class: "flex mt28" },
      step > 0 ? el("button", { class: "btn", onclick: () => { step--; render(); } }, "← Retour") : el("span"),
      el("span", { class: "spacer" }),
      el("button", {
        class: "btn btn-p", style: "padding:10px 22px",
        onclick: () => {
          if (canNext && !canNext()) return;
          if (step < steps.length - 1) { step++; render(); } else finish();
        }
      }, nextLabel || "Continuer →")
    ));
  }

  function stepWelcome(card) {
    card.append(
      el("h2", {}, "Bienvenue 👋"),
      el("p", { class: "onb-sub" }, "Horizon Budget vous aide à planifier vos finances, projeter votre avenir et suivre vos dépenses — quelle que soit votre situation. Toutes vos données restent sur cet appareil."),
      fField("Votre prénom (facultatif)", el("input", {
        class: "input", placeholder: "ex. Tom", value: data.firstName,
        oninput: e => data.firstName = e.target.value.trim()
      }))
    );
    navBtns(card);
  }

  function stepSituation(card) {
    card.append(
      el("h2", {}, "Quelle est votre situation ?"),
      el("p", { class: "onb-sub" }, "On préremplit votre budget avec des postes typiques — tout reste modifiable, et vous pourrez prévoir les changements futurs (fin d'études, nouvel emploi…)."),
      el("div", { class: "choice-grid" }, SITUATIONS.map(s => el("button", {
        class: "choice" + (data.situation === s.id ? " on" : ""),
        onclick: e => { data.situation = s.id; render(); }
      },
        el("span", { class: "ch-emoji" }, s.emoji),
        el("span", {}, el("div", { class: "ch-t" }, s.t), el("div", { class: "ch-d" }, s.d))
      )))
    );
    navBtns(card);
  }

  function stepParams(card) {
    const balInp = moneyInput({ value: data.balance, placeholder: "ex. 1 250", oninput: e => data.balance = e.target.value });
    card.append(
      el("h2", {}, "Derniers réglages"),
      el("p", { class: "onb-sub" }, "Trois informations pour démarrer les projections."),
      el("div", { class: "form-grid" },
        fField("Devise", selectInput(CURRENCIES.map(c => ({ value: c[0], label: `${c[1]} — ${c[2]}` })), data.currency, { onchange: e => data.currency = e.target.value })),
        fField("Solde actuel de votre compte", balInp),
        fField("Début de votre mois budgétaire", selectInput(
          [{ value: 1, label: "Le 1er du mois (classique)" }].concat([5, 10, 15, 20, 25, 27, 28].map(d => ({ value: d, label: `Le ${d} (jour de paie)` }))),
          data.cycleDay, { onchange: e => data.cycleDay = +e.target.value })),
        fField("Inflation estimée (pour les projections)", (() => {
          const w = moneyInput({ value: State.settings.inflation, cur: "%/an", oninput: e => State.settings.inflation = parseAmount(e.target.value) });
          return w;
        })())
      )
    );
    navBtns(card);
  }

  function stepDone(card) {
    const sit = SITUATIONS.find(s => s.id === data.situation);
    card.append(
      el("h2", {}, "Tout est prêt " + (data.firstName ? data.firstName + " " : "") + "✨"),
      el("p", { class: "onb-sub" }, `Votre budget « ${sit.t} » va être créé avec des postes typiques et des montants indicatifs. Première étape : ajustez chaque montant à votre réalité.`),
      el("div", { class: "card card-pad", style: "font-size:13.5px; line-height:1.8" },
        el("div", {}, "✅ Modifiez ou supprimez les postes proposés"),
        el("div", {}, "📅 Planifiez les changements futurs (nouvel emploi, déménagement…)"),
        el("div", {}, "📈 Projetez votre solde sur des mois ou des années"),
        el("div", {}, "🎯 Fixez des objectifs d'épargne et suivez vos dépenses réelles"),
        el("div", {}, "🔒 Vos données restent sur votre appareil — pensez à exporter une sauvegarde")
      )
    );
    navBtns(card, null, "Créer mon budget 🚀");
  }

  function finish() {
    State.settings.firstName = data.firstName;
    const sit = SITUATIONS.find(s => s.id === data.situation);
    const b = newBudget("Budget " + (data.firstName || "principal"), {
      situation: data.situation,
      currency: data.currency,
      cycleDay: data.cycleDay,
      initialBalance: parseAmount(data.balance),
      emoji: sit.emoji === "📄" ? "💼" : sit.emoji,
    });
    applyTemplate(b, data.situation);
    State.budgets.push(b);
    State.activeBudgetId = b.id;
    State.onboarded = true;
    persist();
    root.remove();
    renderApp();
    if (TEMPLATE_ITEMS[data.situation] && TEMPLATE_ITEMS[data.situation].length) {
      setTimeout(() => toast("💡 Montants indicatifs préremplis : ajustez-les dans l'onglet Budget"), 600);
    }
  }

  render();
}

"use strict";
/* ============ vue : accueil (une info maîtresse, puis des cartes calmes) ============ */

function viewDashboard(root) {
  const b = curBudget();
  const ymNow = ymOf(todayStr());
  const proj = project(b, { months: Math.max(13, State.settings.horizonMonths) });
  const m0 = proj[0];
  const real = realMonthByCat(b, ymNow);
  const reste = remainingPlanned(b, ymNow);
  const sts = Insights.safeToSpend(b);
  const cur = b.currency;
  const endOfMonth = m0.balance;
  const monthName = MOIS[+ymNow.slice(5, 7) - 1];

  // ---------- HÉROS : reste à vivre ce mois-ci ----------
  const heroVal = sts.dispo;
  const heroCls = heroVal < 0 ? "neg" : "pos";
  const hero = el("div", { class: "hero" },
    el("div", { class: "h-label" }, "Reste à vivre ce mois-ci"),
    el("div", { class: "h-value " + heroCls }, ...moneyHero(heroVal, cur)),
    el("div", { class: "h-sub" }, sts.daysLeft > 0
      ? `${fmtMoney(sts.perDay, cur)} par jour sur ${sts.daysLeft} jour${sts.daysLeft > 1 ? "s" : ""} restant${sts.daysLeft > 1 ? "s" : ""}`
      : "dernier jour du mois"),
    el("div", { class: "h-spark" }, sparkline(proj.slice(0, 13).map(r => r.balance), heroVal < 0)),
    el("div", { class: "h-foot" }, `Solde prévu fin ${monthName} : `,
      el("b", { class: endOfMonth < 0 ? "neg" : "pos" }, fmtMoney(endOfMonth, cur, { sign: true })),
      el("span", { class: "spacer", style: "flex:1" }),
      el("button", { class: "btn btn-sm btn-ghost", onclick: () => go("projection") }, "Projection →"))
  );

  // ---------- une seule analyse à la fois (la plus prioritaire) ----------
  const alerts = computeAlerts(b);
  const insights = (typeof Insights !== "undefined") ? Insights.compute(b) : [];
  const danger = alerts.find(a => a.type === "danger");
  let analysisCard = null;
  if (danger) analysisCard = alertNode(danger);
  else if (insights.length) analysisCard = insightNode(insights[0]);
  else if (alerts.length) analysisCard = alertNode(alerts[0]);

  // ---------- dépensé ce mois ----------
  const spent = real.expense, planned = m0.expense;
  const pct = planned > 0 ? spent / planned : 0;
  const over = planned > 0 && spent > planned;
  const depCard = el("div", { class: "home-card" },
    el("div", { class: "hc-head" }, el("h3", {}, "Dépensé ce mois"), el("span", { class: "spacer" }),
      el("button", { class: "btn btn-sm btn-ghost", onclick: () => go("tracking") }, "Détail")),
    el("div", { class: "hc-pad home-prog" },
      el("div", { class: "hp-top" },
        el("b", { class: "mono", style: "font-size:16px" }, fmtMoney(spent, cur)),
        el("span", { class: "v" }, planned > 0 ? `sur ${fmtMoney(planned, cur)} prévus · ${Math.round(pct * 100)} %` : "aucun budget prévu")),
      el("div", { class: "pbar" + (over ? " over" : "") }, el("i", { style: `width:${Math.min(100, pct * 100)}%` })))
  );

  // ---------- à venir (14 jours) ----------
  const upcoming = [];
  for (const ym of [ymNow, addMonths(ymNow, 1)]) {
    const flows = dayFlows(b, ym);
    for (const [date, list] of Object.entries(flows)) {
      const diff = (toDate(date) - toDate(todayStr())) / 86400000;
      if (diff < 0 || diff > 14) continue;
      list.forEach(f => upcoming.push({ date, ...f }));
    }
  }
  upcoming.sort((a, z) => a.date.localeCompare(z.date));
  const upCard = el("div", { class: "home-card" },
    el("div", { class: "hc-head" }, el("h3", {}, "À venir"), el("span", { class: "spacer" }),
      el("button", { class: "btn btn-sm btn-ghost", onclick: () => go("calendar") }, "Calendrier")),
    upcoming.length
      ? el("div", { class: "row-list", style: "padding-bottom:6px" }, upcoming.slice(0, 4).map(u => upRow(b, u, cur)))
      : emptyState("📭", "Rien à l'horizon", "Aucune échéance sur les 14 prochains jours.")
  );

  // ---------- objectifs (compact, si présents) ----------
  let goalCard = null;
  if (b.goals && b.goals.length) {
    goalCard = el("div", { class: "home-card" },
      el("div", { class: "hc-head" }, el("h3", {}, "Objectifs"), el("span", { class: "spacer" }),
        el("button", { class: "btn btn-sm btn-ghost", onclick: () => go("goals") }, "Gérer")),
      el("div", { class: "hc-pad", style: "display:flex; flex-direction:column; gap:14px" },
        b.goals.slice(0, 3).map(g => {
          const current = +g.current || 0;
          const p = g.target ? clamp(current / g.target, 0, 1) : 0;
          const done = g.target > 0 && current >= g.target;
          return el("div", {},
            el("div", { class: "flex small mb8" }, el("span", {}, `${g.emoji || "🎯"} ${g.name}`), el("span", { class: "spacer" }),
              el("b", { class: "mono" }, fmtMoney(current, cur, { dec: 0 }) + " / " + fmtMoney(g.target, cur, { dec: 0 }))),
            el("div", { class: "pbar" }, el("i", { style: `width:${p * 100}%; background:${g.color || "var(--accent)"}` })),
            el("div", { class: "xs muted", style: "margin-top:5px" },
              done ? "Objectif atteint" : `Reste ${fmtMoney(Math.max(0, (g.target || 0) - current), cur, { dec: 0 })}`));
        }))
    );
  }

  const stack = el("div", { class: "home-stack" }, hero, analysisCard, depCard, upCard, goalCard);
  root.append(el("div", { class: "content-inner" }, stack));

  // ---- helpers ----
  function moneyHero(v, cur) {
    const s = fmtMoney(v, cur);
    const mt = s.match(/^([\s\d., \-+]+)(.*)$/);
    if (!mt || !mt[2]) return [s];
    return [mt[1].trim(), el("span", { class: "cur" }, " " + mt[2].trim())];
  }
  function sparkline(vals, neg) {
    const n = vals.length;
    if (n < 2) return el("div");
    const W = 320, H = 46, pad = 4;
    const min = Math.min(...vals), max = Math.max(...vals), span = (max - min) || 1;
    const x = i => (i / (n - 1) * W).toFixed(1);
    const y = v => (H - pad - (v - min) / span * (H - pad * 2)).toFixed(1);
    const pts = vals.map((v, i) => `${x(i)},${y(v)}`).join(" ");
    const col = neg ? "var(--danger)" : "var(--accent)";
    const area = `0,${H} ${pts} ${W},${H}`;
    const svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none" aria-hidden="true">`
      + `<polygon points="${area}" fill="${col}" opacity="0.10"/>`
      + `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>`
      + `<circle cx="${x(n - 1)}" cy="${y(vals[n - 1])}" r="3.2" fill="${col}"/></svg>`;
    return el("div", { class: "spark", html: svg });
  }
  function upRow(b, u, cur) {
    const income = u.item.kind === "income";
    return el("div", { class: "item-row", style: "cursor:default" },
      el("div", { class: "i-emoji", style: "font-size:12px; font-weight:700; flex-direction:column; line-height:1.1; display:flex; align-items:center; justify-content:center" },
        el("span", {}, String(+u.date.slice(8))), el("span", { class: "xs muted" }, MOIS[+u.date.slice(5, 7) - 1].slice(0, 4) + ".")),
      el("div", { class: "i-main" },
        el("div", { class: "i-name" }, u.item.name || "(sans nom)"),
        el("div", { class: "i-sub" }, u.item._debt ? "mensualité de crédit" : catLabel(b, u.item.categoryId))),
      el("div", { class: "i-amt " + (income ? "pos" : "") }, fmtMoney(income ? u.amount : -u.amount, cur, { sign: true })));
  }
  function alertNode(a) {
    return el("div", { class: "home-card" }, el("div", { class: "hc-pad" },
      el("div", { class: "alert a-" + (a.type === "danger" ? "danger" : a.type === "warn" ? "warn" : "info") },
        el("span", { class: "a-ico", html: ico(a.icon, 17) }), el("span", {}, a.text))));
  }
  function insightNode(it) {
    const toneCls = { danger: "danger", warn: "warn", good: "ok", info: "info", opp: "info" };
    return el("div", { class: "home-card" }, el("div", { class: "hc-pad insight" },
      el("div", { class: "alert a-" + (toneCls[it.tone] || "info"), style: "flex:1; min-width:0" },
        el("span", { class: "a-ico", html: ico(it.icon, 17) }), el("span", {}, it.text)),
      el("div", { class: "insight-act" },
        it.action ? el("button", { class: "btn btn-sm btn-p", onclick: () => { const r = it.action.run(); if (typeof r === "string") toast("✅ " + r); } }, it.action.label) : null,
        el("button", { class: "btn btn-sm btn-ghost btn-ico", title: "Ignorer", html: ico("x", 15), onclick: () => { Intel.dismiss(it.id); persist(); renderApp(); } }))));
  }
}

"use strict";
/* ============ vue : édition du budget (postes) ============ */

let _budgetTab = "expense";

function viewBudget(root) {
  const b = curBudget();
  const cur = b.currency;
  const ymNow = ymOf(todayStr());
  const m0 = plannedMonth(b, ymNow);

  const head = el("div", { class: "card card-pad flex", style: "flex-wrap:wrap; gap:14px" },
    sum("Revenus du mois", m0.income, "pos"),
    sum("Dépenses du mois", m0.expense, ""),
    sum("Reste prévu", m0.income - m0.expense, m0.income - m0.expense >= 0 ? "pos" : "neg"),
    el("span", { class: "spacer" }),
    el("button", { class: "btn btn-sm", onclick: () => openCategoryManager(b) }, "🗂️ Catégories"),
  );

  const seg = segControl([
    { value: "expense", label: "Dépenses" },
    { value: "income", label: "Revenus" },
  ], _budgetTab, v => { _budgetTab = v; rerender(); });

  const listCard = el("div", { class: "card", style: "overflow:hidden" });
  buildList();

  const controls = el("div", { class: "flex", style: "flex-wrap:wrap; gap:8px" }, seg, el("span", { class: "spacer" }),
    el("button", { class: "btn btn-p", html: ico("plus", 16) + "<span>Ajouter un poste</span>", onclick: () => openItemEditor(b, newItem(_budgetTab), true) }));
  const inner = el("div", { class: "content-inner grid", style: "gap:16px" });
  Custom.renderInto(inner, "page.budget", [
    { id: "summary", node: head }, { id: "controls", node: controls }, { id: "list", node: listCard },
  ], { axis: "y" });
  root.append(inner);

  function sum(label, v, tone) {
    return el("div", {}, el("div", { class: "small muted", style: "font-weight:600" }, label),
      el("div", { class: "mono " + tone, style: "font-size:21px; font-weight:750" }, fmtMoney(v, cur)));
  }

  function buildList() {
    listCard.innerHTML = "";
    const kind = _budgetTab;
    const items = b.items.filter(i => i.kind === kind);
    const debts = kind === "expense" ? b.debts : [];
    if (!items.length && !debts.length) {
      listCard.append(emptyState(kind === "expense" ? "🧾" : "💶",
        kind === "expense" ? "Aucune dépense planifiée" : "Aucun revenu planifié",
        kind === "expense"
          ? "Loyer, courses, abonnements… ajoutez vos charges récurrentes ou ponctuelles."
          : "Salaire, bourse, aides, revenus variables… ajoutez tout ce qui rentre.",
        el("button", { class: "btn btn-p btn-sm", onclick: () => openItemEditor(b, newItem(kind), true) }, "Ajouter")));
      return;
    }
    // groupement par catégorie racine
    const groups = {};
    for (const it of items) {
      const top = catTop(b, it.categoryId);
      const key = top ? top.id : "_none";
      (groups[key] = groups[key] || { cat: top, items: [] }).items.push(it);
    }
    const sorted = Object.values(groups).map(g => {
      g.total = g.items.reduce((s, i) => s + monthlyAmount(i, ymNow, State.settings.scenarioMode, State.settings.inflation), 0);
      g.totalEq = g.items.reduce((s, i) => s + monthlyEquivalent(i), 0);
      return g;
    }).sort((a, z) => z.total - a.total);

    for (const g of sorted) {
      listCard.append(el("div", { class: "group-head" },
        el("span", {}, g.cat ? `${g.cat.emoji} ${g.cat.name}` : "📦 Sans catégorie"),
        el("span", { class: "g-total mono" }, fmtMoney(g.total, cur) + " /mois")
      ));
      g.items.sort((a, z) => monthlyEquivalent(z) - monthlyEquivalent(a) || z.amount - a.amount);
      for (const it of g.items) listCard.append(itemRow(b, it));
    }
    if (debts.length) {
      listCard.append(el("div", { class: "group-head" }, el("span", {}, "💳 Mensualités de crédits"),
        el("span", { class: "g-total mono" }, fmtMoney(debts.reduce((s, d) => s + debtMonthly(d, ymNow), 0), cur) + " /mois")));
      for (const d of debts) {
        const pay = debtMonthly(d, ymNow);
        const end = debtPayoffYm(d);
        listCard.append(el("div", { class: "item-row", onclick: () => go("debts") },
          el("div", { class: "i-emoji" }, "💳"),
          el("div", { class: "i-main" }, el("div", { class: "i-name" }, d.name),
            el("div", { class: "i-sub" }, end ? `crédit · se termine en ${fmtYm(end)}` : "crédit en cours")),
          el("div", { class: "i-amt" }, pay ? fmtMoney(-pay, cur) : "—", el("span", { class: "per" }, "/mois"))
        ));
      }
    }
  }

  function rerender() { buildList(); }
}

function itemRow(b, it) {
  const cur = b.currency;
  const ymNow = ymOf(todayStr());
  const now = todayStr();
  const badges = [];
  if (it.variable) badges.push(el("span", { class: "badge b-info" }, "variable"));
  if (it.steps && it.steps.length) badges.push(el("span", { class: "badge b-mut" }, "📈 paliers"));
  if (it.growth) badges.push(el("span", { class: "badge b-mut" }, it.growth === "inf" ? "suit l'inflation" : (it.growth > 0 ? "+" : "") + it.growth + " %/an"));
  if (it.startDate > now) badges.push(el("span", { class: "badge b-warn" }, "à venir"));
  if (it.endDate && it.endDate < now) badges.push(el("span", { class: "badge b-mut" }, "terminé"));
  if (it.savingTo) badges.push(el("span", { class: "badge b-pos" }, "→ épargne"));
  if (it.eventId) {
    const ev = b.events.find(e => e.id === it.eventId);
    if (ev) badges.push(el("span", { class: "badge b-mut" }, (ev.emoji || "📌") + " " + ev.name));
  }
  const cat = catById(b, it.categoryId);
  const eq = it.freq === "once" ? it.amount : monthlyEquivalent(it);
  // « en moyenne » seulement quand le montant affiché est une conversion ou une fourchette ;
  // un poste mensuel à montant fixe est exact, pas une moyenne.
  const exactMonthly = it.freq === "monthly" && !it.variable;
  const per = it.freq === "once" ? "une fois" : (exactMonthly ? "/mois" : "/mois en moyenne");
  return el("div", { class: "item-row", onclick: () => openItemEditor(b, it, false) },
    el("div", { class: "i-emoji" }, cat ? cat.emoji : (it.kind === "income" ? "💶" : "🧾")),
    el("div", { class: "i-main" },
      el("div", { class: "i-name" }, it.name || "(sans nom)", " ", ...badges),
      el("div", { class: "i-sub" }, freqLabel(it))),
    el("div", { class: "i-amt " + (it.kind === "income" ? "pos" : "") },
      fmtMoney(it.kind === "income" ? eq : -eq, cur, { sign: it.kind === "income" }),
      el("span", { class: "per" }, per))
  );
}

  hasEnd.addEventListener("change", () => { endInp.disabled = !hasEnd.checked; if (hasEnd.checked && !endInp.value) endInp.value = addMonths(ymOf(todayStr()), 12) + "-01"; });

  ], it.growth === "inf" ? "inf" : (it.growth ? "custom" : "0"));

      varRow,
      el("div", { class: "full" }, el("details", { class: "adv", open: !!(it.growth || steps.length) },

        el("div", { class: "form-grid mt8" },

        el("div", { class: "mt8" },

          stepsBox)
      )),
      !isIncome && savingTargets.length ? fField("Compter comme de l'épargne vers…", savingSel, { full: true }) : null,
      fField("Notes", notesInp, { full: true })

    foot: [

        class: "btn btn-danger", html: ico("trash", 15) + "<span>Supprimer</span>",

          const snapshot = JSON.parse(JSON.stringify(b.items));
          b.items = b.items.filter(x => x.id !== item.id);
          persist(); m.close(); renderApp();
          offerUndo(`Poste « ${item.name} » supprimé`, () => { b.items = snapshot; persist(); renderApp(); });
        }

    it.name = nameInp.value.trim() || (isIncome ? "Revenu" : "Dépense");

    it.categoryId = catSel.value || null;
    it.freq = freqSel.value;
    it.day = +dayInp.value || 1;
    it.startDate = startInp.value || todayStr();
    it.endDate = hasEnd.checked && endInp.value ? endInp.value : null;
    it.variable = varChk.checked;

      title: isNew ? (parent ? `Sous-catégorie de ${parent.name}` : "Nouvelle catégorie") : "Modifier",
      body: el("div", { class: "form-grid" },
        fField("Nom", nameI, { full: true }),
        fField("Emoji", emojiI),
        !c.parentId ? fField("Couleur", colorI) : null),
      foot: [el("span", { class: "spacer" }),
        el("button", { class: "btn", onclick: () => mm.close() }, "Annuler"),
        el("button", {
          class: "btn btn-p", onclick: () => {
            c.name = nameI.value.trim() || "Catégorie";
            c.emoji = emojiI.value.trim() || "🏷️";
            c.color = colorI.value;
            if (isNew) b.categories.push(c);
            persist(); mm.close(); render();
          }
        }, isNew ? "Ajouter" : "Enregistrer")]
    });
    nameI.focus();
  }

  function removeCat(cat) {
    const children = b.categories.filter(c => c.parentId === cat.id);
    const ids = [cat.id, ...children.map(c => c.id)];
    const used = b.items.filter(i => ids.includes(i.categoryId)).length
      + State.transactions.filter(t => t.budgetId === b.id && ids.includes(t.categoryId)).length;
    confirmDialog({
      title: `Supprimer « ${cat.name} » ?`,
      body: used
        ? `${used} poste(s) ou transaction(s) utilisent cette catégorie${children.length ? " ou ses sous-catégories" : ""} : ils passeront en « Sans catégorie ».`
        : (children.length ? `Ses ${children.length} sous-catégories seront aussi supprimées.` : "Cette catégorie est vide."),
      okLabel: "Supprimer", danger: true,
      onOk: () => {
        b.categories = b.categories.filter(c => !ids.includes(c.id));
        b.items.forEach(i => { if (ids.includes(i.categoryId)) i.categoryId = null; });
        State.transactions.forEach(t => { if (t.budgetId === b.id && ids.includes(t.categoryId)) t.categoryId = null; });
        persist(); render();
      }
    });
  }

  render();
}

const PROJ_MAX = 360;        // mois projetés (30 ans) — borne du zoom
const PROJ_MINSPAN = 3;      // largeur minimale de la fenêtre (mois)
const PROJ_MAIN_H = 300, PROJ_BRUSH_H = 52;

let _projTableAll = false;
let _projView = { i0: 0, i1: 60 };   // fenêtre courante (indices dans la projection)

const PHASE_COLORS = ["#3b82f6", "#8b5cf6", "#10b981", "#f59e0b", "#ec4899", "#06b6d4", "#f97316", "#64748b"];
const PROJ_MODES = [
  { value: "wealth", label: "Patrimoine" },
  { value: "balance", label: "Solde" },
  { value: "scenarios", label: "Scénarios" },
];
const RANGE_PRESETS = [
  { m: 6, l: "6 mois" }, { m: 12, l: "1 an" }, { m: 24, l: "2 ans" }, { m: 60, l: "5 ans" },
  { m: 120, l: "10 ans" }, { m: 240, l: "20 ans" }, { m: 359, l: "30 ans" },
];
const MARK_PRESETS = [

];

function horizonLabel(m) { return m < 12 ? m + " mois" : (m / 12 % 1 === 0 ? m / 12 : (m / 12).toFixed(1)) + " an" + (m >= 24 ? "s" : ""); }

/* ---------- découpe en chapitres de vie ---------- */
function lifeChapters(b, proj) {
  const byIdx = {};
  for (const ev of b.events) {
    if (!ev.date) continue;
    const ix = proj.findIndex(r => r.ym === ymOf(ev.date));
    if (ix > 0 && ix < proj.length) (byIdx[ix] = byIdx[ix] || []).push(ev);
  }
  const cuts = Object.keys(byIdx).map(Number).sort((a, z) => a - z);
  const phases = [];
  let prevIdx = 0, prevEv = null;
  const push = (s, e, ev) => phases.push({ startIdx: s, endIdx: e, ev, color: PHASE_COLORS[phases.length % PHASE_COLORS.length] });
  for (const ix of cuts) { push(prevIdx, ix, prevEv); prevIdx = ix; prevEv = byIdx[ix][0]; }
  push(prevIdx, proj.length - 1, prevEv);

  for (const p of phases) {
    const last = p === phases[phases.length - 1];
    const hi = last ? p.endIdx : p.endIdx - 1;
    let netSum = 0, cnt = 0;
    for (let i = p.startIdx; i <= hi; i++) { netSum += proj[i].net; cnt++; }
    p.months = Math.max(1, p.endIdx - p.startIdx);
    p.avgNet = cnt ? netSum / cnt : 0;
    p.nwEnd = proj[p.endIdx].netWorth;
    p.nwDelta = proj[p.endIdx].netWorth - proj[p.startIdx].netWorth;
    p.startYm = proj[p.startIdx].ym;
    p.endYm = proj[p.endIdx].ym;
    p.name = p.ev ? `${p.ev.emoji || "📌"} ${p.ev.name}` : "Situation actuelle";
  }
  return phases;
}

/* ---------- préparation des données du graphe ---------- */
function buildChartData(b, proj, mode, cur, phasesFull) {
  const data = {
    ym: proj.map(r => r.ym),
    markers: proj.flatMap((r, i) => r.events.map(e => ({ idx: i, label: e.name, emoji: e.emoji }))),
    phases: phasesFull.map(p => ({ startIdx: p.startIdx, endIdx: p.endIdx, color: p.color })),
    overview: proj.map(r => r.netWorth),
    cur, mode,
  };
  if (mode === "wealth") {
    data.up = [
      { name: "Solde courant", color: "#10b981", values: proj.map(r => Math.max(0, r.balance)) },
      { name: "Comptes épargne", color: "#0ea5e9", values: proj.map(r => r.savingsTotal) },
      { name: "Objectifs", color: "#8b5cf6", values: proj.map(r => r.goalsTotal) },
    ];
    data.down = [{ name: "Dettes", color: "#ef4444", values: proj.map(r => -r.debtBalance) }];
    if (proj.some(r => r.balance < 0))
      data.down.push({ name: "Découvert", color: "#f97316", values: proj.map(r => Math.min(0, r.balance)) });
    data.line = { name: "Patrimoine net", color: "var(--tx)", values: proj.map(r => r.netWorth) };
  } else if (mode === "balance") {
    data.series = [
      { name: "Solde courant", color: "#10b981", values: proj.map(r => r.balance), fill: true },
      { name: "Patrimoine net", color: "#8b5cf6", values: proj.map(r => r.netWorth), dash: true },
    ];
  } else {
    const expn = project(b, { months: PROJ_MAX, scenarioMode: "expected" });
    const opt = project(b, { months: PROJ_MAX, scenarioMode: "optimistic" });
    const pess = project(b, { months: PROJ_MAX, scenarioMode: "pessimistic" });
    data.line = { name: "Attendu", color: "#8b5cf6", values: expn.map(r => r.netWorth) };
    data.band = {
      lo: expn.map((r, i) => Math.min(r.netWorth, opt[i].netWorth, pess[i].netWorth)),
      hi: expn.map((r, i) => Math.max(r.netWorth, opt[i].netWorth, pess[i].netWorth)),
    };
    data.overview = expn.map(r => r.netWorth);
  }
  return data;
}

/* ---------- SVG du graphe principal (tranche [i0..i1], Y auto-échelle) ---------- */
function projMainSvg(W, H, win, data, mode, hidden, cur) {
  const i0 = win.i0, i1 = win.i1, n = i1 - i0 + 1;
  const svg = svgEl("svg", { viewBox: `0 0 ${W} ${H}`, width: W, height: H });
  const plot = { left: 56, top: 16, w: Math.max(10, W - 56 - 14), h: H - 16 - 30 };
  const X = k => plot.left + (n === 1 ? plot.w / 2 : k / (n - 1) * plot.w);

  const up = mode === "wealth" ? data.up.filter(s => !hidden.has(s.name)) : [];
  const down = mode === "wealth" ? data.down.filter(s => !hidden.has(s.name)) : [];
  const lineOn = mode !== "balance" && data.line && !hidden.has(data.line.name);

  const vals = [0];
  if (mode === "wealth") {
    for (let k = 0; k < n; k++) {
      let u = 0, d = 0;
      for (const s of up) u += Math.max(0, s.values[i0 + k] || 0);
      for (const s of down) d += Math.min(0, s.values[i0 + k] || 0);
      vals.push(u, d);
    }
    if (lineOn) for (let k = 0; k < n; k++) vals.push(data.line.values[i0 + k]);
  } else if (mode === "balance") {
    for (const s of data.series) for (let k = 0; k < n; k++) vals.push(s.values[i0 + k]);
  } else {
    for (let k = 0; k < n; k++) vals.push(data.band.lo[i0 + k], data.band.hi[i0 + k], data.line.values[i0 + k]);
  }
  let min = Math.min(...vals), max = Math.max(...vals);
  if (min === max) max = min + 1;
  const pad = (max - min) * 0.06; max += pad; if (min < 0) min -= pad;
  const ticks = niceTicks(min, max, 5);
  min = Math.min(min, ticks[0]); max = Math.max(max, ticks[ticks.length - 1]);
  const Y = v => plot.top + (1 - (v - min) / (max - min)) * plot.h;

  // bandes de chapitres (découpées à la fenêtre)
  for (const p of data.phases) {
    const a = p.startIdx - i0, b2 = p.endIdx - i0;
    if (b2 < 0 || a > n - 1) continue;
    const xa = X(Math.max(0, a)), xb = X(Math.min(n - 1, b2));
    svg.append(svgEl("rect", { x: xa, y: plot.top, width: Math.max(0, xb - xa), height: plot.h, fill: p.color, opacity: 0.05 }));
    if (a > 0 && a < n) svg.append(svgEl("line", { x1: X(a), x2: X(a), y1: plot.top, y2: plot.top + plot.h, stroke: p.color, "stroke-width": 1, "stroke-dasharray": "3 3", "stroke-opacity": 0.45 }));
  }
  for (const t of ticks) {
    svg.append(svgEl("line", { x1: plot.left, x2: plot.left + plot.w, y1: Y(t), y2: Y(t), stroke: t === 0 ? "var(--tx3)" : "var(--chart-grid)", "stroke-width": 1 }));
    const lb = svgEl("text", { x: plot.left - 7, y: Y(t) + 3.5, "text-anchor": "end", "font-size": 10.5, fill: "var(--tx3)" });
    lb.textContent = fmtAxis(t, cur); svg.append(lb);
  }
  const stepX = Math.max(1, Math.ceil(n / (W / 82)));
  for (const k of labelIdxs(n, stepX)) {
    const t = svgEl("text", { x: X(k), y: H - 9, "text-anchor": "middle", "font-size": 10.5, fill: "var(--tx3)" });
    t.textContent = fmtYmShort(data.ym[i0 + k]); svg.append(t);
  }

  const drawMk = () => {
    for (const m of data.markers) {
      const k = m.idx - i0; if (k < 0 || k > n - 1) continue;
      const x = X(k);
      svg.append(svgEl("line", { x1: x, x2: x, y1: plot.top, y2: plot.top + plot.h, stroke: "var(--violet)", "stroke-width": 1.2, "stroke-dasharray": "2 3", "stroke-opacity": 0.7, class: "j-fade" }));
      const t = svgEl("text", { x, y: plot.top + 9, "text-anchor": "middle", "font-size": 11, class: "j-fade" });
      t.textContent = m.emoji || "📌"; svg.append(t);
    }
  };

  const dots = [];
  if (mode === "wealth") {
    const ribbon = (series, sign) => {
      const cur2 = new Array(n).fill(0);
      for (const s of series) {
        const top = [], bot = [];
        for (let k = 0; k < n; k++) {
          const v = sign > 0 ? Math.max(0, s.values[i0 + k] || 0) : Math.min(0, s.values[i0 + k] || 0);
          bot[k] = cur2[k]; top[k] = cur2[k] + v; cur2[k] = top[k];
        }
        const d = "M" + top.map((v, k) => `${X(k)},${Y(v)}`).join(" L") + " L" + bot.map((v, k) => `${X(k)},${Y(v)}`).reverse().join(" L") + " Z";
        svg.append(svgEl("path", { d, fill: s.color, "fill-opacity": sign > 0 ? 0.82 : 0.6, class: "j-area" }));
      }
    };
    ribbon(up, 1); ribbon(down, -1); drawMk();
    if (lineOn) {
      const pts = []; for (let k = 0; k < n; k++) pts.push(`${X(k)},${Y(data.line.values[i0 + k])}`);
      svg.append(svgEl("path", { d: "M" + pts.join(" L"), fill: "none", stroke: data.line.color, "stroke-width": 2.4, "stroke-linejoin": "round", pathLength: 1, class: "j-line" }));
      dots.push({ color: data.line.color, arr: data.line.values });
    }
  } else if (mode === "balance") {
    drawMk();
    for (const s of data.series) {
      const pts = []; for (let k = 0; k < n; k++) pts.push(`${X(k)},${Y(s.values[i0 + k])}`);
      if (s.fill) svg.append(svgEl("path", { d: `M${X(0)},${Y(Math.max(min, 0))} L` + pts.join(" L") + ` L${X(n - 1)},${Y(Math.max(min, 0))} Z`, fill: s.color, "fill-opacity": 0.1, class: "j-area" }));
      const a = { d: "M" + pts.join(" L"), fill: "none", stroke: s.color, "stroke-width": 2.2, "stroke-linejoin": "round" };
      if (s.dash) { a["stroke-dasharray"] = "5 4"; a.class = "j-fade"; } else { a.pathLength = 1; a.class = "j-line"; }
      svg.append(svgEl("path", a));
      dots.push({ color: s.color, arr: s.values });
    }
  } else {
    const hiP = [], loP = [];
    for (let k = 0; k < n; k++) { hiP.push(`${X(k)},${Y(data.band.hi[i0 + k])}`); loP.push(`${X(k)},${Y(data.band.lo[i0 + k])}`); }
    svg.append(svgEl("path", { d: "M" + hiP.join(" L") + " L" + loP.reverse().join(" L") + " Z", fill: "var(--violet)", "fill-opacity": 0.14, class: "j-area" }));
    drawMk();
    const pts = []; for (let k = 0; k < n; k++) pts.push(`${X(k)},${Y(data.line.values[i0 + k])}`);
    svg.append(svgEl("path", { d: "M" + pts.join(" L"), fill: "none", stroke: data.line.color, "stroke-width": 2.4, pathLength: 1, class: "j-line" }));
    dots.push({ color: data.line.color, arr: data.line.values });
  }

  const guide = svgEl("line", { y1: plot.top, y2: plot.top + plot.h, stroke: "var(--tx3)", "stroke-width": 1, "stroke-dasharray": "3 3", opacity: 0 });
  svg.append(guide);
  const dotEls = dots.map(d => { const c = svgEl("circle", { r: 4, fill: d.color, stroke: "var(--panel)", "stroke-width": 1.5, opacity: 0, class: "chart-dot" }); svg.append(c); return c; });

  svg._geom = { plot, n, i0, X, Y, guide, dots, dotEls, tipHtml: k => projTip(k, win, data, mode, hidden, cur) };
  return svg;
}

function projTip(k, win, data, mode, hidden, cur) {
  const abs = win.i0 + k;
  const row = (c, name, v) => `<div class="t-row"><span style="color:${c}">●</span><span>${esc(name)}</span><b>${fmtMoney(Math.abs(v), cur)}</b></div>`;
  let html = `<div class="t-title">${esc(fmtYm(data.ym[abs]))}</div>`;
  if (mode === "wealth") {
    for (const s of data.up) if (!hidden.has(s.name) && (s.values[abs] || 0) > 0.5) html += row(s.color, s.name, s.values[abs]);
    for (const s of data.down) if (!hidden.has(s.name) && (s.values[abs] || 0) < -0.5) html += row(s.color, s.name, s.values[abs]);
    if (!hidden.has(data.line.name)) html += `<div class="t-row" style="border-top:1px solid rgba(255,255,255,.16); margin-top:3px; padding-top:4px"><span style="color:${data.line.color}">●</span><span>${esc(data.line.name)}</span><b>${fmtMoney(data.line.values[abs], cur)}</b></div>`;
  } else if (mode === "balance") {
    for (const s of data.series) html += row(s.color, s.name, s.values[abs]);
  } else {
    html += row(data.line.color, "Attendu", data.line.values[abs]);
    html += `<div class="t-row"><span></span><span>Fourchette</span><b>${fmtMoney(data.band.lo[abs], cur, { dec: 0 })} – ${fmtMoney(data.band.hi[abs], cur, { dec: 0 })}</b></div>`;
  }
  for (const m of data.markers.filter(m => m.idx === abs)) html += `<div class="t-row">${m.emoji || "📌"} ${esc(m.label)}</div>`;
  return html;
}

/* ---------- mini-aperçu + sélecteur (brush) ---------- */
function projBrushSvg(W, H, win, data) {
  const svg = svgEl("svg", { viewBox: `0 0 ${W} ${H}`, width: W, height: H });
  const plot = { left: 8, top: 8, w: Math.max(10, W - 16), h: H - 16 };
  const arr = data.overview, n = arr.length;
  let mn = Math.min(0, ...arr), mx = Math.max(0, ...arr); if (mn === mx) mx = mn + 1;
  const X = i => plot.left + i / (n - 1) * plot.w, Y = v => plot.top + (1 - (v - mn) / (mx - mn)) * plot.h;
  const pts = arr.map((v, i) => `${X(i)},${Y(v)}`);
  svg.append(svgEl("path", { d: `M${X(0)},${Y(Math.max(mn, 0))} L` + pts.join(" L") + ` L${X(n - 1)},${Y(Math.max(mn, 0))} Z`, fill: "var(--violet)", "fill-opacity": 0.12 }));
  svg.append(svgEl("path", { d: "M" + pts.join(" L"), fill: "none", stroke: "var(--violet)", "stroke-width": 1.3, "stroke-opacity": 0.7 }));
  const xa = X(win.i0), xb = X(win.i1), cy = plot.top + plot.h / 2;
  // extérieur estompé
  svg.append(svgEl("rect", { x: plot.left, y: plot.top, width: Math.max(0, xa - plot.left), height: plot.h, rx: 5, fill: "var(--panel)", "fill-opacity": 0.66 }));
  svg.append(svgEl("rect", { x: xb, y: plot.top, width: Math.max(0, plot.left + plot.w - xb), height: plot.h, rx: 5, fill: "var(--panel)", "fill-opacity": 0.66 }));
  // cadre de sélection (neutre, fin)
  svg.append(svgEl("rect", { x: xa, y: plot.top + 0.5, width: Math.max(2, xb - xa), height: plot.h - 1, rx: 5, fill: "none", stroke: "var(--tx3)", "stroke-width": 1 }));
  // poignées : barre arrondie + grip
  for (const x of [xa, xb]) {
    svg.append(svgEl("rect", { x: x - 4, y: plot.top + 2, width: 8, height: plot.h - 4, rx: 4, fill: "var(--panel)", stroke: "var(--line2)", "stroke-width": 1 }));
    svg.append(svgEl("line", { x1: x - 1.4, x2: x - 1.4, y1: cy - 4, y2: cy + 4, stroke: "var(--tx3)", "stroke-width": 1.1 }));
    svg.append(svgEl("line", { x1: x + 1.4, x2: x + 1.4, y1: cy - 4, y2: cy + 4, stroke: "var(--tx3)", "stroke-width": 1.1 }));
  }
  svg._plot = { plot, X, monthAt: px => clamp(Math.round((px - plot.left) / plot.w * (n - 1)), 0, n - 1) };
  return svg;
}

/* ---------- contrôleur interactif (zoom molette, glisser, brush, tactile) ---------- */
function buildProjChart(data, mode, hidden, cur) {
  const MAX = data.ym.length - 1;
  const wrap = el("div", { class: "pc-wrap" });
  const main = el("div", { class: "chart-box pc-main" });
  const tip = el("div", { class: "chart-tip", style: "opacity:0" });
  main.append(tip);
  const brush = el("div", { class: "chart-box pc-brush" });
  const hint = el("div", { class: "pc-hint" }, el("span", { html: ico("search", 12) }),
    el("span", {}, "Molette pour zoomer · glisser pour déplacer · poignées ci-dessous pour ajuster la période"));
  wrap.append(main, brush, hint);

  const clampWin = (i0, i1) => {
    let span = Math.round(i1 - i0);
    span = clamp(span, PROJ_MINSPAN, MAX);
    i0 = clamp(Math.round(i0), 0, MAX - span);
    return { i0, i1: i0 + span };
  };
  let win = clampWin(_projView.i0, _projView.i1);
  let G = null;

  const scheduleSettle = debounce(() => { persist(); renderApp(); }, 280);
  function setWin(i0, i1, settle) {
    win = clampWin(i0, i1);
    _projView = { i0: win.i0, i1: win.i1 };
    State.settings.projView = { a: win.i0, b: win.i1 };
    drawMain(); drawBrush();
    if (settle) scheduleSettle();
  }
  function drawMain() {
    const W = main.clientWidth; if (!W) return;
    [...main.querySelectorAll("svg")].forEach(s => s.remove());
    const svg = projMainSvg(W, main.clientHeight || PROJ_MAIN_H, win, data, mode, hidden, cur);
    main.insertBefore(svg, tip);
    G = svg._geom;
  }
  function drawBrush() {
    const W = brush.clientWidth; if (!W) return;
    brush.innerHTML = "";
    brush.append(projBrushSvg(W, brush.clientHeight || PROJ_BRUSH_H, win, data));
  }

  // tooltip / crosshair
  function showTipAt(clientX) {
    if (!G) return;
    const r = main.getBoundingClientRect();
    const k = clamp(Math.round((clientX - r.left - G.plot.left) / G.plot.w * (G.n - 1)), 0, G.n - 1);
    const cx = G.X(k);
    G.guide.setAttribute("x1", cx); G.guide.setAttribute("x2", cx); G.guide.setAttribute("opacity", 1);
    G.dots.forEach((d, di) => { const c = G.dotEls[di]; c.setAttribute("cx", cx); c.setAttribute("cy", G.Y(d.arr[win.i0 + k])); c.setAttribute("opacity", 1); });
    tip.innerHTML = G.tipHtml(k);
    tip.style.opacity = 1;
    tip.style.left = clamp(cx, 72, r.width - 72) + "px";
    tip.style.top = (G.plot.top + 12) + "px";
  }
  function hideTip() { if (!G) return; G.guide.setAttribute("opacity", 0); G.dotEls.forEach(c => c.setAttribute("opacity", 0)); tip.style.opacity = 0; }

  // pan + tactile
  let panning = false, panX = 0, panY = 0, panW = null, axis = null, moved = false, ptType = "mouse";
  main.addEventListener("pointerdown", e => {
    if (e.pointerType === "mouse" && e.button !== 0) return;
    panning = true; panX = e.clientX; panY = e.clientY; panW = { ...win }; axis = null; moved = false; ptType = e.pointerType;
    try { main.setPointerCapture(e.pointerId); } catch (_) {}
  });
  main.addEventListener("pointermove", e => {
    if (!panning) { showTipAt(e.clientX); return; }
    const dx = e.clientX - panX, dy = e.clientY - panY;
    if (axis === null) {
      if (ptType === "mouse") axis = "x";
      else {
        if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
        axis = Math.abs(dx) >= Math.abs(dy) ? "x" : "y";
        if (axis === "y") { panning = false; try { main.releasePointerCapture(e.pointerId); } catch (_) {} return; }
      }
    }
    moved = true; hideTip();
    const span = panW.i1 - panW.i0;
    const dM = Math.round(dx / G.plot.w * span);
    setWin(panW.i0 - dM, panW.i1 - dM, true);
  });
  const endPan = e => {
    if (!panning) return;
    panning = false; try { main.releasePointerCapture(e.pointerId); } catch (_) {}
    if (ptType !== "mouse" && !moved) showTipAt(e.clientX);
    scheduleSettle();
  };
  main.addEventListener("pointerup", endPan);
  main.addEventListener("pointercancel", endPan);
  main.addEventListener("pointerleave", () => { if (!panning) hideTip(); });
  main.addEventListener("wheel", e => {
    e.preventDefault(); if (!G) return;
    const r = main.getBoundingClientRect();
    const ratio = clamp((e.clientX - r.left - G.plot.left) / G.plot.w, 0, 1);
    const span = win.i1 - win.i0;
    const f = e.deltaY < 0 ? 0.82 : 1 / 0.82;
    const newSpan = clamp(Math.round(span * f), PROJ_MINSPAN, MAX);
    const anchor = win.i0 + ratio * span;
    setWin(Math.round(anchor - ratio * newSpan), Math.round(anchor - ratio * newSpan) + newSpan, true);
  }, { passive: false });

  // brush
  let bmode = null, bAnchor = 0, bW = null;
  const brushAt = clientX => { const svg = brush.querySelector("svg"); const r = brush.getBoundingClientRect(); return svg ? svg._plot.monthAt(clientX - r.left) : 0; };
  brush.addEventListener("pointerdown", e => {
    const svg = brush.querySelector("svg"); if (!svg) return;
    const r = brush.getBoundingClientRect(); const px = e.clientX - r.left;
    const xa = svg._plot.X(win.i0), xb = svg._plot.X(win.i1);
    if (Math.abs(px - xa) < 11) bmode = "l";
    else if (Math.abs(px - xb) < 11) bmode = "r";
    else if (px > xa && px < xb) { bmode = "b"; bAnchor = brushAt(e.clientX); bW = { ...win }; }
    else bmode = "c";
    try { brush.setPointerCapture(e.pointerId); } catch (_) {}
    onBrush(e);
  });
  brush.addEventListener("pointermove", e => { if (bmode) onBrush(e); });
  const endBrush = e => { if (bmode) { bmode = null; try { brush.releasePointerCapture(e.pointerId); } catch (_) {} scheduleSettle(); } };
  brush.addEventListener("pointerup", endBrush);
  brush.addEventListener("pointercancel", endBrush);
  function onBrush(e) {
    const m = brushAt(e.clientX);
    if (bmode === "l") setWin(Math.min(m, win.i1 - PROJ_MINSPAN), win.i1, true);
    else if (bmode === "r") setWin(win.i0, Math.max(m, win.i0 + PROJ_MINSPAN), true);
    else if (bmode === "b") { const d = m - bAnchor; setWin(bW.i0 + d, bW.i1 + d, true); }
    else if (bmode === "c") { const span = win.i1 - win.i0; setWin(m - span / 2, m + span / 2, true); }
  }

  requestAnimationFrame(() => { drawMain(); drawBrush(); });
  if (window.ResizeObserver) {
    let lw = 0;
    const ro = new ResizeObserver(() => { const w = main.clientWidth; if (Math.abs(w - lw) > 4) { lw = w; drawMain(); drawBrush(); } });
    ro.observe(main);
  }
  return wrap;
}

/* ============ vue ============ */
function viewProjection(root) {
  const b = curBudget();
  const cur = b.currency;
  const mode = State.settings.projMode || "wealth";
  State.settings.projHidden = State.settings.projHidden || {};

  const proj = project(b, { months: PROJ_MAX, scenarioMode: State.settings.scenarioMode });

  const hasVariable = b.items.some(i => i.variable);

  const v = State.settings.projView || { a: 0, b: 60 };
  const i0 = clamp(v.a | 0, 0, PROJ_MAX - PROJ_MINSPAN);
  const i1 = clamp(v.b | 0, i0 + PROJ_MINSPAN, PROJ_MAX - 1);
  _projView = { i0, i1 };
  const slice = proj.slice(i0, i1 + 1);
  const visPhases = phasesFull.filter(p => p.startIdx <= i1 && p.endIdx >= i0);

  /* ---- contrôles ---- */
  const controls = el("div", { class: "flex", style: "flex-wrap:wrap; gap:10px 14px" },

      ], State.settings.scenarioMode, m => { State.settings.scenarioMode = m; persist(); renderApp(); }, true)),

  /* ---- carte graphique ---- */
  const rangeChips = el("div", { class: "pc-chips" }, RANGE_PRESETS.map(rp => {

    return el("button", { class: "pc-chip" + (on ? " on" : ""), onclick: () => { State.settings.projView = { a: 0, b: Math.min(rp.m, PROJ_MAX - 1) }; persist(); renderApp(); } }, rp.l);
  }));
  const lg = (c, t) => el("span", { class: "lg" }, el("span", { class: "cat-dot", style: "background:" + c }), t);
  const legend = mode === "wealth"
    ? el("div", { class: "leg-toggles" }, [...data.up, ...data.down, data.line].map(s => seriesToggle(s.name, s.color, hidden)))
    : mode === "balance"
      ? el("div", { class: "legend" }, lg("#10b981", "Solde courant"), lg("#8b5cf6", "Patrimoine net"), data.markers.length ? el("span", { class: "lg" }, "📌 événements de vie") : null)
      : el("div", { class: "legend" }, lg("#8b5cf6", "Attendu"),
        el("span", { class: "lg" }, el("span", { class: "cat-dot", style: "background:rgba(139,92,246,.35)" }), "Fourchette pessimiste → optimiste"));
  const heroHead = el("div", { class: "card-head", style: "flex-wrap:wrap; row-gap:9px" },
